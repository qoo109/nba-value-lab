name: Apply G1.2.0 live output v1

on:
  push:
    branches:
      - implement/g1-2-0-live-output-v1
    paths:
      - ".github/workflows/apply-g1-2-0-live-output-v1.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: implement/g1-2-0-live-output-v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Implement G1.2.0 live output
        run: |
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          from pathlib import Path

          ROOT = Path('.')

          def write(path: str, content: str) -> None:
              target = ROOT / path
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(content.rstrip() + '\n', encoding='utf-8')

          def replace_once(path: str, old: str, new: str) -> None:
              target = ROOT / path
              text = target.read_text(encoding='utf-8')
              if text.count(old) != 1:
                  raise RuntimeError(f'{path}: expected one match, got {text.count(old)} for {old!r}')
              target.write_text(text.replace(old, new), encoding='utf-8')

          runtime_py = r'''#!/usr/bin/env python3
          """Shared G1.2.0 EV-primary decision and season activation resolver."""

          from __future__ import annotations

          import copy
          import json
          from pathlib import Path
          from typing import Any

          TARGET_SEASON = "2026-27"
          TARGET_COMPETITION = "regular_season"


          def load_json(path: Path) -> dict[str, Any]:
              return json.loads(path.read_text(encoding="utf-8"))


          def segment_contains(segment: dict[str, Any], odds: float) -> bool:
              above = odds > segment["min"] if segment.get("min_inclusive") is False else odds >= segment["min"]
              maximum = segment.get("max")
              below = True if maximum is None else (odds < maximum if segment.get("max_inclusive") is False else odds <= maximum)
              return above and below


          def price_segment(config: dict[str, Any], odds: float) -> dict[str, Any]:
              for segment in config["price_bands"]:
                  if segment_contains(segment, odds):
                      return segment
              return {
                  "id": "outside",
                  "label": "範圍外",
                  "required_margin_pp": None,
                  "eligible": False,
                  "maximum_conclusion": "只記錄",
              }


          def ev_primary_decision(candidate: dict[str, Any], config: dict[str, Any]) -> dict[str, Any]:
              segment = price_segment(config, float(candidate["target_odds"]))
              p_c = candidate.get("p_conservative")
              odds = float(candidate["target_odds"])
              policy = config["ev_policy"]
              insufficient = (
                  candidate.get("analysis_gate_status") == "資料不足"
                  or candidate.get("confidence") in {"資料不足", "不足"}
                  or int(candidate.get("news_risk_level", candidate.get("newsRisk", 0))) >= 3
                  or p_c is None
              )
              if insufficient:
                  return {
                      "grade": "資料不足", "conclusion": "資料不足", "segment": segment,
                      "edge_pp": None, "gap_pp": None, "minimum_odds": None,
                      "decision_metric": "conservative_ev", "ev_conservative": None,
                      "ev_candidate": False, "pp_guard_pass": False,
                      "pp_guard_min_pp": float(policy["pp_guard_min"]),
                      "pp_guard_surplus_pp": None, "grade_threshold_ev": None,
                      "selection_surplus_pp": None, "minimum_candidate_odds": None,
                  }

              p_c = float(p_c)
              break_even = 1 / odds
              edge_pp = (p_c - break_even) * 100
              ev = p_c * odds - 1
              guard = float(policy["pp_guard_min"])
              guard_pass = edge_pp + 1e-12 >= guard
              candidate_min = float(policy["candidate_min_ev"])
              p_min = float(policy["grade_p_min_ev"])
              b_min = float(policy["grade_b_min_ev"])

              if ev <= 0:
                  grade, conclusion, threshold = "不支持", "模型不支持", 0.0
              elif not guard_pass:
                  grade, conclusion, threshold = "ㄆ", "觀察・PP 安全線未通過", candidate_min
              elif ev + 1e-12 < candidate_min:
                  grade, conclusion, threshold = "ㄆ", "觀察・EV 未達 5%", candidate_min
              elif ev + 1e-12 < p_min:
                  grade, conclusion, threshold = "ㄇ", "ㄇ級・最低正 EV", candidate_min
              elif ev + 1e-12 < b_min:
                  grade, conclusion, threshold = "ㄆ", "ㄆ級・EV 觀察候選", p_min
              else:
                  grade, conclusion, threshold = "ㄅ", "ㄅ級・EV 核心候選", b_min

              risk = int(candidate.get("news_risk_level", candidate.get("newsRisk", 0)))
              confidence = candidate.get("confidence")
              if grade == "ㄅ" and (risk == 2 or confidence == "低"):
                  grade, conclusion, threshold = "ㄆ", "ㄆ級・風險降級", p_min

              if grade not in {"資料不足", "不支持"}:
                  if segment.get("required_margin_pp") is None:
                      grade, conclusion = "ㄆ", segment.get("maximum_conclusion", "只記錄")
                  elif not segment.get("eligible", False) and grade == "ㄅ":
                      grade, conclusion = "ㄆ", segment.get("maximum_conclusion", "ㄆ級・延伸研究")

              ev_candidate = ev + 1e-12 >= candidate_min and guard_pass and bool(segment.get("eligible"))
              selection_surplus_pp = (ev - b_min) * 100 if grade == "ㄅ" else (ev - threshold) * 100
              minimum_candidate_odds = (1 + candidate_min) / p_c if p_c > 0 else None
              minimum_grade_odds = (1 + threshold) / p_c if p_c > 0 and threshold > 0 else minimum_candidate_odds
              return {
                  "grade": grade,
                  "conclusion": conclusion,
                  "segment": segment,
                  "edge_pp": edge_pp,
                  "gap_pp": selection_surplus_pp,
                  "minimum_odds": minimum_grade_odds,
                  "decision_metric": "conservative_ev",
                  "ev_conservative": ev,
                  "ev_candidate": ev_candidate,
                  "pp_guard_pass": guard_pass,
                  "pp_guard_min_pp": guard,
                  "pp_guard_surplus_pp": edge_pp - guard,
                  "grade_threshold_ev": threshold,
                  "selection_surplus_pp": selection_surplus_pp,
                  "minimum_candidate_odds": minimum_candidate_odds,
              }


          def activation_requested(top: dict[str, Any], manifest: dict[str, Any]) -> bool:
              scheduled = manifest.get("scheduled_next", {}).get("G")
              if not scheduled or scheduled.get("activation_status") != "USER_APPROVED_FOR_2026_27_REGULAR_SEASON":
                  return False
              if top.get("g_execution_mode") == "active_only":
                  return False
              return top.get("season") == TARGET_SEASON and top.get("competition_type") == TARGET_COMPETITION


          def resolve_execution(root: Path, manifest_path: Path, top: dict[str, Any]) -> dict[str, Any]:
              manifest = load_json(manifest_path)
              active_v_entry = manifest["active"]["V"]
              active_g_entry = manifest["active"]["G"]
              active_coord_entry = manifest["coordination"]
              active_v = load_json(root / active_v_entry["config"])
              active_g = load_json(root / active_g_entry["config"])
              active_coord = load_json(root / active_coord_entry["config"])

              scheduled_root = manifest.get("scheduled_next", {})
              scheduled_g_entry = scheduled_root.get("G")
              scheduled_coord_entry = scheduled_root.get("coordination")
              scheduled_g = load_json(root / scheduled_g_entry["config"]) if scheduled_g_entry else None
              scheduled_coord = load_json(root / scheduled_coord_entry["config"]) if scheduled_coord_entry else None
              activated = activation_requested(top, manifest)

              if activated:
                  if scheduled_g is None or scheduled_coord is None:
                      raise ValueError("scheduled G1.2.0 or coordination config is missing")
                  primary_entry, primary_g = scheduled_g_entry, scheduled_g
                  coordination_entry, coordination = scheduled_coord_entry, scheduled_coord
                  parallel_entry, parallel_g = active_g_entry, active_g
                  parallel_role = "control_shadow"
                  status = "G1_2_0_PRIMARY_2026_27"
              else:
                  primary_entry, primary_g = active_g_entry, active_g
                  coordination_entry, coordination = active_coord_entry, active_coord
                  parallel_entry, parallel_g = scheduled_g_entry, scheduled_g
                  parallel_role = "scheduled_shadow" if scheduled_g else None
                  status = "G1_1_1_PRIMARY_G1_2_0_SCHEDULED_SHADOW" if scheduled_g else "ACTIVE_ONLY"

              execution_manifest = copy.deepcopy(manifest)
              execution_manifest["active"]["G"] = copy.deepcopy(primary_entry)
              execution_manifest["coordination"] = copy.deepcopy(coordination_entry)
              return {
                  "manifest": execution_manifest,
                  "repository_manifest": manifest,
                  "v_config": active_v,
                  "primary_g_config": primary_g,
                  "primary_g_entry": primary_entry,
                  "coordination": coordination,
                  "coordination_entry": coordination_entry,
                  "parallel_g_config": parallel_g,
                  "parallel_g_entry": parallel_entry,
                  "parallel_role": parallel_role,
                  "activated": activated,
                  "execution_status": status,
              }
          '''
          write('scripts/g1_2_0_runtime.py', runtime_py)

          lock_wrapper = r'''#!/usr/bin/env python3
          """T-60 runtime wrapper adding G1.2.0 EV-primary and parallel G control output."""

          from __future__ import annotations

          import argparse
          import json
          import tempfile
          from pathlib import Path
          from typing import Any

          import lock_t60_snapshot_v49 as v49
          from g1_2_0_runtime import ev_primary_decision, resolve_execution

          base = v49.base
          ROOT = base.ROOT
          LOCKS_DIR = base.LOCKS_DIR
          LOCKS_INDEX = base.LOCKS_INDEX
          last_execution_context: dict[str, Any] = {}

          _LEGACY_LOAD = base.load_active_configs
          _LEGACY_G_DECISION = base.g_decision
          _LEGACY_GATE_RESULTS = base.gate_results
          _LEGACY_RANKING_KEY = base.ranking_key
          _LEGACY_MAKE_RECORD = v49._ORIGINAL_MAKE_RECORD


          def g_decision(candidate: dict[str, Any], config: dict[str, Any]) -> dict[str, Any]:
              if config.get("ev_policy"):
                  return ev_primary_decision(candidate, config)
              return _LEGACY_G_DECISION(candidate, config)


          def gate_results(candidate: dict[str, Any], config: dict[str, Any], decision: dict[str, Any], dual_conflict: bool) -> dict[str, bool]:
              results = _LEGACY_GATE_RESULTS(candidate, config, decision, dual_conflict)
              if config.get("ev_policy"):
                  results["ev_candidate"] = bool(decision.get("ev_candidate"))
                  results["pp_guard_pass"] = bool(decision.get("pp_guard_pass"))
                  results["main_surplus"] = (
                      decision.get("selection_surplus_pp") is not None
                      and decision["selection_surplus_pp"] >= float(config["core_gate"]["threshold_buffer_min_pp"])
                  )
              return results


          def ranking_key(item: dict[str, Any]) -> tuple[Any, ...]:
              decision = item["g"]
              if decision.get("decision_metric") != "conservative_ev":
                  return _LEGACY_RANKING_KEY(item)
              candidate = item["candidate"]
              return (
                  candidate["data_age_minutes"],
                  -int(candidate["injury_confirmed"] and candidate["starters_confirmed"] and candidate["minutes_limit_confirmed"]),
                  (candidate["p_optimistic"] - candidate["p_conservative"]) * 100,
                  -float(decision.get("ev_conservative") or -999),
                  -float(decision.get("pp_guard_surplus_pp") or -999),
                  candidate["model_market_gap_pp"],
                  -int(candidate["reverse_path_resolved"]),
                  -float(candidate.get("similar_case_stability_score", 0)),
                  candidate["game_id"],
                  candidate["candidate_side"],
              )


          def make_record(*args: Any, **kwargs: Any) -> dict[str, Any]:
              record = _LEGACY_MAKE_RECORD(*args, **kwargs)
              item = args[0] if args else kwargs["item"]
              candidate = item["candidate"]
              decision = item["g"]
              parallel_config = last_execution_context.get("parallel_g_config")
              parallel = g_decision(candidate, parallel_config) if parallel_config else None
              parallel_entry = last_execution_context.get("parallel_g_entry") or {}
              record.update({
                  "g_decision_metric": decision.get("decision_metric", "threshold_distance_pp"),
                  "g_conservative_ev": decision.get("ev_conservative", candidate["p_conservative"] * candidate["target_odds"] - 1),
                  "g_ev_grade_threshold": decision.get("grade_threshold_ev"),
                  "g_ev_threshold_distance_pp": decision.get("selection_surplus_pp"),
                  "g_pp_guard_min_pp": decision.get("pp_guard_min_pp"),
                  "g_pp_guard_pass": decision.get("pp_guard_pass"),
                  "g_pp_guard_surplus_pp": decision.get("pp_guard_surplus_pp"),
                  "g_ev_candidate": decision.get("ev_candidate"),
                  "g_minimum_candidate_odds": decision.get("minimum_candidate_odds"),
                  "g_execution_status": last_execution_context.get("execution_status"),
                  "g_primary_after_trigger": bool(last_execution_context.get("activated")),
                  "g_parallel_role": last_execution_context.get("parallel_role"),
                  "g_parallel_model": str(parallel_entry.get("version")) if parallel_entry else None,
                  "g_parallel_revision": parallel_entry.get("revision_id"),
                  "g_parallel_grade": parallel.get("grade") if parallel else None,
                  "g_parallel_conclusion": parallel.get("conclusion") if parallel else None,
                  "g_parallel_threshold_distance_pp": parallel.get("gap_pp") if parallel else None,
                  "g_parallel_conservative_ev": candidate["p_conservative"] * candidate["target_odds"] - 1 if parallel else None,
              })
              return record


          def load_active_configs() -> tuple[dict[str, Any], dict[str, Any], dict[str, Any], dict[str, Any]]:
              if last_execution_context:
                  return (
                      last_execution_context["manifest"],
                      last_execution_context["v_config"],
                      last_execution_context["primary_g_config"],
                      last_execution_context["coordination"],
                  )
              return _LEGACY_LOAD()


          def _configure(top: dict[str, Any]) -> None:
              global last_execution_context
              last_execution_context = resolve_execution(ROOT, base.MODELS_MANIFEST, top)
              base.load_active_configs = load_active_configs
              base.g_decision = g_decision
              base.gate_results = gate_results
              base.ranking_key = ranking_key
              v49._ORIGINAL_MAKE_RECORD = make_record
              base.make_record = v49.enriched_make_record


          def _enrich_output(path: Path) -> dict[str, Any]:
              payload = base.load_json(path)
              selection = payload["selection"]
              records = payload["records"]
              selection.update({
                  "g_execution_status": last_execution_context["execution_status"],
                  "g_primary_after_trigger": bool(last_execution_context["activated"]),
                  "g_parallel_role": last_execution_context.get("parallel_role"),
                  "g_parallel_model_revision": (last_execution_context.get("parallel_g_entry") or {}).get("revision_id"),
                  "coordination_id": last_execution_context["coordination"]["coordination_id"],
              })
              by_id = {record["prediction_id"]: record for record in records}
              for trace in selection.get("ranking_trace", []):
                  record = by_id.get(trace.get("prediction_id"))
                  if record:
                      for key in ("g_decision_metric", "g_conservative_ev", "g_ev_threshold_distance_pp", "g_pp_guard_pass", "g_parallel_grade"):
                          trace[key] = record.get(key)
              path.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
              return payload


          def run(input_path: Path, *, dry_run: bool, output_path: Path | None = None) -> dict[str, Any]:
              top = base.load_json(input_path)
              _configure(top)
              if output_path is None:
                  with tempfile.TemporaryDirectory() as directory:
                      temp = Path(directory) / "g120-t60-output.json"
                      base.run(input_path, dry_run=dry_run, output_path=temp)
                      return _enrich_output(temp)["selection"]
              base.run(input_path, dry_run=dry_run, output_path=output_path)
              return _enrich_output(output_path)["selection"]


          def main() -> int:
              parser = argparse.ArgumentParser()
              parser.add_argument("input", type=Path)
              parser.add_argument("--dry-run", action="store_true")
              parser.add_argument("--output", type=Path)
              args = parser.parse_args()
              run(args.input, dry_run=args.dry_run, output_path=args.output)
              return 0


          if __name__ == "__main__":
              raise SystemExit(main())
          '''
          write('scripts/lock_t60_snapshot_g120.py', lock_wrapper)

          t5_wrapper = r'''#!/usr/bin/env python3
          """T-5 runtime wrapper preserving G1.2.0 EV-primary and parallel control output."""

          from __future__ import annotations

          import argparse
          import json
          import tempfile
          from pathlib import Path
          from typing import Any

          import recheck_t5_snapshot as base
          from g1_2_0_runtime import ev_primary_decision, resolve_execution
          from lock_t60_snapshot_g120 import gate_results, g_decision, ranking_key

          ROOT = base.ROOT
          LOCKS_DIR = base.LOCKS_DIR
          LOCKS_INDEX = base.LOCKS_DIR / "index.json"
          load_json = base.load_json
          append_many = base.append_many
          last_execution_context: dict[str, Any] = {}

          _LEGACY_LOAD = base.load_active_configs
          _LEGACY_MAKE_RECORD = base.make_record


          def make_record(*args: Any, **kwargs: Any) -> dict[str, Any]:
              record = _LEGACY_MAKE_RECORD(*args, **kwargs)
              item = args[0] if args else kwargs["item"]
              candidate = item["candidate"]
              decision = item["g"]
              parallel_config = last_execution_context.get("parallel_g_config")
              parallel = g_decision(candidate, parallel_config) if parallel_config else None
              parallel_entry = last_execution_context.get("parallel_g_entry") or {}
              record.update({
                  "g_decision_metric": decision.get("decision_metric", "threshold_distance_pp"),
                  "g_conservative_ev": decision.get("ev_conservative", candidate["p_conservative"] * candidate["target_odds"] - 1),
                  "g_ev_grade_threshold": decision.get("grade_threshold_ev"),
                  "g_ev_threshold_distance_pp": decision.get("selection_surplus_pp"),
                  "g_pp_guard_min_pp": decision.get("pp_guard_min_pp"),
                  "g_pp_guard_pass": decision.get("pp_guard_pass"),
                  "g_pp_guard_surplus_pp": decision.get("pp_guard_surplus_pp"),
                  "g_ev_candidate": decision.get("ev_candidate"),
                  "g_minimum_candidate_odds": decision.get("minimum_candidate_odds"),
                  "g_execution_status": last_execution_context.get("execution_status"),
                  "g_primary_after_trigger": bool(last_execution_context.get("activated")),
                  "g_parallel_role": last_execution_context.get("parallel_role"),
                  "g_parallel_model": str(parallel_entry.get("version")) if parallel_entry else None,
                  "g_parallel_revision": parallel_entry.get("revision_id"),
                  "g_parallel_grade": parallel.get("grade") if parallel else None,
                  "g_parallel_conclusion": parallel.get("conclusion") if parallel else None,
                  "g_parallel_threshold_distance_pp": parallel.get("gap_pp") if parallel else None,
                  "g_parallel_conservative_ev": candidate["p_conservative"] * candidate["target_odds"] - 1 if parallel else None,
              })
              return record


          def load_active_configs() -> tuple[dict[str, Any], dict[str, Any], dict[str, Any], dict[str, Any]]:
              if last_execution_context:
                  return (
                      last_execution_context["manifest"],
                      last_execution_context["v_config"],
                      last_execution_context["primary_g_config"],
                      last_execution_context["coordination"],
                  )
              return _LEGACY_LOAD()


          def _configure(top: dict[str, Any]) -> None:
              global last_execution_context
              last_execution_context = resolve_execution(ROOT, ROOT / "models" / "manifest.json", top)
              base.load_active_configs = load_active_configs
              base.g_decision = g_decision
              base.gate_results = gate_results
              base.ranking_key = ranking_key
              base.make_record = make_record


          def _enrich_output(path: Path) -> dict[str, Any]:
              payload = base.load_json(path)
              selection = payload["selection"]
              records = payload["records"]
              selection.update({
                  "g_execution_status": last_execution_context["execution_status"],
                  "g_primary_after_trigger": bool(last_execution_context["activated"]),
                  "g_parallel_role": last_execution_context.get("parallel_role"),
                  "g_parallel_model_revision": (last_execution_context.get("parallel_g_entry") or {}).get("revision_id"),
                  "coordination_id": last_execution_context["coordination"]["coordination_id"],
              })
              by_id = {record["prediction_id"]: record for record in records}
              for trace in selection.get("ranking_trace", []):
                  record = by_id.get(trace.get("prediction_id"))
                  if record:
                      for key in ("g_decision_metric", "g_conservative_ev", "g_ev_threshold_distance_pp", "g_pp_guard_pass", "g_parallel_grade"):
                          trace[key] = record.get(key)
              path.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
              return payload


          def run(input_path: Path, *, dry_run: bool, previous_output: Path | None = None, output_path: Path | None = None) -> dict[str, Any]:
              top = base.load_json(input_path)
              _configure(top)
              if output_path is None:
                  with tempfile.TemporaryDirectory() as directory:
                      temp = Path(directory) / "g120-t5-output.json"
                      base.run(input_path, dry_run=dry_run, previous_output=previous_output, output_path=temp)
                      return _enrich_output(temp)["selection"]
              base.run(input_path, dry_run=dry_run, previous_output=previous_output, output_path=output_path)
              return _enrich_output(output_path)["selection"]


          def main() -> int:
              parser = argparse.ArgumentParser()
              parser.add_argument("input", type=Path)
              parser.add_argument("--previous-output", type=Path)
              parser.add_argument("--dry-run", action="store_true")
              parser.add_argument("--output", type=Path)
              args = parser.parse_args()
              run(args.input, dry_run=args.dry_run, previous_output=args.previous_output, output_path=args.output)
              return 0


          if __name__ == "__main__":
              raise SystemExit(main())
          '''
          write('scripts/recheck_t5_snapshot_g120.py', t5_wrapper)

          frontend_js = r'''"use strict";

          // Scheduled G1.2.0 support. Active G1.1.1 remains primary until the
          // Registry is switched after the governed 2026-27 T-60 trigger.
          let runtimeScheduledGConfig = null;
          let runtimeScheduledCoordination = null;
          let scheduledGLoadState = { status: "not_loaded", error: null };

          const legacyLoadModelRegistryG120 = loadModelRegistry;
          const legacyGDecisionG120 = gDecision;
          const legacyDecisionPillsG120 = decisionPills;
          const legacyRefreshRuleDownloadsG120 = refreshRuleDownloads;
          const legacyRenderModelRegistryStatusG120 = renderModelRegistryStatus;

          function g120Segment(config, odds) {
            if (!Number.isFinite(odds) || odds <= 1) return { id: "invalid", label: "無效市場賠率", eligible: false, required_margin_pp: null, maximum_conclusion: "資料不足" };
            return config.price_bands.find((segment) => segmentContains(segment, odds)) || { id: "outside", label: "範圍外", eligible: false, required_margin_pp: null, maximum_conclusion: "只記錄" };
          }

          function g120Decision(candidate, odds = candidate.target.odds, config = modelG()) {
            const segment = g120Segment(config, odds);
            const pRaw = candidate.target.conservative;
            const risk = candidate.game.newsRisk ?? candidate.game.news_risk_level ?? 0;
            const insufficient = candidate.game.confidence === "不足" || candidate.game.confidence === "資料不足" || risk >= 3 || pRaw === null;
            const policy = config.ev_policy;
            if (!policy || insufficient || !Number.isFinite(odds) || odds <= 1) {
              return { engine: "G", grade: "資料不足", conclusion: "資料不足", segment, margin: null, gap: null, minimumOdds: null, decisionMetric: "conservative_ev", conservativeEv: null, ppGuardPass: false };
            }
            const p = pRaw > 1 ? pRaw / 100 : pRaw;
            const ev = p * odds - 1;
            const edgePP = (p - 1 / odds) * 100;
            const guardPass = edgePP + 1e-12 >= policy.pp_guard_min;
            let grade, conclusion, threshold;
            if (ev <= 0) { grade = "不支持"; conclusion = "模型不支持"; threshold = 0; }
            else if (!guardPass) { grade = "ㄆ"; conclusion = "觀察・PP 安全線未通過"; threshold = policy.candidate_min_ev; }
            else if (ev < policy.candidate_min_ev) { grade = "ㄆ"; conclusion = "觀察・EV 未達 5%"; threshold = policy.candidate_min_ev; }
            else if (ev < policy.grade_p_min_ev) { grade = "ㄇ"; conclusion = "ㄇ級・最低正 EV"; threshold = policy.grade_m_min_ev; }
            else if (ev < policy.grade_b_min_ev) { grade = "ㄆ"; conclusion = "ㄆ級・EV 觀察候選"; threshold = policy.grade_p_min_ev; }
            else { grade = "ㄅ"; conclusion = "ㄅ級・EV 核心候選"; threshold = policy.grade_b_min_ev; }
            if (grade === "ㄅ" && (risk === 2 || candidate.game.confidence === "低")) { grade = "ㄆ"; conclusion = "ㄆ級・風險降級"; threshold = policy.grade_p_min_ev; }
            if (!["資料不足", "不支持"].includes(grade)) {
              if (segment.required_margin_pp == null) { grade = "ㄆ"; conclusion = segment.maximum_conclusion || "只記錄"; }
              else if (!segment.eligible && grade === "ㄅ") { grade = "ㄆ"; conclusion = segment.maximum_conclusion || "ㄆ級・延伸研究"; }
            }
            const surplusPP = ((grade === "ㄅ" ? ev - policy.grade_b_min_ev : ev - threshold) * 100);
            const minimumOdds = p > 0 ? (1 + (threshold || policy.candidate_min_ev)) / p : null;
            return {
              engine: "G", grade, conclusion, segment,
              margin: (threshold || policy.candidate_min_ev) * 100,
              gap: surplusPP,
              minimumOdds,
              decisionMetric: "conservative_ev",
              conservativeEv: ev,
              edgePP,
              ppGuardPass: guardPass,
              ppGuardMinPP: policy.pp_guard_min,
              ppGuardSurplusPP: edgePP - policy.pp_guard_min,
              evCandidate: ev >= policy.candidate_min_ev && guardPass && Boolean(segment.eligible),
            };
          }

