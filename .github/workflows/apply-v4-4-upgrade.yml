name: Apply V4.4 frontend wiring

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "scripts/apply_v4_4_upgrade.py"
      - "js/v4-live-data.js"
      - ".github/workflows/apply-v4-4-upgrade.yml"

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply V4.4 wiring
        run: python scripts/apply_v4_4_upgrade.py

      - name: Verify JavaScript syntax
        run: |
          node --check js/v4-data.js
          node --check js/v4-core.js
          node --check js/v4-render.js
          node --check js/v4-init.js
          node --check js/v4-live-data.js

      - name: Commit frontend changes
        run: |
          if git diff --quiet -- index.html js/v4-data.js; then
            echo "No frontend changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html js/v4-data.js
          git commit -m "frontend: wire V4.4 dual-engine modules and live data status"
          git push
