name: Apply V4.6 model coordination

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "scripts/apply_v4_6_model_upgrade.py"
      - "js/v4-6-model-coordination.js"
      - "models/**"
      - ".github/workflows/apply-v4-6-model-upgrade.yml"

permissions:
  contents: write

concurrency:
  group: v4-6-model-upgrade
  cancel-in-progress: false

jobs:
  upgrade:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate active registry
        run: python scripts/validate_model_registry.py
      - name: Apply frontend wiring
        run: python scripts/apply_v4_6_model_upgrade.py
      - name: Check JavaScript syntax
        run: |
          node --check js/v4-data.js
          node --check js/v4-core.js
          node --check js/v4-render.js
          node --check js/v4-6-model-coordination.js
          node --check js/v4-init.js
          node --check js/v4-live-data.js
      - name: Commit generated frontend changes
        run: |
          if git diff --quiet -- index.html js/v4-data.js; then
            echo "No generated frontend changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html js/v4-data.js
          git commit -m "frontend: activate V3.1 and G1 final coordination"
          git push
