name: Bootstrap BloomBet public review v1

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'research/bloombet-public-review-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Record public review and approval-gated probe design
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected exactly 1 match, found {count}")
              return text.replace(old, new, 1)

          root = Path('.')
          status_path = root / 'PROJECT_STATUS.md'
          status = status_path.read_text(encoding='utf-8')

          status = replace_once(
              status,
              'timestamped bookmaker odds: POLICY ONLY / REAL OBSERVED_AT DATA NOT ACQUIRED',
              '''timestamped bookmaker odds: POLICY ONLY / REAL OBSERVED_AT DATA NOT ACQUIRED
          bloombet public review: COMPLETED / BLOCKED
          bloombet free tier public claim: USD 0 / 500 requests per month / no credit card / NBA + NFL / live + historical / 15+ providers
          bloombet public response schema: NOT VERIFIED
          bloombet provider timestamp semantics: NOT VERIFIED
          bloombet historical coverage: NOT VERIFIED
          bloombet terms, retention and redistribution rights: NOT VERIFIED
          bloombet zero-cost schema probe request design: VALIDATED / AWAITING EXPLICIT USER APPROVAL
          bloombet account creation authorized: false
          bloombet private API key connection authorized: false
          bloombet probe execution count: 0 / 1''',
              'BloomBet control block',
          )

          prerequisite = '''Required prerequisite:

          ```text
          TIMESTAMPED_BOOKMAKER_ODDS_REAL_OBSERVED_AT_DATA_ACQUISITION_REQUIRED
          ```'''
          prerequisite_with_subline = prerequisite + '''

          Active prerequisite sub-mainline:

          ```text
          BLOOMBET_FREE_API_ZERO_COST_SCHEMA_PROBE_AWAITING_EXPLICIT_USER_APPROVAL
          ```

          Current prerequisite status:

          ```text
          BLOCKED — ACCOUNT CREATION AND PRIVATE API KEY CONNECTION NOT AUTHORIZED
          ```'''
          status = replace_once(
              status,
              prerequisite,
              prerequisite_with_subline,
              'BloomBet prerequisite sub-mainline',
          )

          status = replace_once(
              status,
              '## Completed Evidence\n\n### G1.2.0 EV-primary live output implementation and fixture validation',
              '''## Completed Evidence

          ### BloomBet Free API public schema, terms and timestamp-semantics review

          ```text
          formal state: BLOOMBET_FREE_API_PUBLIC_REVIEW_BLOCKED
          public homepage reviewed: true
          public API documentation landing page reviewed: true
          free tier publicly claimed: USD 0 / 500 requests per month / no credit card
          NBA and historical access publicly claimed: true
          bookmaker/provider identity publicly claimed: true / 15+ providers
          response schema verified: false
          provider observed_at semantics verified: false
          historical coverage verified: false
          terms and retention rights verified: false
          qualified for historical backfill: false
          qualified for point-in-time join: false
          qualified for market backtest: false
          account created: false
          API key connected: false
          API requests executed: 0
          market metrics executed: false
          formal Stake: 0
          ```

          Public marketing pages establish a promising zero-cost tier, but the publicly accessible material does not establish the request/response schema, provider-level timestamp meaning, historical retention window, or quote retention and redistribution rights required by the frozen qualification policy. A separate maximum-three-request schema probe has therefore been designed but remains disabled until explicit user approval and private secret setup.

          ### G1.2.0 EV-primary live output implementation and fixture validation''',
              'BloomBet completed evidence',
          )
          status_path.write_text(status, encoding='utf-8')

          review = {
              'schema_version': 'bloombet-free-api-public-review-v1',
              'reviewed_at': '2026-07-24',
              'formal_state': 'BLOOMBET_FREE_API_PUBLIC_REVIEW_BLOCKED',
              'source_id': 'bloombet_free_api',
              'official_pages_reviewed': [
                  'https://getbloombet.com/',
                  'https://getbloombet.com/api/documentation',
                  'https://getbloombet.com/about',
              ],
              'public_claims': {
                  'free_price_usd_per_month': 0,
                  'free_requests_per_month': 500,
                  'credit_card_required': False,
                  'sports_claimed': ['NBA', 'NFL'],
                  'live_access_claimed': True,
                  'historical_access_claimed': True,
                  'provider_count_claimed_minimum': 15,
                  'example_providers_claimed': ['Pinnacle', 'FanDuel', 'DraftKings'],
                  'moneyline_scope_claimed': True,
              },
              'public_review_findings': {
                  'api_documentation_landing_page_publicly_reachable': True,
                  'machine_readable_endpoint_schema_publicly_verified': False,
                  'request_parameter_schema_verified': False,
                  'response_field_schema_verified': False,
                  'bookmaker_key_field_verified': False,
                  'same_bookmaker_two_sided_h2h_verified': False,
                  'provider_snapshot_timestamp_field_verified': False,
                  'provider_timestamp_semantics_verified': False,
                  'scheduled_tipoff_field_verified': False,
                  'stable_source_event_id_verified': False,
                  'historical_coverage_start_verified': False,
                  'historical_retention_window_verified': False,
                  'opening_closing_identity_verified': False,
                  'terms_of_service_publicly_located_in_review': False,
                  'automated_research_use_rights_verified': False,
                  'private_quote_retention_rights_verified': False,
                  'public_redistribution_rights_verified': False,
              },
              'qualification_gate_result': {
                  'zero_cost_gate': 'PASS_PUBLIC_CLAIM_ONLY',
                  'no_card_gate': 'PASS_PUBLIC_CLAIM_ONLY',
                  'bookmaker_identity_gate': 'UNVERIFIED_SCHEMA',
                  'two_sided_h2h_gate': 'UNVERIFIED_SCHEMA',
                  'real_observed_at_gate': 'UNVERIFIED',
                  'strict_pre_tip_gate': 'UNVERIFIED',
                  'scheduled_tipoff_gate': 'UNVERIFIED',
                  'historical_coverage_gate': 'UNVERIFIED',
                  'terms_and_retention_gate': 'UNVERIFIED',
                  'overall': 'BLOCKED',
              },
              'decision': {
                  'qualified_for_historical_backfill': False,
                  'qualified_for_point_in_time_odds_join': False,
                  'qualified_for_forward_collection': False,
                  'qualified_for_market_backtest': False,
                  'account_creation_authorized': False,
                  'api_key_connection_authorized': False,
                  'api_request_execution_authorized': False,
                  'quote_download_authorized': False,
                  'raw_quote_retention_authorized': False,
                  'market_metrics_allowed': False,
                  'clv_ev_roi_allowed': False,
                  'betting_edge_claim_allowed': False,
                  'formal_stake': 0,
              },
              'next_exact_task': 'Obtain explicit user approval for a separately validated zero-cost schema probe. The user must create the free account and store the key privately; at most three official API requests may be used, with no raw quote rows committed or uploaded.',
          }
          (root / 'data/research/bloombet-free-api-public-review-v1.json').write_text(
              json.dumps(review, indent=2) + '\n', encoding='utf-8'
          )

          request = {
              'schema_version': 'bloombet-free-api-zero-cost-schema-probe-request-v1',
              'request_id': 'BLOOMBET-FREE-API-ZERO-COST-SCHEMA-PROBE-2026-07-24-001',
              'created_at': '2026-07-24',
              'formal_state': 'BLOOMBET_FREE_API_ZERO_COST_SCHEMA_PROBE_REQUEST_VALID_AWAITING_EXPLICIT_USER_APPROVAL',
              'parent_review': 'data/research/bloombet-free-api-public-review-v1.json',
              'purpose': 'Use no more than three official BloomBet free-tier API requests to verify response schema, bookmaker identity, two-sided h2h structure, timestamp semantics, scheduled tipoff, stable event identity, historical coverage and retention boundaries. This is schema qualification only.',
              'approval': {
                  'explicit_user_approval_required': True,
                  'approval_granted': False,
                  'approval_recorded_at': None,
                  'account_creation_authorized': False,
                  'private_api_key_connection_authorized': False,
                  'execution_enabled': False,
              },
              'user_only_setup': {
                  'user_creates_free_account': True,
                  'user_accepts_provider_terms': True,
                  'secret_name': 'BLOOMBET_API_KEY',
                  'secret_storage_target': 'GitHub Actions repository secret or equivalent private runtime secret',
                  'secret_may_be_pasted_into_chat': False,
                  'secret_may_be_committed': False,
                  'secret_may_appear_in_logs_or_artifacts': False,
              },
              'execution_limits': {
                  'maximum_execution_count': 1,
                  'execution_count': 0,
                  'maximum_api_requests': 3,
                  'bulk_history_download_allowed': False,
                  'pagination_allowed': False,
                  'paid_upgrade_allowed': False,
                  'credit_card_allowed': False,
                  'subscription_allowed': False,
                  'automatic_retry_allowed': False,
              },
              'allowed_probe_outputs': {
                  'endpoint_names_and_official_documentation_paths': True,
                  'request_parameter_names_and_types': True,
                  'response_field_names_and_types': True,
                  'redacted_single_response_shape': True,
                  'provider_timestamp_semantics_evidence': True,
                  'historical_coverage_metadata': True,
                  'quota_metadata': True,
                  'aggregate_gate_result': True,
              },
              'forbidden_outputs': [
                  'API key or authentication header',
                  'raw quote-level dataset',
                  'bulk historical rows',
                  'public quote-level Artifact',
                  'model edge',
                  'EV',
                  'CLV',
                  'ROI',
                  'drawdown',
                  'bet count',
                  'profit ranking',
                  'stake recommendation',
              ],
              'fail_closed_conditions': [
                  'official endpoint cannot be identified',
                  'free tier requires payment or credit card',
                  'terms cannot be reviewed or accepted by the user',
                  'provider timestamp meaning remains ambiguous',
                  'bookmaker identity is absent or inferred',
                  'same-bookmaker two-sided h2h cannot be proven',
                  'scheduled tipoff or stable event identity is absent',
                  'API key would be exposed in repository, logs, artifact or chat',
                  'request count would exceed three',
              ],
              'activation_boundary': {
                  'this_request_creates_account': False,
                  'this_request_connects_api_key': False,
                  'this_request_executes_api_calls': False,
                  'this_request_downloads_quotes': False,
                  'this_request_unlocks_market_backtest': False,
                  'this_request_unlocks_betting_claims': False,
                  'separate_approval_record_required': True,
                  'separate_execution_implementation_required': True,
                  'formal_stake': 0,
              },
          }
          (root / 'data/research/bloombet-free-api-zero-cost-schema-probe-request-v1.json').write_text(
              json.dumps(request, indent=2) + '\n', encoding='utf-8'
          )

          current = {
              'schema_version': 'no-cost-timestamped-odds-source-qualification-current-status-v3',
              'updated_at': '2026-07-24',
              'formal_state': 'NO_COST_TIMESTAMPED_ODDS_QUALIFICATION_BLOOMBET_PUBLIC_REVIEW_BLOCKED_AWAITING_SCHEMA_PROBE_APPROVAL',
              'supersedes': 'data/research/no-cost-timestamped-odds-source-qualification-current-status-v2.json',
              'completed_source_reviews': [
                  {
                      'source_id': 'kaggle_zachht_basketball_odds_history',
                      'result_path': 'data/research/kaggle-zachht-pinnacle-basketball-odds-archive-audit-v1.json',
                      'formal_result': 'KAGGLE_ZACHHT_PINNACLE_BASKETBALL_ODDS_ARCHIVE_RESEARCH_BLOCKED',
                      'qualified': False,
                  },
                  {
                      'source_id': 'bloombet_free_api',
                      'result_path': 'data/research/bloombet-free-api-public-review-v1.json',
                      'formal_result': 'BLOOMBET_FREE_API_PUBLIC_REVIEW_BLOCKED',
                      'qualified': False,
                  },
              ],
              'qualified_for_historical_backfill': [],
              'qualified_for_point_in_time_join': [],
              'active_request_design': {
                  'path': 'data/research/bloombet-free-api-zero-cost-schema-probe-request-v1.json',
                  'request_id': 'BLOOMBET-FREE-API-ZERO-COST-SCHEMA-PROBE-2026-07-24-001',
                  'approval_granted': False,
                  'execution_enabled': False,
                  'execution_count': 0,
                  'maximum_execution_count': 1,
                  'maximum_api_requests': 3,
              },
              'next_unique_mainline': 'BLOOMBET_FREE_API_ZERO_COST_SCHEMA_PROBE_AWAITING_EXPLICIT_USER_APPROVAL',
              'required_user_decision': 'APPROVE_OR_DECLINE_USER_CREATED_FREE_ACCOUNT_PRIVATE_SECRET_AND_MAX_THREE_SCHEMA_REQUESTS',
              'account_creation_authorized': False,
              'free_api_key_connection_authorized': False,
              'quote_download_authorized': False,
              'market_backtest_unlocked': False,
              'clv_ev_roi_unlocked': False,
              'betting_edge_claim_allowed': False,
              'formal_stake': 0,
          }
          (root / 'data/research/no-cost-timestamped-odds-source-qualification-current-status-v3.json').write_text(
              json.dumps(current, indent=2) + '\n', encoding='utf-8'
          )

          doc = '''# BloomBet Free API — Public Schema, Terms and Timestamp Review v1

          Date: 2026-07-24  
          Formal Stake: `0`

          ## Objective

          Complete the public-only BloomBet review required by the no-cost timestamped-odds qualification line. This review must not create an account, connect a key, execute API requests, download quote rows or calculate market performance.

          ## Public evidence located

          The official homepage publicly claims a free tier at USD 0 per month with 500 requests per month, NBA and NFL coverage, live and historical moneyline data, and 15+ providers. The official documentation landing page publicly states that a free key is available with 500 requests per month and no credit card.

          ## Unverified gates

          Publicly accessible material did not establish the endpoint request schema, response field schema, explicit bookmaker key, same-bookmaker two-sided h2h structure, provider-level observation timestamp field or meaning, scheduled tipoff field, stable event identifier, historical coverage start, retention window, opening/closing identity, automated research-use rights, private retention rights or redistribution rights.

          No public Terms of Service, API data-license or retention-rights page was located during this review. This records only that the material was not located and verified; it does not assert that no such terms exist behind account access.

          ## Formal decision

          ```text
          BLOOMBET_FREE_API_PUBLIC_REVIEW_BLOCKED
          ```

          BloomBet remains promising but is not qualified for historical backfill, point-in-time joining, forward collection, market backtesting or quote ingestion.

          ## Approval-gated next step

          A separate request design permits at most three official free-tier schema requests only after explicit user approval. The user must create the account and privately store `BLOOMBET_API_KEY`; the key must never be pasted into chat, committed, logged or uploaded as an Artifact.

          The probe may retain only endpoint names, parameter names/types, response field names/types, a redacted single-response shape, timestamp-semantics evidence, historical coverage metadata, quota metadata and an aggregate gate result. It may not retain or publish raw quote-level rows.

          ## Boundaries

          - No account has been created.
          - No API key has been connected.
          - No API request has been executed.
          - No paid plan or credit card is authorized.
          - No market metric is authorized.
          - Market backtesting remains blocked.
          - Formal Stake remains 0.
          '''
          (root / 'docs/bloombet-free-api-public-review-v1.md').write_text(
              '\n'.join(line[10:] if line.startswith('          ') else line for line in doc.splitlines()) + '\n',
              encoding='utf-8',
          )

          handoff = '''# NBA Value Lab Handoff — BloomBet Public Review

          Date: 2026-07-24  
          Formal Stake: `0`

          ## Project

          Repository: `qoo109/nba-value-lab`  
          Website: `https://qoo109.github.io/nba-value-lab/`

          ## Completed

          - Reviewed BloomBet official public homepage, API documentation landing page and About page.
          - Confirmed only public marketing claims for a USD 0, 500-request-per-month, no-card tier with NBA/NFL, live/historical and 15+ provider coverage.
          - Recorded that schema, timestamp semantics, historical coverage, terms and retention rights remain unverified.
          - Created a fail-closed maximum-three-request schema-probe design.
          - Did not create an account, connect a key, call the API, retain quotes or run market metrics.

          ## Formal states

          ```text
          public review: BLOOMBET_FREE_API_PUBLIC_REVIEW_BLOCKED
          schema probe request: VALID / AWAITING EXPLICIT USER APPROVAL
          execution count: 0 / 1
          maximum API requests: 3
          market backtest: BLOCKED
          formal Stake: 0
          ```

          ## One unique next prerequisite line

          ```text
          BLOOMBET_FREE_API_ZERO_COST_SCHEMA_PROBE_AWAITING_EXPLICIT_USER_APPROVAL
          ```

          ## Required user action

          The user must explicitly approve or decline a user-created BloomBet free account, private `BLOOMBET_API_KEY` setup and at most three schema requests. The key must not be pasted into chat.

          ## Do Not Do

          - Do not create an account on the user's behalf.
          - Do not accept provider terms on the user's behalf.
          - Do not place the API key in repository files, chat, logs or Artifacts.
          - Do not exceed three requests.
          - Do not retain or publish raw quote-level rows.
          - Do not unlock market backtesting, CLV, EV, ROI, drawdown or betting claims.
          - Do not raise Stake above 0.
          '''
          (root / 'docs/handoffs/nba_value_lab_handoff_2026-07-24_bloombet_public_review.md').write_text(
              '\n'.join(line[10:] if line.startswith('          ') else line for line in handoff.splitlines()) + '\n',
              encoding='utf-8',
          )

          validator = '''#!/usr/bin/env python3
          from __future__ import annotations

          import json
          from pathlib import Path

          root = Path(__file__).resolve().parents[1]
          review = json.loads((root / 'data/research/bloombet-free-api-public-review-v1.json').read_text(encoding='utf-8'))
          request = json.loads((root / 'data/research/bloombet-free-api-zero-cost-schema-probe-request-v1.json').read_text(encoding='utf-8'))
          current = json.loads((root / 'data/research/no-cost-timestamped-odds-source-qualification-current-status-v3.json').read_text(encoding='utf-8'))
          status = (root / 'PROJECT_STATUS.md').read_text(encoding='utf-8')
          doc = (root / 'docs/bloombet-free-api-public-review-v1.md').read_text(encoding='utf-8')
          handoff = (root / 'docs/handoffs/nba_value_lab_handoff_2026-07-24_bloombet_public_review.md').read_text(encoding='utf-8')

          assert review['formal_state'] == 'BLOOMBET_FREE_API_PUBLIC_REVIEW_BLOCKED'
          assert review['public_claims']['free_price_usd_per_month'] == 0
          assert review['public_claims']['free_requests_per_month'] == 500
          assert review['public_claims']['credit_card_required'] is False
          assert review['qualification_gate_result']['overall'] == 'BLOCKED'
          assert review['decision']['qualified_for_historical_backfill'] is False
          assert review['decision']['qualified_for_point_in_time_odds_join'] is False
          assert review['decision']['account_creation_authorized'] is False
          assert review['decision']['api_key_connection_authorized'] is False
          assert review['decision']['api_request_execution_authorized'] is False
          assert review['decision']['market_metrics_allowed'] is False
          assert review['decision']['formal_stake'] == 0

          assert request['formal_state'] == 'BLOOMBET_FREE_API_ZERO_COST_SCHEMA_PROBE_REQUEST_VALID_AWAITING_EXPLICIT_USER_APPROVAL'
          assert request['approval']['approval_granted'] is False
          assert request['approval']['account_creation_authorized'] is False
          assert request['approval']['private_api_key_connection_authorized'] is False
          assert request['approval']['execution_enabled'] is False
          assert request['execution_limits']['maximum_execution_count'] == 1
          assert request['execution_limits']['execution_count'] == 0
          assert request['execution_limits']['maximum_api_requests'] == 3
          assert request['execution_limits']['bulk_history_download_allowed'] is False
          assert request['execution_limits']['pagination_allowed'] is False
          assert request['user_only_setup']['secret_may_be_pasted_into_chat'] is False
          assert request['user_only_setup']['secret_may_be_committed'] is False
          assert request['user_only_setup']['secret_may_appear_in_logs_or_artifacts'] is False
          assert request['activation_boundary']['this_request_executes_api_calls'] is False
          assert request['activation_boundary']['this_request_unlocks_market_backtest'] is False
          assert request['activation_boundary']['formal_stake'] == 0

          assert current['formal_state'] == 'NO_COST_TIMESTAMPED_ODDS_QUALIFICATION_BLOOMBET_PUBLIC_REVIEW_BLOCKED_AWAITING_SCHEMA_PROBE_APPROVAL'
          assert current['next_unique_mainline'] == 'BLOOMBET_FREE_API_ZERO_COST_SCHEMA_PROBE_AWAITING_EXPLICIT_USER_APPROVAL'
          assert current['account_creation_authorized'] is False
          assert current['free_api_key_connection_authorized'] is False
          assert current['market_backtest_unlocked'] is False
          assert current['formal_stake'] == 0

          required_status = [
              'bloombet public review: COMPLETED / BLOCKED',
              'bloombet public response schema: NOT VERIFIED',
              'bloombet zero-cost schema probe request design: VALIDATED / AWAITING EXPLICIT USER APPROVAL',
              'BLOOMBET_FREE_API_ZERO_COST_SCHEMA_PROBE_AWAITING_EXPLICIT_USER_APPROVAL',
              'BLOCKED — ACCOUNT CREATION AND PRIVATE API KEY CONNECTION NOT AUTHORIZED',
              'formal Stake: 0',
          ]
          for item in required_status:
              if item not in status:
                  raise SystemExit(f'missing PROJECT_STATUS evidence: {item}')

          for text, label in [(doc, 'documentation'), (handoff, 'handoff')]:
              for item in [
                  'BLOOMBET_FREE_API_PUBLIC_REVIEW_BLOCKED',
                  'BLOOMBET_FREE_API_ZERO_COST_SCHEMA_PROBE_AWAITING_EXPLICIT_USER_APPROVAL',
                  'Formal Stake',
              ]:
                  if item not in text:
                      raise SystemExit(f'missing {label} evidence: {item}')

          report = {
              'schema_version': 1,
              'formal_state': 'BLOOMBET_FREE_API_PUBLIC_REVIEW_AND_SCHEMA_PROBE_REQUEST_VALID',
              'public_review_valid': True,
              'request_design_valid': True,
              'approval_granted': False,
              'execution_enabled': False,
              'execution_count': 0,
              'maximum_api_requests': 3,
              'account_created': False,
              'api_key_connected': False,
              'api_requests_executed': 0,
              'raw_quotes_retained': False,
              'market_backtest_executed': False,
              'market_metrics_executed': False,
              'formal_stake': 0,
              'next_unique_mainline': 'BLOOMBET_FREE_API_ZERO_COST_SCHEMA_PROBE_AWAITING_EXPLICIT_USER_APPROVAL',
          }
          out = root / 'build/bloombet-free-api-public-review-validation-v1.json'
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(report, indent=2) + '\n', encoding='utf-8')
          print(json.dumps(report, indent=2))
          '''
          (root / 'scripts/validate_bloombet_free_api_public_review_v1.py').write_text(
              '\n'.join(line[10:] if line.startswith('          ') else line for line in validator.splitlines()) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Commit public review records
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record BloomBet public review and gated schema probe"
          git push origin HEAD:${{ github.head_ref }}
