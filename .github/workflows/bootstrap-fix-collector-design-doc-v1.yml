name: Bootstrap fix collector design documentation v1

on:
  pull_request:
    types: [synchronize, reopened]
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'research/source-agnostic-private-forward-collector-design-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Add formal state to documentation
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('docs/source-agnostic-private-forward-odds-collector-v1.md')
          text = path.read_text(encoding='utf-8')
          old = """狀態：**Design validated / Offline implementation not started**  
          Formal Stake：`0`"""
          new = """狀態：**Design validated / Offline implementation not started**  
          Formal state：`SOURCE_AGNOSTIC_PRIVATE_FORWARD_ODDS_COLLECTOR_DESIGN_VALIDATED`  
          Formal Stake：`0`"""
          if text.count(old) != 1:
              raise SystemExit('unexpected collector documentation header anchor count')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Commit documentation fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/source-agnostic-private-forward-odds-collector-v1.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add collector design formal state to documentation"
            git push origin HEAD:${{ github.head_ref }}
          fi
