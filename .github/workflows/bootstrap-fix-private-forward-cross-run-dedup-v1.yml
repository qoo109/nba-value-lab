name: Bootstrap private forward cross-run dedup fix v1

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'fix/private-forward-collector-cross-run-dedup-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Patch cross-run dedup contract
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          core = Path('scripts/private_forward_odds_collector_v1.py')
          text = core.read_text(encoding='utf-8')
          start = text.index('def canonical_hash_payload')
          end = text.index('\n\ndef deterministic_row_hash', start)
          replacement = '''def canonical_hash_payload(record: dict[str, Any]) -> dict[str, Any]:
              """Return the frozen provider-neutral dedup key from the design contract.

              Run identity and adapter metadata are deliberately excluded so the same quote
              observed again in a later collector run is counted as a duplicate rather than
              inserted as a second coverage row.
              """
              return {
                  key: record.get(key)
                  for key in (
                      "source_id",
                      "source_event_id",
                      "bookmaker_key",
                      "market_key",
                      "quote_time_authority",
                      "quote_observed_at_utc",
                      "collector_fetched_at_utc",
                      "home_price_decimal",
                      "away_price_decimal",
                  )
              }
          '''
          core.write_text(text[:start] + replacement + text[end:], encoding='utf-8')

          validator = Path('scripts/validate_private_forward_odds_collector_offline_core_v1.py')
          text = validator.read_text(encoding='utf-8')
          old = '''        assert raw_payload_rows == 0
                  assert quarantine_rows == 2

              assert current["formal_state"]'''
          new = '''        assert raw_payload_rows == 0
                  assert quarantine_rows == 2

                  second = collect_offline(
                      [fixture["quotes"][0]],
                      collector_run_id="SYNTHETIC-OFFLINE-COLLECTOR-2026-07-24-002",
                      private_db_path=db_path,
                      started_at_utc="2026-07-24T00:05:00Z",
                  )
                  assert second.aggregate_qa["normalized_private_records"] == 0
                  assert second.aggregate_qa["duplicate_records"] == 1
                  connection = sqlite3.connect(str(db_path))
                  try:
                      assert connection.execute("SELECT COUNT(*) FROM quotes").fetchone()[0] == 3
                      assert connection.execute("SELECT COUNT(*) FROM collector_runs").fetchone()[0] == 2
                  finally:
                      connection.close()

              assert current["formal_state"]'''
          if text.count(old) != 1:
              raise SystemExit('unexpected validator cross-run anchor count')
          text = text.replace(old, new, 1)
          old_report = '''        "deduplication_valid": True,
                  "quarantine_valid": True,'''
          new_report = '''        "deduplication_valid": True,
                  "cross_run_deduplication_valid": True,
                  "quarantine_valid": True,'''
          if text.count(old_report) != 1:
              raise SystemExit('unexpected validator report anchor count')
          validator.write_text(text.replace(old_report, new_report, 1), encoding='utf-8')

          policy_path = Path('data/research/source-agnostic-private-forward-odds-collector-offline-core-v1.json')
          policy = json.loads(policy_path.read_text(encoding='utf-8'))
          policy['capabilities']['cross_run_deduplication'] = True
          policy_path.write_text(json.dumps(policy, indent=2) + '\n', encoding='utf-8')

          current_path = Path('data/research/no-cost-timestamped-odds-source-qualification-current-status-v6.json')
          current = json.loads(current_path.read_text(encoding='utf-8'))
          current['offline_core']['cross_run_deduplication'] = True
          current['offline_validation_contract']['cross_run_deduplication_required'] = True
          current_path.write_text(json.dumps(current, indent=2) + '\n', encoding='utf-8')

          doc = Path('docs/source-agnostic-private-forward-odds-collector-offline-core-v1.md')
          text = doc.read_text(encoding='utf-8')
          text = text.replace(
              '- duplicate 計數與 quarantine；',
              '- 同一 quote 跨 collector run 的 deterministic duplicate 計數與 quarantine；',
              1,
          )
          text = text.replace(
              '8. duplicate 不重複計 coverage；',
              '8. duplicate 在同一或不同 collector run 都不重複計 coverage；',
              1,
          )
          doc.write_text(text, encoding='utf-8')

          handoff = Path('docs/handoffs/nba_value_lab_handoff_2026-07-24_private_forward_collector_offline_core.md')
          text = handoff.read_text(encoding='utf-8')
          text = text.replace(
              '- Deterministic hash, duplicate handling and quarantine.',
              '- Deterministic hash, same-run and cross-run duplicate handling, and quarantine.',
              1,
          )
          handoff.write_text(text, encoding='utf-8')
          PY

      - name: Compile and commit correction
        run: |
          python -m py_compile scripts/private_forward_odds_collector_v1.py
          python -m py_compile scripts/validate_private_forward_odds_collector_offline_core_v1.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/private_forward_odds_collector_v1.py \
            scripts/validate_private_forward_odds_collector_offline_core_v1.py \
            data/research/source-agnostic-private-forward-odds-collector-offline-core-v1.json \
            data/research/no-cost-timestamped-odds-source-qualification-current-status-v6.json \
            docs/source-agnostic-private-forward-odds-collector-offline-core-v1.md \
            docs/handoffs/nba_value_lab_handoff_2026-07-24_private_forward_collector_offline_core.md
          git commit -m "Enforce cross-run private quote deduplication"
          git push origin HEAD:${{ github.head_ref }}
