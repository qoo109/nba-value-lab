name: Bootstrap G1.2.0 status sync

on:
  push:
    branches:
      - docs/sync-g1-2-0-status-v1

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs/sync-g1-2-0-status-v1
          fetch-depth: 0

      - name: Patch status documents and add validation
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected exactly 1 match, found {count}")
              return text.replace(old, new, 1)

          status_path = Path("PROJECT_STATUS.md")
          status = status_path.read_text(encoding="utf-8")
          status = replace_once(status, "狀態核對日期：2026-07-23  ", "狀態核對日期：2026-07-24  ", "status date")
          status = replace_once(
              status,
              "G1.2.0 live decision output: IMPLEMENTED / FIXTURE VALIDATION REQUIRED",
              """G1.2.0 live decision output: IMPLEMENTED / FIXTURE VALIDATED / REAL GOVERNED INPUT VALIDATION REQUIRED
          G1.2.0 validation formal state: G1_2_0_LIVE_OUTPUT_IMPLEMENTATION_VALID
          G1.2.0 validation run: 30025555150
          G1.2.0 validation artifact: 8571205516
          G1.2.0 validation artifact digest: sha256:0d5d4d65f8b50e9bc81057b1aaa96620d2f3b40c5a75df66357cbe58432b8ccb""",
              "G1.2.0 milestone state",
          )
          status = replace_once(
              status,
              "prediction record schema: 1.4.0\nformal Stake: 0",
              """prediction record schema: 1.4.0
          current real-input status: BLOCKED / REAL GOVERNED INPUT NOT AVAILABLE
          formal Stake: 0""",
              "G1.2.0 real-input status",
          )
          status = replace_once(
              status,
              "current work mode: OFFSEASON_DATA_CONSTRUCTION",
              """current work mode: OFFSEASON_DATA_CONSTRUCTION
          active offseason G: G1.1.1
          scheduled next G: G1.2.0 / first 2026-27 regular-season game with complete T-60 data gate
          real governed 2026-27 T-60 input: NOT AVAILABLE""",
              "current control G status",
          )
          status = replace_once(
              status,
              """## Next Unique Mainline

          ```text
          TIMESTAMPED_BOOKMAKER_ODDS_REAL_OBSERVED_AT_DATA_ACQUISITION_REQUIRED
          ```""",
              """## Next Unique Mainline

          ```text
          VALIDATE_G1_2_0_END_TO_END_WITH_REAL_GOVERNED_2026_27_T60_INPUT
          ```

          Current status:

          ```text
          BLOCKED — REAL GOVERNED INPUT NOT AVAILABLE
          ```

          Required prerequisite:

          ```text
          TIMESTAMPED_BOOKMAKER_ODDS_REAL_OBSERVED_AT_DATA_ACQUISITION_REQUIRED
          ```""",
              "next unique mainline",
          )
          status = replace_once(
              status,
              "## Completed Evidence\n\n\n### Historical Gold 5,826 real Artifact semantic freeze execution",
              """## Completed Evidence

          ### G1.2.0 EV-primary live output implementation and fixture validation

          ```text
          PR: 153 / merged
          merge commit: bcb66ba5b207d6a86cf87b3aeed18f3f3c2c0115
          formal state: G1_2_0_LIVE_OUTPUT_IMPLEMENTATION_VALID
          validation run: 30025555150
          validation artifact: 8571205516
          validation artifact digest: sha256:0d5d4d65f8b50e9bc81057b1aaa96620d2f3b40c5a75df66357cbe58432b8ccb
          real governed 2026-27 T-60 validation executed: false
          formal Stake: 0
          ```

          The implementation, contract, executable T-60/T-5 fixtures, frontend routing, model registry and repository-hygiene boundaries passed. This does not substitute for a real governed 2026-27 regular-season T-60 input.

          ### Historical Gold 5,826 real Artifact semantic freeze execution""",
              "completed evidence insertion",
          )
          status = replace_once(
              status,
              "### Historical Gold 5,826 real Artifact execution request validation",
              """### Historical Gold 5,826 real Artifact execution request validation — historical pre-execution snapshot

          > Historical evidence only. This snapshot was superseded by the completed, consumed execution recorded above.""",
              "superseded request snapshot heading",
          )
          status_path.write_text(status, encoding="utf-8")

          readme_path = Path("README.md")
          readme = readme_path.read_text(encoding="utf-8")
          readme = replace_once(
              readme,
              "目前已完成五季 Historical Gold、Logistic + Elo Walk-forward v2、Calibration Gate、Closing Market Benchmark、Market Residual Analysis、Rest／Travel holdout、官方傷病報告 importer、Player Identity、Expected Minutes research proxy、Team Injury Burden、Multi-report Injury Panel、Injury Residual Audit、2023-24 Historical Silver source archive reconciliation、privacy-safe source-gap exception manifest／integration policy，以及 synthetic-only pure aggregate integration transformer。",
              "目前已完成五季 Historical Gold、Logistic + Elo Walk-forward v2、Calibration Gate、Closing Market Benchmark、Market Residual Analysis、Rest／Travel holdout、官方傷病報告 importer、Player Identity、Expected Minutes research proxy、Team Injury Burden、Multi-report Injury Panel、Injury Residual Audit、2023-24 Historical Silver／Gold 完整 reconciliation、Historical Gold 5,826 semantic freeze，以及 G1.2.0 EV-primary live output 的 fixture／contract／frontend／repository-hygiene 驗證。",
              "README pipeline summary",
          )
          readme = replace_once(
              readme,
              "- source-gap exception manifest、integration policy 與 pure transformer 已通過 aggregate-only／synthetic-only 驗證；它們不包含 game IDs、日期或隊伍代碼，也不授權 row patch、Silver／Gold rebuild 或模型使用。下一步僅能設計另行核准的 real-reference validation request。",
              "- source-gap exception integration 的 real-reference validation 已執行、PASS 並 consumed；Historical Gold 5,826 semantic freeze 也已完成，一次性 request 與 executor 均不得重跑。",
              "README source-gap status",
          )
          readme = replace_once(
              readme,
              "- Odds schema／source registry 已完成；真正缺少的是有 observation timestamp 的真實 opening／intraday／closing odds 資料。",
              """- G1.2.0 EV-primary live output 已由 PR #153 合併，aggregate QA formal state 為 `G1_2_0_LIVE_OUTPUT_IMPLEMENTATION_VALID`；休賽季 active G 仍為 G1.1.1。
          - G1.2.0 的下一個正式里程碑是以真實、受治理的 2026–27 例行賽 T-60 輸入完成端到端驗證；目前狀態是 `BLOCKED — REAL GOVERNED INPUT NOT AVAILABLE`。
          - Odds schema／source registry 已完成；真正缺少的是有 observation timestamp 的真實 opening／intraday／closing odds 資料，這也是上述真實 T-60 驗證的必要前置。""",
              "README G1.2.0 blocker",
          )
          readme = replace_once(readme, "## Legacy UI／Registry：V3.1.1 × G1.1.1", "## Active Registry／Scheduled Upgrade", "README registry heading")
          readme = replace_once(
              readme,
              """目前啟用：

          - V3.1.1：`V3.1.1-20260719`
          - G1.1.1：`G1.1.1-20260719`
          - 協調層：`V3.1.1_X_G1.1.1-20260719`""",
              """目前啟用：

          - V3.1.1：`V3.1.1-20260719`
          - G1.1.1：`G1.1.1-20260719`
          - 協調層：`V3.1.1_X_G1.1.1-20260719`

          已核准的下一版本：

          - G1.2.0：`G1.2.0-20260723`
          - 協調層：`V3.1.1_X_G1.2.0-20260724`
          - 啟用條件：第一場明確標示 `season=2026-27`、`competition_type=regular_season` 且完整通過 T-60 Data Gate 的例行賽。
          - 啟用前 G1.2.0 只作 Scheduled Shadow；啟用後 G1.1.1 保留為 Control／Shadow。""",
              "README active and scheduled registry",
          )
          readme = replace_once(
              readme,
              """│  ├─ 1.1-main-2-max-3/
          │  └─ 1.1.1/
          ├─ coordination/
          │  └─ v3.1.1-g1.1.1/""",
              """│  ├─ 1.1-main-2-max-3/
          │  ├─ 1.1.1/
          │  └─ 1.2.0/
          ├─ coordination/
          │  ├─ v3.1.1-g1.1.1/
          │  └─ v3.1.1-g1.2.0/""",
              "README model tree",
          )
          readme = replace_once(
              readme,
              "## 免費資料層",
              """## G1.2.0 重點

          - Conservative EV：`P_C × decimal_odds − 1`。
          - 固定分級門檻：候選／ㄇ級 5%、ㄆ級 7%、ㄅ級 10%。
          - PP Edge 2pp 是硬安全底線，EV 不得繞過 Coverage、傷病、來源、時間戳、OOD、stale、新聞風險或同場雙邊衝突 Gate。
          - T-60 與 T-5 紀錄保存 EV、門檻距離、PP Guard 與平行版本結果。
          - Fixture 驗證已完成；真實 2026–27 governed T-60 驗證尚未執行。
          - 正式 Stake 維持 0。

          ## 免費資料層""",
              "README G1.2.0 section",
          )
          readme = replace_once(
              readme,
              """5. 推送到 `main`。
          6. Registry、JSON 與 JavaScript 驗證通過後，由 GitHub Pages 發布。""",
              """5. 從 `main` 建立 branch，提交變更並開 Pull Request。
          6. PR 必須通過專用 CI 與 Artifact QA；確認正式數字與 promotion flags 後才可合併到 `main`。
          7. 合併後由 GitHub Pages 發布；不得直接修改 `main`。""",
              "README update workflow",
          )
          readme = replace_once(
              readme,
              "- `models/manifest.json`：啟用模型版本。",
              """- `models/manifest.json`：Active 與 Scheduled 模型版本。
          - `models/g1/1.2.0/`：G1.2.0 EV-primary 規格與設定。
          - `scripts/g1_2_0_runtime.py`：G1.2.0 fail-closed resolver 與 EV-primary runtime。
          - `scripts/validate_g1_2_0_status_sync_v1.py`：PROJECT_STATUS／README／Registry／Handoff 一致性驗證。""",
              "README primary files",
          )
          readme = replace_once(
              readme,
              "Legacy UI 內的勝率與候選仍可能包含示範資料。正式研究管線已完成 Walk-forward、Calibration Gate、Closing Market Benchmark、多個 holdout／殘差實驗、source archive reconciliation、aggregate-only source-gap exception manifest／policy，以及 synthetic-only integration transformer，但尚未完成 real-reference transformer validation、real timestamped odds backfill、executable market backtest、CLV、EV、ROI、Drawdown 與正式鎖版前瞻測試。",
              "Legacy UI 內的勝率與候選仍可能包含示範資料。正式研究管線已完成 Walk-forward、Calibration Gate、Closing Market Benchmark、多個 holdout／殘差實驗、完整 Silver／Gold reconciliation、real-reference exception validation、Historical Gold 5,826 semantic freeze，以及 G1.2.0 EV-primary live output 的 fixture 驗證；但尚未完成真實 2026–27 governed T-60 端到端驗證、real timestamped odds backfill、executable market backtest、CLV、ROI、Drawdown 與正式鎖版前瞻測試。",
              "README research statement",
          )
          readme_path.write_text(readme, encoding="utf-8")

          Path("docs/handoffs/nba_value_lab_handoff_2026-07-24_g1_2_0_status_sync.md").write_text('# NBA Value Lab Handoff — G1.2.0 Status Documentation Sync\n\nDate: 2026-07-24  \nFormal Stake: `0`\n\n## Repository state before this documentation milestone\n\n```text\nmain: bcb66ba5b207d6a86cf87b3aeed18f3f3c2c0115\nlatest merged PR: 153\nopen PRs before branch creation: none\n```\n\n## Completed evidence being synchronized\n\n```text\nG1.2.0 implementation PR: 153 / merged\nformal state: G1_2_0_LIVE_OUTPUT_IMPLEMENTATION_VALID\nvalidation run: 30025555150\nvalidation artifact: 8571205516\nvalidation artifact digest: sha256:0d5d4d65f8b50e9bc81057b1aaa96620d2f3b40c5a75df66357cbe58432b8ccb\n```\n\nThe implementation, contract, executable fixtures, frontend routing, model registry and repository-hygiene boundaries passed. This milestone updates status documentation only; it does not execute a real 2026–27 input or market backtest.\n\n## Active and scheduled versions\n\n```text\nActive V: V3.1.1-20260719\nActive G: G1.1.1-20260719\nScheduled G: G1.2.0-20260723\nScheduled coordination: V3.1.1_X_G1.2.0-20260724\nFormal Stake: 0\n```\n\n## One unique next mainline\n\n```text\nVALIDATE_G1_2_0_END_TO_END_WITH_REAL_GOVERNED_2026_27_T60_INPUT\n```\n\nCurrent status:\n\n```text\nBLOCKED — REAL GOVERNED INPUT NOT AVAILABLE\n```\n\nNecessary prerequisite:\n\n```text\nTIMESTAMPED_BOOKMAKER_ODDS_REAL_OBSERVED_AT_DATA_ACQUISITION_REQUIRED\n```\n\n## Do Not Do\n\n- Do not redo or overwrite PR #153.\n- Do not activate G1.2.0 before the explicit 2026–27 regular-season trigger and complete T-60 Gate.\n- Do not infer season or competition type from file dates.\n- Do not substitute fixture or Closing-only data for a real governed T-60 input.\n- Do not bypass the 2pp PP Guard or any hard data/risk Gate.\n- Do not retrain models, enable market backtesting, claim betting edge or raise Stake above 0.\n', encoding="utf-8")
          Path("scripts/validate_g1_2_0_status_sync_v1.py").write_text('#!/usr/bin/env python3\nfrom __future__ import annotations\n\nimport json\nfrom pathlib import Path\n\n\ndef require(text: str, needle: str, label: str) -> None:\n    if needle not in text:\n        raise SystemExit(f"missing {label}: {needle}")\n\n\ndef forbid(text: str, needle: str, label: str) -> None:\n    if needle in text:\n        raise SystemExit(f"stale {label}: {needle}")\n\n\nroot = Path(__file__).resolve().parents[1]\nstatus = (root / "PROJECT_STATUS.md").read_text(encoding="utf-8")\nreadme = (root / "README.md").read_text(encoding="utf-8")\nhandoff = (\n    root\n    / "docs/handoffs/nba_value_lab_handoff_2026-07-24_g1_2_0_status_sync.md"\n).read_text(encoding="utf-8")\nmanifest = json.loads((root / "models/manifest.json").read_text(encoding="utf-8"))\n\nrequired_status = [\n    "IMPLEMENTED / FIXTURE VALIDATED / REAL GOVERNED INPUT VALIDATION REQUIRED",\n    "G1_2_0_LIVE_OUTPUT_IMPLEMENTATION_VALID",\n    "validation run: 30025555150",\n    "validation artifact: 8571205516",\n    "VALIDATE_G1_2_0_END_TO_END_WITH_REAL_GOVERNED_2026_27_T60_INPUT",\n    "BLOCKED — REAL GOVERNED INPUT NOT AVAILABLE",\n    "TIMESTAMPED_BOOKMAKER_ODDS_REAL_OBSERVED_AT_DATA_ACQUISITION_REQUIRED",\n    "formal Stake: 0",\n]\nfor item in required_status:\n    require(status, item, "PROJECT_STATUS value")\nforbid(\n    status,\n    "G1.2.0 live decision output: IMPLEMENTED / FIXTURE VALIDATION REQUIRED",\n    "PROJECT_STATUS lifecycle",\n)\n\nrequired_readme = [\n    "G1.2.0 EV-primary live output 已由 PR #153 合併",\n    "G1_2_0_LIVE_OUTPUT_IMPLEMENTATION_VALID",\n    "BLOCKED — REAL GOVERNED INPUT NOT AVAILABLE",\n    "不得直接修改 `main`",\n    "正式 Stake 維持 0",\n]\nfor item in required_readme:\n    require(readme, item, "README value")\nforbid(readme, "尚未完成 real-reference transformer validation", "README old blocker")\n\nrequired_handoff = [\n    "main: bcb66ba5b207d6a86cf87b3aeed18f3f3c2c0115",\n    "latest merged PR: 153",\n    "validation artifact: 8571205516",\n    "VALIDATE_G1_2_0_END_TO_END_WITH_REAL_GOVERNED_2026_27_T60_INPUT",\n    "BLOCKED — REAL GOVERNED INPUT NOT AVAILABLE",\n    "Formal Stake: `0`",\n]\nfor item in required_handoff:\n    require(handoff, item, "handoff value")\n\nassert manifest["active"]["V"]["revision_id"] == "V3.1.1-20260719"\nassert manifest["active"]["G"]["revision_id"] == "G1.1.1-20260719"\nassert manifest["scheduled_next"]["G"]["revision_id"] == "G1.2.0-20260723"\nassert (\n    manifest["scheduled_next"]["G"]["activation_trigger"]\n    == "first_2026_27_regular_season_game_with_complete_T60_data_gate"\n)\nassert manifest["scheduled_next"]["G"]["formal_stake_fraction"] == 0\nassert (\n    manifest["scheduled_next"]["coordination"]["coordination_id"]\n    == "V3.1.1_X_G1.2.0-20260724"\n)\n\nreport = {\n    "schema_version": 1,\n    "formal_state": "G1_2_0_STATUS_DOCUMENTATION_SYNC_VALID",\n    "project_status_synced": True,\n    "readme_synced": True,\n    "handoff_created": True,\n    "active_g": manifest["active"]["G"]["revision_id"],\n    "scheduled_g": manifest["scheduled_next"]["G"]["revision_id"],\n    "next_mainline": "VALIDATE_G1_2_0_END_TO_END_WITH_REAL_GOVERNED_2026_27_T60_INPUT",\n    "current_status": "BLOCKED_REAL_GOVERNED_INPUT_NOT_AVAILABLE",\n    "market_backtest_executed": False,\n    "model_retraining_executed": False,\n    "formal_stake": 0,\n}\nout = root / "build/g1-2-0-status-sync-validation-v1.json"\nout.parent.mkdir(parents=True, exist_ok=True)\nout.write_text(json.dumps(report, indent=2) + "\\n", encoding="utf-8")\nprint(json.dumps(report, indent=2))\n', encoding="utf-8")
          Path(".github/workflows/validate-g1-2-0-status-sync-v1.yml").write_text('name: Validate G1.2.0 status sync v1\n\non:\n  pull_request:\n    paths:\n      - PROJECT_STATUS.md\n      - README.md\n      - models/manifest.json\n      - docs/handoffs/nba_value_lab_handoff_2026-07-24_g1_2_0_status_sync.md\n      - scripts/validate_g1_2_0_status_sync_v1.py\n      - .github/workflows/validate-g1-2-0-status-sync-v1.yml\n  workflow_dispatch:\n\npermissions:\n  contents: read\n\njobs:\n  validate:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n\n      - name: Validate status synchronization\n        run: python scripts/validate_g1_2_0_status_sync_v1.py\n\n      - name: Upload aggregate QA\n        uses: actions/upload-artifact@v4\n        with:\n          name: g1-2-0-status-sync-validation-v1\n          path: build/g1-2-0-status-sync-validation-v1.json\n          retention-days: 14\n', encoding="utf-8")
          Path(".github/workflows/bootstrap-g1-2-0-status-sync.yml").unlink()

          PY

      - name: Commit synchronized status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Sync G1.2.0 status documentation and QA"
          git push origin HEAD:docs/sync-g1-2-0-status-v1
