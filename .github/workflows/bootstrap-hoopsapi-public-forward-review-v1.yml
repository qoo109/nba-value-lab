name: Bootstrap HoopsAPI public forward review v1

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: ${{ github.head_ref == 'research/hoopsapi-public-forward-review-v1' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Patch PROJECT_STATUS
        run: python scripts/patch_hoopsapi_project_status_v1.py

      - name: Commit PROJECT_STATUS update
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add PROJECT_STATUS.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Record HoopsAPI forward-only review in project status"
            git push origin HEAD:${{ github.head_ref }}
          fi
