name: Bootstrap private forward collector offline core v1

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'feature/private-forward-collector-offline-core-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Patch project status and recording PR
        env:
          RECORDING_PR: ${{ github.event.pull_request.number }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          status_path = Path('PROJECT_STATUS.md')
          text = status_path.read_text(encoding='utf-8')

          old_facts = """forward collector provider requests executed: 0
          injury panel activation: 41 independent games / 31 T-60 selected / below 100-game gate"""
          new_facts = """forward collector provider requests executed: 0
          forward odds collector offline core: VALIDATED / SYNTHETIC ONLY
          forward collector offline SQLite writes: TEMPORARY PRIVATE ONLY
          forward collector offline synthetic tests: 12 / PASS
          forward collector offline network client: false
          forward collector offline provider requests executed: 0
          forward collector offline real quotes retained: 0
          injury panel activation: 41 independent games / 31 T-60 selected / below 100-game gate"""
          if text.count(old_facts) != 1:
              raise SystemExit('unexpected offline collector fact anchor count')
          text = text.replace(old_facts, new_facts, 1)

          old_mainline = 'IMPLEMENT_SOURCE_AGNOSTIC_PRIVATE_FORWARD_ODDS_COLLECTOR_OFFLINE_CORE_V1'
          new_mainline = 'DESIGN_FIRST_PROVIDER_PRIVATE_FORWARD_ADAPTER_QUALIFICATION_GATE_V1'
          if text.count(old_mainline) != 2:
              raise SystemExit('unexpected offline core mainline anchor count')
          text = text.replace(old_mainline, new_mainline, 2)

          old_status = 'READY — OFFLINE IMPLEMENTATION ONLY / NETWORK DISABLED'
          new_status = 'READY — DESIGN ONLY / NO PROVIDER EXECUTION'
          if text.count(old_status) != 1:
              raise SystemExit('unexpected offline core status anchor count')
          text = text.replace(old_status, new_status, 1)

          anchor = '## Completed Evidence\n\n### Source-agnostic private forward odds collector design'
          evidence = """## Completed Evidence

          ### Source-agnostic private forward odds collector offline core

          ```text
          formal state: SOURCE_AGNOSTIC_PRIVATE_FORWARD_ODDS_COLLECTOR_OFFLINE_CORE_VALIDATED
          implementation: OFFLINE / SYNTHETIC ONLY
          canonical module: scripts/private_forward_odds_collector_v1.py
          timestamp authority validation: ENABLED
          collector_fetched_at may substitute provider observed_at: false
          deterministic row hash: ENABLED
          duplicate handling: PASS
          quarantine: PASS
          temporary private SQLite write: PASS
          synthetic contract tests: 12 / PASS
          HTTP client included: false
          secret reader included: false
          scheduler included: false
          provider requests executed: 0
          real provider payloads processed: 0
          real quotes retained: 0
          public quote rows emitted: 0
          market metrics executed: false
          formal Stake: 0
          next unique sub-mainline: DESIGN_FIRST_PROVIDER_PRIVATE_FORWARD_ADAPTER_QUALIFICATION_GATE_V1
          ```

          The offline core validates timestamp authority, exact mapping eligibility, deterministic deduplication, quarantine and private SQLite writes using synthetic inputs only. It exposes only aggregate QA and cannot connect to a provider or unlock market evaluation.

          ### Source-agnostic private forward odds collector design"""
          if text.count(anchor) != 1:
              raise SystemExit('unexpected completed evidence anchor count')
          text = text.replace(anchor, evidence, 1)
          status_path.write_text(text, encoding='utf-8')

          current_path = Path('data/research/no-cost-timestamped-odds-source-qualification-current-status-v6.json')
          current = json.loads(current_path.read_text(encoding='utf-8'))
          current['recording_pr'] = int(os.environ['RECORDING_PR'])
          current_path.write_text(json.dumps(current, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Commit status updates
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add PROJECT_STATUS.md data/research/no-cost-timestamped-odds-source-qualification-current-status-v6.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Record offline private forward collector core status"
            git push origin HEAD:${{ github.head_ref }}
          fi
