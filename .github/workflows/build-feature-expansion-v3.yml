name: Build Feature Expansion v3 context pilot

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Workflow run ID containing historical-gold-multiseason and model-walk-forward-v2"
        required: true
        default: "29551715399"
  pull_request:
    paths:
      - "scripts/build_feature_expansion_v3.py"
      - "data/nba-venue-context-v1.json"
      - ".github/workflows/build-feature-expansion-v3.yml"
      - "docs/feature-expansion-v3-context-pilot.md"

permissions:
  contents: read
  actions: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install experiment dependencies
        run: python -m pip install --disable-pip-version-check numpy pandas scikit-learn
      - name: Compile Feature Expansion v3
        run: python -m py_compile scripts/build_feature_expansion_v3.py
      - name: Run leakage-safe synthetic self-test
        run: |
          rm -rf /tmp/nbavl-feature-v3-self-test
          python scripts/build_feature_expansion_v3.py \
            --self-test \
            --venue-config data/nba-venue-context-v1.json \
            --output-dir /tmp/nbavl-feature-v3-self-test
          python -m json.tool /tmp/nbavl-feature-v3-self-test/feature-expansion-v3-report.json >/dev/null
          test -f /tmp/nbavl-feature-v3-self-test/feature-expansion-v3-candidate-summary.csv
          test -f /tmp/nbavl-feature-v3-self-test/feature-expansion-v3-coefficients.csv
          test ! -f /tmp/nbavl-feature-v3-self-test/game-level-predictions.csv

  live-build:
    if: github.event_name == 'workflow_dispatch'
    needs: self-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      SOURCE_RUN_ID: ${{ inputs.source_run_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install experiment dependencies
        run: python -m pip install --disable-pip-version-check numpy pandas scikit-learn
      - name: Download Gold and walk-forward artifacts
        run: |
          rm -rf /tmp/nbavl-feature-v3-source
          mkdir -p /tmp/nbavl-feature-v3-source/gold /tmp/nbavl-feature-v3-source/model
          gh run download "$SOURCE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name historical-gold-multiseason \
            --dir /tmp/nbavl-feature-v3-source/gold
          gh run download "$SOURCE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name model-walk-forward-v2 \
            --dir /tmp/nbavl-feature-v3-source/model
          find /tmp/nbavl-feature-v3-source/gold -name 'historical-gold-multiseason.sqlite.gz' -print -quit | grep .
          test -f /tmp/nbavl-feature-v3-source/model/walk-forward-predictions.csv
      - name: Build schedule and travel context holdout experiment
        run: |
          rm -rf /tmp/nbavl-feature-v3-output
          GOLD_FILE="$(find /tmp/nbavl-feature-v3-source/gold -name 'historical-gold-multiseason.sqlite.gz' -print -quit)"
          python scripts/build_feature_expansion_v3.py \
            --gold "$GOLD_FILE" \
            --predictions /tmp/nbavl-feature-v3-source/model/walk-forward-predictions.csv \
            --venue-config data/nba-venue-context-v1.json \
            --output-dir /tmp/nbavl-feature-v3-output
      - name: Validate holdout and research guardrails
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('/tmp/nbavl-feature-v3-output')
          status = json.loads((root / 'feature-expansion-v3-run-status.json').read_text())
          report = json.loads((root / 'feature-expansion-v3-report.json').read_text())
          assert status['feature_expansion_complete'] is True, status
          assert status['matched_games'] >= 3600, status
          assert report['method']['untouched_holdout'] == '2023-24', report['method']
          assert report['coverage']['context_qa']['prediction_join']['match_rate'] == 1.0
          assert report['guardrails']['uses_market_odds'] is False
          assert report['guardrails']['uses_future_games'] is False
          assert report['decision']['ready_for_production_model'] is False
          assert report['decision']['ready_for_betting_edge_claim'] is False
          assert not (root / 'game-level-predictions.csv').exists()
          print(json.dumps({
            'matched_games': status['matched_games'],
            'holdout_season': status['holdout_season'],
            'probability_signal': status['context_probability_signal_detected'],
            'margin_signal': status['context_margin_signal_detected'],
          }, indent=2))
          PY
      - name: Upload aggregate experiment reports
        uses: actions/upload-artifact@v4
        with:
          name: feature-expansion-v3-context-pilot
          path: |
            /tmp/nbavl-feature-v3-output/feature-expansion-v3-run-status.json
            /tmp/nbavl-feature-v3-output/feature-expansion-v3-report.json
            /tmp/nbavl-feature-v3-output/feature-expansion-v3-candidate-summary.csv
            /tmp/nbavl-feature-v3-output/feature-expansion-v3-coefficients.csv
          retention-days: 14
          if-no-files-found: error
