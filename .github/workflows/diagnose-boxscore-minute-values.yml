name: Diagnose boxscore minute values

on:
  pull_request:
    paths:
      - ".github/workflows/diagnose-boxscore-minute-values.yml"
      - "scripts/import_open_player_boxscores.py"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Inspect unsupported minute values without player identity output
        run: |
          rm -rf /tmp/nbavl-minute-diagnostic
          mkdir -p /tmp/nbavl-minute-diagnostic
          PYTHONPATH=scripts python - <<'PY'
          import csv
          import json
          import urllib.request
          from collections import Counter
          from pathlib import Path
          from import_open_player_boxscores import SOURCE_BASE, SOURCE_FILES, as_float, parse_minutes

          metric_fields = [
              'points', 'fieldGoalsMade', 'fieldGoalsAttempted', 'freeThrowsMade',
              'freeThrowsAttempted', 'reboundsOffensive', 'reboundsDefensive',
              'reboundsTotal', 'assists', 'turnovers', 'steals', 'blocks',
              'foulsPersonal', 'plusMinusPoints',
          ]
          results = {}
          for season in ('2022-23', '2023-24'):
              values = Counter()
              nonzero_stats = Counter()
              row_count = 0
              for name in SOURCE_FILES:
                  path = Path('/tmp/nbavl-minute-diagnostic') / name
                  if not path.exists():
                      request = urllib.request.Request(
                          SOURCE_BASE + name,
                          headers={'User-Agent': 'NBA-Value-Lab-Research/1.0'},
                      )
                      with urllib.request.urlopen(request, timeout=180) as response:
                          path.write_bytes(response.read())
                  with path.open('r', encoding='utf-8-sig', errors='replace', newline='') as handle:
                      for row in csv.DictReader(handle):
                          if str(row.get('season_year') or '').strip() != season:
                              continue
                          try:
                              parse_minutes(row.get('minutes'))
                          except ValueError:
                              text = str(row.get('minutes') or '').strip()
                              values[text] += 1
                              row_count += 1
                              if any(abs(as_float(row.get(field))) > 1e-9 for field in metric_fields):
                                  nonzero_stats[text] += 1
              results[season] = {
                  'unsupported_rows': row_count,
                  'unsupported_value_counts': dict(sorted(values.items())),
                  'unsupported_rows_with_nonzero_box_stats': sum(nonzero_stats.values()),
                  'nonzero_value_counts': dict(sorted(nonzero_stats.items())),
              }
          output = {'results': results, 'player_identity_fields_uploaded': False}
          Path('/tmp/nbavl-minute-diagnostic/report.json').write_text(
              json.dumps(output, indent=2) + '\n', encoding='utf-8'
          )
          print(json.dumps(output, indent=2))
          assert sum(item['unsupported_rows'] for item in results.values()) > 0, output
          PY
      - name: Upload aggregate diagnostic only
        uses: actions/upload-artifact@v4
        with:
          name: boxscore-minute-value-diagnostic
          path: /tmp/nbavl-minute-diagnostic/report.json
          retention-days: 3
          if-no-files-found: error
