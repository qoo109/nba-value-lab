name: Verify Christopher Treasure closing adapter

on:
  pull_request:
    paths:
      - ".github/workflows/diagnose-kaggle-closing-schema.yml"
      - "scripts/run_christopher_treasure_closing_benchmark.py"
      - ".github/workflows/build-kaggle-closing-benchmark.yml"

permissions:
  contents: read
  actions: read

jobs:
  live-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install benchmark dependencies
        run: python -m pip install --disable-pip-version-check pandas openpyxl xlrd kagglehub
      - name: Download walk-forward predictions
        run: |
          rm -rf /tmp/nbavl-walk-forward-source
          mkdir -p /tmp/nbavl-walk-forward-source
          gh run download "29551715399" \
            --repo "$GITHUB_REPOSITORY" \
            --name model-walk-forward-v2 \
            --dir /tmp/nbavl-walk-forward-source
          test -f /tmp/nbavl-walk-forward-source/walk-forward-predictions.csv
      - name: Run live Christopher Treasure benchmark
        run: |
          rm -rf /tmp/nbavl-christopher-live
          python scripts/run_christopher_treasure_closing_benchmark.py \
            --dataset-handle christophertreasure/nba-odds-data \
            --predictions /tmp/nbavl-walk-forward-source/walk-forward-predictions.csv \
            --source-id kaggle_christophertreasure_nba_odds \
            --output-dir /tmp/nbavl-christopher-live
      - name: Validate live report
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('/tmp/nbavl-christopher-live')
          status = json.loads((root / 'kaggle-run-status.json').read_text())
          import_report = json.loads((root / 'kaggle-selected-import-report.json').read_text())
          benchmark = json.loads((root / 'benchmark/closing-benchmark-report.json').read_text())
          assert status['benchmark_complete'] is True, status
          assert status['temporary_raw_and_normalized_files_deleted'] is True, status
          assert import_report['source']['detected_schema'] == 'team_centric_mirrored_rows', import_report
          assert import_report['coverage']['normalized_games'] >= 500, import_report['coverage']
          assert benchmark['coverage']['matched_games'] > 0, benchmark['coverage']
          assert benchmark['guardrails']['roi_computed'] is False
          assert benchmark['guardrails']['clv_computed'] is False
          assert benchmark['decision']['ready_for_betting_edge_claim'] is False
          assert not (root / 'selected-import/closing-moneyline-normalized.csv').exists()
          print(json.dumps({
            'normalized_games': import_report['coverage']['normalized_games'],
            'normalized_seasons': import_report['coverage']['season_count'],
            'matched_games': benchmark['coverage']['matched_games'],
            'matched_seasons': benchmark['coverage']['matched_seasons'],
            'model_log_loss': benchmark['aggregate']['model']['log_loss'],
            'market_log_loss': benchmark['aggregate']['closing_market']['log_loss'],
          }, indent=2))
          PY
      - name: Upload reports only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: christopher-treasure-live-verification
          path: |
            /tmp/nbavl-christopher-live/kaggle-run-status.json
            /tmp/nbavl-christopher-live/kaggle-candidate-manifest.json
            /tmp/nbavl-christopher-live/kaggle-selected-import-report.json
            /tmp/nbavl-christopher-live/benchmark/closing-benchmark-report.json
          retention-days: 3
          if-no-files-found: warn
