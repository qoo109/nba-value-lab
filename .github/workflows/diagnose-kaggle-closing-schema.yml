name: Diagnose Kaggle closing archive schema

on:
  pull_request:
    paths:
      - ".github/workflows/diagnose-kaggle-closing-schema.yml"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install diagnostic dependencies
        run: python -m pip install --disable-pip-version-check pandas openpyxl xlrd pyarrow kagglehub
      - name: Download dataset and record schema only
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          rm -rf /tmp/nbavl-kaggle-schema
          mkdir -p /tmp/nbavl-kaggle-schema
          python - <<'PY'
          import json
          import zipfile
          from pathlib import Path

          import kagglehub
          import pandas as pd

          out = Path('/tmp/nbavl-kaggle-schema')
          root = Path(kagglehub.dataset_download(
              'christophertreasure/nba-odds-data',
              force_download=True,
              output_dir=str(out / 'download'),
          ))

          records = []
          for path in sorted(p for p in root.rglob('*') if p.is_file()):
              item = {
                  'path': str(path.relative_to(root)),
                  'suffix': path.suffix.lower(),
                  'size_bytes': path.stat().st_size,
              }
              try:
                  suffix = path.suffix.lower()
                  if suffix == '.csv':
                      frame = pd.read_csv(path, nrows=5, sep=None, engine='python')
                      item['columns'] = [str(c) for c in frame.columns]
                      item['dtypes'] = {str(c): str(t) for c, t in frame.dtypes.items()}
                  elif suffix in {'.xlsx', '.xls'}:
                      book = pd.ExcelFile(path)
                      item['sheets'] = {}
                      for sheet in book.sheet_names[:10]:
                          frame = pd.read_excel(path, sheet_name=sheet, nrows=5)
                          item['sheets'][str(sheet)] = [str(c) for c in frame.columns]
                  elif suffix == '.parquet':
                      frame = pd.read_parquet(path)
                      item['columns'] = [str(c) for c in frame.columns]
                      item['row_count'] = int(len(frame))
                  elif suffix == '.zip':
                      with zipfile.ZipFile(path) as archive:
                          item['archive_members'] = archive.namelist()[:200]
              except Exception as exc:
                  item['inspection_error'] = f'{type(exc).__name__}: {exc}'
              records.append(item)

          report = {
              'dataset_handle': 'christophertreasure/nba-odds-data',
              'resolved_root': root.name,
              'file_count': len(records),
              'files': records,
              'raw_data_uploaded': False,
              'sample_rows_uploaded': False,
          }
          (out / 'kaggle-schema-diagnostic.json').write_text(
              json.dumps(report, indent=2) + '\n', encoding='utf-8'
          )
          print(json.dumps(report, indent=2))
          PY
      - name: Remove downloaded raw data
        if: always()
        run: rm -rf /tmp/nbavl-kaggle-schema/download
      - name: Upload schema report only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kaggle-closing-schema-diagnostic
          path: /tmp/nbavl-kaggle-schema/kaggle-schema-diagnostic.json
          retention-days: 3
          if-no-files-found: error
