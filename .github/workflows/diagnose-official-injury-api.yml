name: Diagnose official NBA injury report API

on:
  pull_request:
    paths:
      - ".github/workflows/diagnose-official-injury-api.yml"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install official-source client
        run: python -m pip install --disable-pip-version-check 'nba-injury-report[pandas]==0.1.0'
      - name: Query fixed historical report and record aggregate transport diagnostics
        run: |
          rm -rf /tmp/nbavl-official-injury-api-diagnostic
          mkdir -p /tmp/nbavl-official-injury-api-diagnostic
          python - <<'PY'
          import importlib.metadata
          import json
          from collections import Counter
          from pathlib import Path
          import httpx
          from nba_injury_report import get_injury_report

          class SpyClient:
              def __init__(self):
                  self.client = httpx.Client(timeout=10)
                  self.urls = []
              def get(self, *, url):
                  self.urls.append(str(url))
                  return self.client.get(url=url)
              def close(self):
                  self.client.close()

          results = []
          for timestamp in ('2023-12-18T08:30:00', '2023-12-18T20:30:00'):
              item = {'timestamp': timestamp}
              spy = SpyClient()
              try:
                  report = get_injury_report(timestamp, client=spy)
                  rows = report.to_list()
                  item.update({
                      'success': True,
                      'requested_urls': spy.urls,
                      'row_count': len(rows),
                      'columns': sorted(rows[0].keys()) if rows else [],
                      'game_count': len({(row.get('Game Date'), row.get('Matchup')) for row in rows}),
                      'team_count': len({row.get('Team') for row in rows}),
                      'status_counts': dict(sorted(Counter(str(row.get('Current Status')) for row in rows).items())),
                      'published_timestamp': str(getattr(report, 'published_timestamp', '')),
                  })
              except Exception as exc:
                  item.update({'success': False, 'requested_urls': spy.urls, 'error': f'{type(exc).__name__}: {exc}'})
              finally:
                  spy.close()
              results.append(item)
          output = {
              'package': 'nba-injury-report==0.1.0',
              'package_requires': importlib.metadata.requires('nba-injury-report'),
              'httpx_version': httpx.__version__,
              'results': results,
              'player_rows_uploaded': False,
          }
          Path('/tmp/nbavl-official-injury-api-diagnostic/diagnostic.json').write_text(
              json.dumps(output, indent=2) + '\n', encoding='utf-8'
          )
          print(json.dumps(output, indent=2))
          assert all(item.get('success') and item.get('row_count', 0) > 0 for item in results), output
          PY
      - name: Upload aggregate diagnostic only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: official-injury-api-diagnostic
          path: /tmp/nbavl-official-injury-api-diagnostic/diagnostic.json
          retention-days: 3
          if-no-files-found: warn
