name: Diagnose official NBA injury report API

on:
  pull_request:
    paths:
      - ".github/workflows/diagnose-official-injury-api.yml"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install official-source client
        run: python -m pip install --disable-pip-version-check 'nba-injury-report[pandas]==0.1.0'
      - name: Query fixed historical report and record aggregate schema plus HTTP settings
        run: |
          rm -rf /tmp/nbavl-official-injury-api-diagnostic
          mkdir -p /tmp/nbavl-official-injury-api-diagnostic
          python - <<'PY'
          import json
          import re
          from collections import Counter
          from pathlib import Path
          import nba_injury_report
          from nba_injury_report import get_injury_report

          package_root = Path(nba_injury_report.__file__).parent
          url_literals = set()
          endpoint_fragments = []
          http_setting_fragments = []
          for path in package_root.rglob('*.py'):
              text = path.read_text(encoding='utf-8')
              lines = text.splitlines()
              url_literals.update(re.findall(r'https?://[^\"\'\s)]+', text))
              for index, line in enumerate(lines):
                  lowered = line.lower()
                  if any(token in lowered for token in ('ak-static', 'injury-report_', 'client.get')):
                      endpoint_fragments.append({'file': str(path.relative_to(package_root)), 'line': index + 1, 'text': line.strip()})
                  if any(token in lowered for token in ('httpx.client', 'headers=', 'user-agent', 'accept=', 'referer', 'cookies=', 'follow_redirects', 'http2=')):
                      start, end = max(0, index - 2), min(len(lines), index + 3)
                      http_setting_fragments.append({
                          'file': str(path.relative_to(package_root)),
                          'line': index + 1,
                          'context': [lines[number].rstrip() for number in range(start, end)],
                      })

          results = []
          for timestamp in ('2023-12-18T08:30:00', '2023-12-18T20:30:00'):
              item = {'timestamp': timestamp}
              try:
                  report = get_injury_report(timestamp)
                  rows = report.to_list()
                  item.update({
                      'success': True,
                      'row_count': len(rows),
                      'columns': sorted(rows[0].keys()) if rows else [],
                      'game_count': len({(row.get('Game Date'), row.get('Matchup')) for row in rows}),
                      'team_count': len({row.get('Team') for row in rows}),
                      'status_counts': dict(sorted(Counter(str(row.get('Current Status')) for row in rows).items())),
                      'report_type': type(report).__name__,
                      'published_timestamp': str(getattr(report, 'published_timestamp', '')),
                      'report_attributes': sorted(key for key in vars(report) if not key.startswith('_')),
                  })
              except Exception as exc:
                  item.update({'success': False, 'error': f'{type(exc).__name__}: {exc}'})
              results.append(item)
          output = {
              'package': 'nba-injury-report==0.1.0',
              'package_root_files': sorted(str(path.relative_to(package_root)) for path in package_root.rglob('*.py')),
              'url_literals': sorted(url_literals),
              'endpoint_fragments': endpoint_fragments,
              'http_setting_fragments': http_setting_fragments,
              'results': results,
              'player_rows_uploaded': False,
          }
          Path('/tmp/nbavl-official-injury-api-diagnostic/diagnostic.json').write_text(
              json.dumps(output, indent=2) + '\n', encoding='utf-8'
          )
          print(json.dumps(output, indent=2))
          assert any(item.get('success') and item.get('row_count', 0) > 0 for item in results), output
          PY
      - name: Upload aggregate diagnostic only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: official-injury-api-diagnostic
          path: /tmp/nbavl-official-injury-api-diagnostic/diagnostic.json
          retention-days: 3
          if-no-files-found: warn
