name: Diagnose official NBA injury PDF layout

on:
  pull_request:
    paths:
      - ".github/workflows/diagnose-official-injury-pdf-layout.yml"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PDF diagnostics
        run: python -m pip install --disable-pip-version-check httpx pymupdf
      - name: Inspect anonymized word geometry without uploading player rows
        run: |
          rm -rf /tmp/nbavl-official-pdf-layout
          mkdir -p /tmp/nbavl-official-pdf-layout
          python - <<'PY'
          import json
          import re
          from pathlib import Path
          import httpx
          import pymupdf

          url = 'https://ak-static.cms.nba.com/referee/injury/Injury-Report_2023-12-18_08AM.pdf'
          pdf_path = Path('/tmp/nbavl-official-pdf-layout/report.pdf')
          response = httpx.get(url, timeout=45, follow_redirects=True)
          response.raise_for_status()
          pdf_path.write_bytes(response.content)

          header_words = {
              'Game', 'Date', 'Time', 'Matchup', 'Team', 'Player', 'Name',
              'Current', 'Status', 'Reason',
          }
          status_words = {'Available', 'Probable', 'Questionable', 'Doubtful', 'Out'}
          team_words = {
              'Atlanta','Hawks','Brooklyn','Nets','Boston','Celtics','Charlotte','Hornets',
              'Chicago','Bulls','Cleveland','Cavaliers','Dallas','Mavericks','Denver','Nuggets',
              'Detroit','Pistons','Golden','State','Warriors','Houston','Rockets','Indiana','Pacers',
              'LA','Los','Angeles','Clippers','Lakers','Memphis','Grizzlies','Miami','Heat',
              'Milwaukee','Bucks','Minnesota','Timberwolves','New','Orleans','Pelicans','York','Knicks',
              'Oklahoma','City','Thunder','Orlando','Magic','Philadelphia','76ers','Phoenix','Suns',
              'Portland','Trail','Blazers','Sacramento','Kings','San','Antonio','Spurs','Toronto','Raptors',
              'Utah','Jazz','Washington','Wizards',
          }
          reason_words = {
              'Injury/Illness','G','League','Two-Way','Personal','Reasons','Not','With','Team',
              'Rest','Return','Competition','Reconditioning','Assignment','Concussion','Protocol',
              'Left','Right','Ankle','Knee','Foot','Hip','Back','Shoulder','Wrist','Hand','Finger',
              'Elbow','Neck','Calf','Hamstring','Groin','Heel','Soreness','Sprain','Strain',
              'Contusion','Fracture','Surgery','Recovery','Illness','Management','Available',
          }

          def classify_word(text):
              if text in header_words:
                  return f'HEADER:{text}'
              if text in status_words:
                  return f'STATUS:{text}'
              if text in team_words:
                  return f'TEAMWORD:{text}'
              if text in reason_words:
                  return f'REASONWORD:{text}'
              if re.fullmatch(r'\d{2}/\d{2}/\d{4}', text):
                  return f'DATE:{text}'
              if re.fullmatch(r'\d{2}:\d{2}', text):
                  return f'TIME:{text}'
              if text == '(ET)':
                  return 'TIMEZONE:(ET)'
              if re.fullmatch(r'[A-Z]{3}@[A-Z]{3}', text):
                  return f'MATCHUP:{text}'
              if text.upper() in {'NOT', 'YET', 'SUBMITTED'}:
                  return f'SUBMISSION:{text.upper()}'
              punctuation = ''.join(char for char in text if not char.isalnum())
              return f'REDACTED[len={len(text)},punct={punctuation!r}]'

          document = pymupdf.open(pdf_path)
          pages = []
          for page_index, page in enumerate(document):
              finder = page.find_tables()
              page_result = {
                  'page': page_index + 1,
                  'width': round(page.rect.width, 2),
                  'height': round(page.rect.height, 2),
                  'table_count': len(finder.tables),
                  'tables': [],
                  'word_rows': [],
              }
              for table_index, table in enumerate(finder.tables):
                  page_result['tables'].append({
                      'table': table_index + 1,
                      'bbox': [round(value, 2) for value in table.bbox],
                      'column_count': table.col_count,
                      'row_count': table.row_count,
                      'header_names': list(table.header.names) if table.header else [],
                  })

              words = []
              for x0, y0, x1, y1, text, block, line, word in page.get_text('words', sort=True):
                  if y0 < 95 or y0 > 560:
                      continue
                  words.append({
                      'x0': round(x0, 2), 'y0': round(y0, 2),
                      'x1': round(x1, 2), 'y1': round(y1, 2),
                      'token': classify_word(text),
                      'block': block, 'line': line,
                  })

              grouped = []
              for item in words:
                  center = (item['y0'] + item['y1']) / 2
                  target = None
                  for row in grouped:
                      if abs(row['center_y'] - center) <= 2.5:
                          target = row
                          break
                  if target is None:
                      target = {'center_y': round(center, 2), 'words': []}
                      grouped.append(target)
                  target['words'].append(item)
              for row in grouped:
                  row['words'].sort(key=lambda item: item['x0'])
              page_result['word_rows'] = grouped[:80]
              pages.append(page_result)

          output = {
              'url': url,
              'pdf_bytes': len(response.content),
              'page_count': len(document),
              'pages': pages,
              'raw_pdf_uploaded': False,
              'player_rows_uploaded': False,
          }
          Path('/tmp/nbavl-official-pdf-layout/diagnostic.json').write_text(
              json.dumps(output, indent=2) + '\n', encoding='utf-8'
          )
          pdf_path.unlink()
          print(json.dumps({'page_count': len(document), 'rows_per_page': [len(page['word_rows']) for page in pages]}, indent=2))
          assert all(page['word_rows'] for page in pages), output
          PY
      - name: Upload sanitized geometry diagnostics only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: official-injury-pdf-layout-diagnostic
          path: /tmp/nbavl-official-pdf-layout/diagnostic.json
          retention-days: 3
          if-no-files-found: warn
