name: Diagnose V5 UI PR152

on:
  pull_request:
    paths:
      - ".github/workflows/diagnose-v5-ui-pr152.yml"
  push:
    branches:
      - model/g1.2.0-ev-primary-activation
    paths:
      - ".github/workflows/diagnose-v5-ui-pr152.yml"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Capture focused V5 validation
        run: |
          set +e
          python scripts/validate_v5_ui.py > /tmp/v5.log 2>&1
          echo $? > /tmp/v5.exit
          tail -80 /tmp/v5.log
          exit 0
      - name: Upload diagnostic files
        uses: actions/upload-artifact@v4
        with:
          name: pr152-v5-ui-diagnostic
          path: |
            /tmp/v5.log
            /tmp/v5.exit
            scripts/validate_v5_ui.py
          if-no-files-found: error
          retention-days: 1
