name: Fetch official NBA boxscore metadata subset v1

on:
  pull_request:
    paths:
      - "scripts/fetch_official_nba_boxscore_metadata_subset_v1.py"
      - ".github/workflows/fetch-official-nba-boxscore-metadata-subset-v1.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile metadata fetcher
        run: python -m py_compile scripts/fetch_official_nba_boxscore_metadata_subset_v1.py
      - name: Fetch bounded official metadata subset
        id: fetch_subset
        continue-on-error: true
        run: |
          python scripts/fetch_official_nba_boxscore_metadata_subset_v1.py \
            --output artifacts/official-nba-boxscore-metadata-subset-2025-26-v1.json \
            --timeout 30 \
            --delay-seconds 0.25
      - name: Upload official metadata subset or diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: official-nba-boxscore-metadata-subset-2025-26-v1
          path: artifacts/official-nba-boxscore-metadata-subset-2025-26-v1.json
          if-no-files-found: error
          retention-days: 14
      - name: Enforce complete official metadata subset
        if: steps.fetch_subset.outcome != 'success'
        run: exit 1
