name: Fix Gold request validator policy Stake v1

on:
  pull_request:
    paths:
      - "scripts/fix_gold_request_validator_policy_stake_v1.py"
      - ".github/workflows/fix-gold-request-validator-policy-stake-v1.yml"

permissions:
  contents: write

concurrency:
  group: fix-gold-request-validator-policy-stake-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  fix-validator:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out request branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: draft-gold-5826-freeze-manifest-real-artifact-request-v1

      - name: Run guarded fix
        run: python scripts/fix_gold_request_validator_policy_stake_v1.py

      - name: Enforce validator-only diff
        run: |
          test "$(git diff --name-only)" = "scripts/validate_historical_gold_5826_freeze_manifest_real_artifact_execution_request_v1.py"
          grep -F 'expect(policy, "decision.formal_stake", 0)' scripts/validate_historical_gold_5826_freeze_manifest_real_artifact_execution_request_v1.py

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/validate_historical_gold_5826_freeze_manifest_real_artifact_execution_request_v1.py
          git commit -m "Fix request validator policy Stake path [skip ci]"
          git push origin HEAD:draft-gold-5826-freeze-manifest-real-artifact-request-v1
