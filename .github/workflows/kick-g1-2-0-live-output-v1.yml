name: Kick G1.2.0 live output implementation

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/kick-g1-2-0-live-output-v1.yml"

permissions:
  contents: write

jobs:
  kick:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: implement/g1-2-0-live-output-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Extract implementation step
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/apply-g1-2-0-live-output-v1.yml').read_text(encoding='utf-8')
          start_marker = '      - name: Implement G1.2.0 live output\n        run: |\n'
          end_marker = '\n      - name: Run local validation before commit\n'
          if start_marker not in text or end_marker not in text:
              raise SystemExit('implementation step markers not found')
          block = text.split(start_marker, 1)[1].split(end_marker, 1)[0]
          lines = []
          for line in block.splitlines():
              if line and not line.startswith('          '):
                  raise SystemExit(f'unexpected indentation: {line!r}')
              lines.append(line[10:] if line.startswith('          ') else '')
          Path('/tmp/g120-step-1.sh').write_text('set -euo pipefail\n' + '\n'.join(lines) + '\n', encoding='utf-8')
          print(f'extracted {len(lines)} implementation lines')
          PY
      - name: Run implementation with diagnostic capture
        run: |
          set +e
          bash /tmp/g120-step-1.sh > /tmp/g120-step-1.log 2>&1
          code=$?
          echo "$code" > /tmp/g120-step-1.exit
          tail -160 /tmp/g120-step-1.log
          exit 0
      - name: Upload bootstrap diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: g1-2-0-bootstrap-diagnostic
          path: |
            /tmp/g120-step-1.log
            /tmp/g120-step-1.exit
          if-no-files-found: error
          retention-days: 1
