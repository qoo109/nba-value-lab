name: Clean G1.2.0 implementation branch

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/kick-g1-2-0-live-output-v1.yml"

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: implement/g1-2-0-live-output-v1
          fetch-depth: 0
      - name: Remove generated Python cache
        run: |
          git rm -r scripts/__pycache__
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Remove generated Python cache"
          git push origin HEAD:implement/g1-2-0-live-output-v1
