name: Kick G1.2.0 live output implementation

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/kick-g1-2-0-live-output-v1.yml"

permissions:
  contents: write

jobs:
  kick:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: implement/g1-2-0-live-output-v1
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Extract implementation step
        run: |
          set +e
          python -m pip install --quiet pyyaml > /tmp/extract.log 2>&1
          python - <<'PY' >> /tmp/extract.log 2>&1
          from pathlib import Path
          import yaml
          payload = yaml.safe_load(Path('.github/workflows/apply-g1-2-0-live-output-v1.yml').read_text(encoding='utf-8'))
          steps = payload['jobs']['apply']['steps']
          step = next(item for item in steps if item.get('name') == 'Implement G1.2.0 live output')
          Path('/tmp/g120-step-1.sh').write_text('set -euo pipefail\n' + step['run'] + '\n', encoding='utf-8')
          print(f"extracted {len(step['run'].splitlines())} implementation lines")
          PY
          echo $? > /tmp/extract.exit
          tail -120 /tmp/extract.log
          exit 0
      - name: Run implementation with diagnostic capture
        if: hashFiles('/tmp/g120-step-1.sh') != ''
        run: |
          set +e
          bash /tmp/g120-step-1.sh > /tmp/g120-step-1.log 2>&1
          code=$?
          echo "$code" > /tmp/g120-step-1.exit
          tail -160 /tmp/g120-step-1.log
          exit 0
      - name: Upload bootstrap diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: g1-2-0-bootstrap-diagnostic
          path: |
            /tmp/extract.log
            /tmp/extract.exit
            /tmp/g120-step-1.log
            /tmp/g120-step-1.exit
          if-no-files-found: warn
          retention-days: 1
