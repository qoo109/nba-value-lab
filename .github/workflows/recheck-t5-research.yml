name: Recheck T-5m research records

on:
  workflow_dispatch:
    inputs:
      input_path:
        description: "Repository path to a research T-5m input JSON"
        required: true
        default: "data/fixtures/t5-recheck-example.json"
      dry_run:
        description: "Validate only; fixture inputs require true"
        required: true
        type: boolean
        default: true
  pull_request:
    paths:
      - "models/**"
      - "scripts/recheck_t5_snapshot.py"
      - "scripts/recheck_t5_snapshot_v410.py"
      - "scripts/lock_t60_snapshot_v410.py"
      - "scripts/multi_main_policy.py"
      - "scripts/append_research_record_v410.py"
      - "data/fixtures/t5-recheck-example.json"
      - ".github/workflows/recheck-t5-research.yml"
  push:
    branches: ["main"]
    paths:
      - "models/**"
      - "scripts/recheck_t5_snapshot_v410.py"
      - "scripts/lock_t60_snapshot_v410.py"
      - "scripts/multi_main_policy.py"
      - "scripts/append_research_record_v410.py"
      - "data/fixtures/t5-recheck-example.json"
      - ".github/workflows/recheck-t5-research.yml"

permissions:
  contents: write

concurrency:
  group: t5-research-recheck
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile research pipeline
        run: |
          python -m py_compile \
            scripts/lock_t60_snapshot.py \
            scripts/lock_t60_snapshot_v49.py \
            scripts/lock_t60_snapshot_v410.py \
            scripts/recheck_t5_snapshot.py \
            scripts/recheck_t5_snapshot_v410.py \
            scripts/multi_main_policy.py \
            scripts/append_research_record_v410.py

      - name: Build G1.1 T-60m fixture output
        run: |
          python scripts/lock_t60_snapshot_v410.py \
            data/fixtures/t60-lock-example.json \
            --dry-run \
            --output /tmp/t60-v410-output.json \
            > /tmp/t60-console.log
          python -m json.tool /tmp/t60-v410-output.json >/dev/null

      - name: Generate bundled T-5m fixture output
        run: |
          python scripts/recheck_t5_snapshot_v410.py \
            data/fixtures/t5-recheck-example.json \
            --previous-output /tmp/t60-v410-output.json \
            --dry-run \
            --output /tmp/t5-v410-output.json \
            > /tmp/t5-console.log
          python -m json.tool /tmp/t5-v410-output.json >/dev/null

      - name: Assert bundled T-5m fixture result
        run: |
          python - <<'PY'
          import json
          payload = json.load(open('/tmp/t5-v410-output.json', encoding='utf-8'))
          selection = payload['selection']
          records = payload['records']
          summary = {
              'selected_count': selection.get('selected_count'),
              'selected_prediction_ids': selection.get('selected_prediction_ids'),
              't60_selected_prediction_ids': selection.get('t60_selected_prediction_ids'),
              'main_changed_from_t60': selection.get('main_changed_from_t60'),
              'price_only_count': selection.get('price_only_count'),
              'fundamental_update_count': selection.get('fundamental_update_count'),
              'main_statuses': {
                  item['selection_team_id']: item.get('main_status')
                  for item in records
                  if item.get('main_candidate')
              },
          }
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          assert selection['target_main_count'] == 2
          assert selection['maximum_main_count'] == 3
          assert selection['selected_count'] == 2
          assert selection['price_only_count'] == 2
          assert selection['fundamental_update_count'] == 2
          assert selection['main_changed_from_t60'] is True
          assert len(selection['t60_selected_prediction_ids']) == 1
          assert len(selection['selected_prediction_ids']) == 2
          selected_records = [
              next(item for item in records if item['prediction_id'] == prediction_id)
              for prediction_id in selection['selected_prediction_ids']
          ]
          assert [item['selection_team_id'] for item in selected_records] == ['DEN', 'NYK']
          assert selected_records[0]['main_status'] == '最終主要場次 1/2'
          assert selected_records[1]['main_status'] == '最終主要場次 2/2'
          assert selected_records[0]['change_type'] == 'price_only'
          assert selected_records[1]['change_type'] == 'fundamental_update'
          assert selected_records[0]['prediction_id'] == selection['t60_selected_prediction_ids'][0]
          print('V4.10 multi-main T-5m fixture validated')
          PY

      - name: Prove fixture cannot write formal history
        run: |
          if python scripts/recheck_t5_snapshot_v410.py \
            data/fixtures/t5-recheck-example.json \
            --previous-output /tmp/t60-v410-output.json \
            > /tmp/t5-write-attempt.log 2>&1; then
            echo "Fixture unexpectedly wrote formal history"
            exit 1
          fi
          test ! -f data/history/2026-10.jsonl

      - name: Validate selected input
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_PATH: ${{ inputs.input_path }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          test -f "$INPUT_PATH"
          if [ "$DRY_RUN" = "true" ]; then
            if [ "$INPUT_PATH" = "data/fixtures/t5-recheck-example.json" ]; then
              python scripts/lock_t60_snapshot_v410.py data/fixtures/t60-lock-example.json --dry-run --output /tmp/manual-t60-output.json
              python scripts/recheck_t5_snapshot_v410.py "$INPUT_PATH" --previous-output /tmp/manual-t60-output.json --dry-run --output /tmp/manual-t5-output.json
            else
              python scripts/recheck_t5_snapshot_v410.py "$INPUT_PATH" --dry-run --output /tmp/manual-t5-output.json
            fi
          else
            python scripts/recheck_t5_snapshot_v410.py "$INPUT_PATH" --output /tmp/manual-t5-output.json
          fi
          python -m json.tool /tmp/manual-t5-output.json >/dev/null

      - name: Commit immutable final lock and compact records
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == false
        run: |
          if git diff --quiet -- data/history data/locks; then
            echo "No T-5m changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history data/locks
          git commit -m "research: finalize G1.1 T-5m multi-main records"
          git push
