name: Recover Historical Silver two-game official CDN PBP v2

on:
  push:
    branches:
      - recover-two-2023-24-official-cdn-pbp-games
    paths:
      - "scripts/recover_historical_silver_two_game_official_cdn_pbp_v1.py"
      - "scripts/recover_historical_silver_two_game_official_cdn_pbp_v2.py"
      - ".github/workflows/recover-historical-silver-two-game-official-cdn-pbp-v1.yml"
      - "docs/historical-silver-two-game-official-cdn-pbp-recovery-v1.md"
  pull_request:
    paths:
      - "scripts/recover_historical_silver_two_game_official_cdn_pbp_v1.py"
      - "scripts/recover_historical_silver_two_game_official_cdn_pbp_v2.py"
      - ".github/workflows/recover-historical-silver-two-game-official-cdn-pbp-v1.yml"
      - "docs/historical-silver-two-game-official-cdn-pbp-recovery-v1.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: historical-silver-two-game-official-cdn-pbp-recovery-v2-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  recover-and-rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile recovery runners
        run: |
          python -m py_compile scripts/recover_historical_silver_two_game_official_cdn_pbp_v1.py
          python -m py_compile scripts/recover_historical_silver_two_game_official_cdn_pbp_v2.py

      - name: Run offline parser self-test
        run: |
          python scripts/recover_historical_silver_two_game_official_cdn_pbp_v2.py \
            --self-test \
            --output-root recovery-self-test

      - name: Recover two official CDN games and rebuild multi-season Silver and Gold
        id: recovery
        run: |
          set +e
          python scripts/recover_historical_silver_two_game_official_cdn_pbp_v2.py \
            --output-root recovery-output
          CODE=$?
          echo "exit_code=$CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Validate aggregate recovery result
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path("recovery-output/artifacts/two-game-official-cdn-pbp-recovery-result-v2.json")
          assert path.is_file(), "aggregate recovery result missing"
          result = json.loads(path.read_text())
          print(json.dumps(result, indent=2, sort_keys=True))
          assert result["formal_state"] == (
              "HISTORICAL_SILVER_2023_24_TWO_GAME_OFFICIAL_CDN_PBP_RECOVERY_PASS"
          ), result
          assert result["recovery_version"] == "v2", result
          assert result["recovery"]["target_games"] == 2, result
          assert result["recovery"]["recovered_games"] == 2, result
          assert result["recovery"]["recovered_game_dates"] == 2, result
          assert result["recovery"]["team_feature_rows_added"] == 4, result
          assert result["recovery"]["remaining_games_without_team_features"] == 0, result
          assert result["recovery"]["remaining_recovered_games_without_dates"] == 0, result
          assert result["recovery"]["duplicate_team_feature_rows"] == 0, result
          assert result["final_outputs"]["silver_games"] == 5826, result
          assert result["final_outputs"]["silver_team_game_features"] == 11652, result
          assert result["final_outputs"]["gold_matchup_features"] == 5826, result
          assert result["final_outputs"]["gold_team_game_features"] == 11652, result
          assert result["final_outputs"]["gold_point_in_time_passed"] is True, result
          assert result["final_outputs"]["gold_point_in_time_violations"] == 0, result
          assert result["decision"]["two_source_exceptions_resolved"] is True, result
          assert result["decision"]["documented_exception_count_after_recovery"] == 0, result
          assert result["decision"]["ready_for_market_backtest"] is False, result
          assert result["decision"]["ready_for_model_retraining"] is False, result
          assert result["decision"]["formal_stake"] == 0, result
          assert int("${{ steps.recovery.outputs.exit_code }}") == 0, result
          PY

      - name: Verify recovered database files exist
        if: always()
        run: |
          test -s recovery-output/artifacts/historical-silver-multiseason-recovered-v1.sqlite.gz
          test -s recovery-output/artifacts/historical-gold-multiseason-recovered-v1.sqlite.gz
          du -h recovery-output/artifacts/*

      - name: Upload repaired multi-season data and aggregate receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: historical-silver-gold-two-game-official-cdn-recovery-v2
          path: recovery-output/artifacts/
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
