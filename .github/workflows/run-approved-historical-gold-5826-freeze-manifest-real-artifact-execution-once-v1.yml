name: Run approved Historical Gold 5826 real Artifact execution once v1

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: "Exact approved Historical Gold 5826 request ID"
        required: true
        default: "HISTORICAL-GOLD-5826-FREEZE-MANIFEST-REAL-ARTIFACT-EXECUTION-2026-07-23-001"
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: historical-gold-5826-real-artifact-execution-once-v1
  cancel-in-progress: false

jobs:
  execute-once:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main' &&
      github.run_attempt == 1 &&
      inputs.request_id == 'HISTORICAL-GOLD-5826-FREEZE-MANIFEST-REAL-ARTIFACT-EXECUTION-2026-07-23-001'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out approved main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile approved execution path
        run: |
          python -m py_compile \
            scripts/build_historical_gold_5826_complete_corpus_freeze_manifest_v1.py \
            scripts/run_historical_gold_5826_freeze_manifest_real_artifact_execution_once_v1.py

      - name: Revalidate approval and immutable bindings before download
        run: |
          python scripts/run_historical_gold_5826_freeze_manifest_real_artifact_execution_once_v1.py \
            --approval data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-approval-v1.json \
            --confirmation-request-id "${{ inputs.request_id }}" \
            --workflow-event "${{ github.event_name }}" \
            --workflow-ref "${{ github.ref }}" \
            --workflow-run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --github-sha "${{ github.sha }}" \
            --execution-count-before 0 \
            --validate-only

      - name: Download exact adopted Artifact
        uses: actions/download-artifact@v4
        with:
          name: historical-silver-gold-two-game-official-cdn-recovery-v2
          path: /tmp/nbavl-gold-5826-input
          repository: qoo109/nba-value-lab
          run-id: 29976204693
          github-token: ${{ github.token }}

      - name: Execute approved read-only semantic freeze once
        run: |
          rm -rf /tmp/nbavl-gold-5826-output /tmp/nbavl-gold-5826-temp
          mkdir -p /tmp/nbavl-gold-5826-output /tmp/nbavl-gold-5826-temp
          python scripts/run_historical_gold_5826_freeze_manifest_real_artifact_execution_once_v1.py \
            --approval data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-approval-v1.json \
            --artifact-dir /tmp/nbavl-gold-5826-input \
            --output-dir /tmp/nbavl-gold-5826-output \
            --temp-dir /tmp/nbavl-gold-5826-temp \
            --confirmation-request-id "${{ inputs.request_id }}" \
            --workflow-event "${{ github.event_name }}" \
            --workflow-ref "${{ github.ref }}" \
            --workflow-run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --github-sha "${{ github.sha }}" \
            --execution-count-before 0

      - name: Enforce exact aggregate-only output
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('/tmp/nbavl-gold-5826-output')
          expected = [
              'historical-gold-5826-complete-corpus-freeze-manifest-v1.json',
              'historical-gold-5826-freeze-manifest-real-artifact-execution-receipt-v1.json',
          ]
          files = sorted(path.name for path in root.iterdir() if path.is_file())
          assert files == sorted(expected), files
          assert sum(path.stat().st_size for path in root.iterdir() if path.is_file()) <= 1048576
          prohibited = {
              'game_id', 'game_date', 'home_team_abbr', 'away_team_abbr',
              'team_code', 'feature_id', 'matchup_feature_id', 'raw_row',
              'sample_row', 'row_level_hash', 'individual_feature_value',
              'player_information', 'market_price',
          }
          def unsafe(value):
              if isinstance(value, dict):
                  return any(str(key) in prohibited or unsafe(child) for key, child in value.items())
              if isinstance(value, list):
                  return any(unsafe(child) for child in value)
              return False
          for name in expected:
              payload = json.loads((root / name).read_text(encoding='utf-8'))
              assert not unsafe(payload), name
          receipt = json.loads((root / expected[1]).read_text(encoding='utf-8'))
          assert receipt['execution_count_for_request'] == 1, receipt
          assert receipt['maximum_execution_count_for_request'] == 1, receipt
          assert receipt['request_consumed'] is True, receipt
          assert receipt['repeat_execution_allowed'] is False, receipt
          assert receipt['database_modified'] is False, receipt
          assert receipt['formal_stake'] == 0, receipt
          PY

      - name: Upload exact aggregate execution Artifact
        uses: actions/upload-artifact@v4
        with:
          name: historical-gold-5826-complete-corpus-freeze-manifest-real-artifact-execution-v1
          path: /tmp/nbavl-gold-5826-output
          if-no-files-found: error
          retention-days: 14
