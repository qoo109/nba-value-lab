name: Run approved legacy market real-file audit once v1

on:
  workflow_dispatch:
    inputs:
      request_id:
        description: "Exact approved request ID"
        required: true
        default: "LEGACY-MARKET-ARCHIVE-AUDIT-2026-07-21-001"
        type: string

permissions:
  contents: read

concurrency:
  group: legacy-market-real-file-audit-once-LEGACY-MARKET-ARCHIVE-AUDIT-2026-07-21-001
  cancel-in-progress: false

jobs:
  execute-once:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main' &&
      github.run_attempt == 1 &&
      inputs.request_id == 'LEGACY-MARKET-ARCHIVE-AUDIT-2026-07-21-001'
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install approved execution dependency
        run: python -m pip install --disable-pip-version-check kagglehub

      - name: Compile approved execution path
        run: |
          python -m py_compile \
            scripts/validate_user_supplied_legacy_market_archive_real_file_audit_approval_v1.py \
            scripts/run_user_supplied_legacy_market_archive_real_file_audit_once_v1.py \
            scripts/run_user_supplied_legacy_market_archive_cross_source_audit_v1.py \
            scripts/historical_silver_runner.py \
            scripts/combine_historical_silver.py \
            scripts/build_historical_gold_multiseason.py

      - name: Revalidate approval before network access
        run: |
          rm -rf /tmp/nbavl-legacy-market-approved-execution-v1
          mkdir -p /tmp/nbavl-legacy-market-approved-execution-v1
          python scripts/run_user_supplied_legacy_market_archive_real_file_audit_once_v1.py \
            --request data/research/user-supplied-legacy-market-archive-real-file-audit-execution-request-v1.json \
            --approval data/research/user-supplied-legacy-market-archive-real-file-audit-approval-v1.json \
            --implementation data/research/user-supplied-legacy-market-archive-cross-source-audit-implementation-v1.json \
            --current-status data/research/user-supplied-nba-betting-csv-provenance-current-status-v1.json \
            --policy data/research/user-supplied-legacy-market-archive-cross-source-audit-predeclaration-v1.json \
            --confirmation-request-id "${{ inputs.request_id }}" \
            --workflow-event "${{ github.event_name }}" \
            --workflow-ref "${{ github.ref }}" \
            --validate-only \
            --output /tmp/nbavl-legacy-market-approved-execution-v1/approval-validation-report.json

      - name: Execute one-time aggregate-only real-file audit
        id: execute
        run: |
          set +e
          python scripts/run_user_supplied_legacy_market_archive_real_file_audit_once_v1.py \
            --request data/research/user-supplied-legacy-market-archive-real-file-audit-execution-request-v1.json \
            --approval data/research/user-supplied-legacy-market-archive-real-file-audit-approval-v1.json \
            --implementation data/research/user-supplied-legacy-market-archive-cross-source-audit-implementation-v1.json \
            --current-status data/research/user-supplied-nba-betting-csv-provenance-current-status-v1.json \
            --policy data/research/user-supplied-legacy-market-archive-cross-source-audit-predeclaration-v1.json \
            --confirmation-request-id "${{ inputs.request_id }}" \
            --workflow-event "${{ github.event_name }}" \
            --workflow-ref "${{ github.ref }}" \
            --output /tmp/nbavl-legacy-market-approved-execution-v1/legacy-market-real-file-audit-execution-report.json
          CODE=$?
          echo "exit_code=$CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Remove admission-only report
        if: always()
        run: rm -f /tmp/nbavl-legacy-market-approved-execution-v1/approval-validation-report.json

      - name: Enforce aggregate-only output and scientific result
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('/tmp/nbavl-legacy-market-approved-execution-v1')
          path = root / 'legacy-market-real-file-audit-execution-report.json'
          if not path.exists():
              raise SystemExit('missing aggregate execution report')
          report = json.loads(path.read_text(encoding='utf-8'))
          allowed = {
              'ROLE_LIMITED_LEGACY_MARKET_ARCHIVE_CROSS_SOURCE_VALIDATED',
              'RETAIN_ROLE_LIMITED_LEGACY_MARKET_ARCHIVE_ELIGIBLE',
              'USER_SUPPLIED_LEGACY_MARKET_ARCHIVE_CROSS_SOURCE_AUDIT_RESEARCH_BLOCKED',
          }
          assert report['request_id'] == 'LEGACY-MARKET-ARCHIVE-AUDIT-2026-07-21-001', report
          assert report['approval_validation']['formal_state'] == (
              'LEGACY_MARKET_ARCHIVE_REAL_FILE_AUDIT_APPROVAL_VALID_READY_FOR_MANUAL_DISPATCH'
          ), report
          assert report['execution_receipt']['execution_count_for_request'] == 1, report
          assert report['execution_receipt']['temporary_material_deleted_with_runner'] is True, report
          boundaries = report['boundaries']
          assert boundaries['raw_rows_emitted'] == 0, report
          assert boundaries['raw_files_emitted'] is False, report
          assert boundaries['raw_files_uploaded_as_artifact'] is False, report
          assert boundaries['candidate_csv_uploaded_as_artifact'] is False, report
          assert boundaries['reference_databases_uploaded_as_artifact'] is False, report
          assert boundaries['source_archives_uploaded_as_artifact'] is False, report
          assert boundaries['unmatched_keys_or_game_ids_emitted'] is False, report
          assert boundaries['opening_or_closing_labels'] is False, report
          assert boundaries['point_in_time_market_backtest'] is False, report
          assert boundaries['clv_ev_roi_drawdown'] is False, report
          assert boundaries['historical_silver_replacement'] is False, report
          assert boundaries['historical_gold_replacement'] is False, report
          assert boundaries['model_training_or_retraining'] is False, report
          assert boundaries['betting_edge_claim'] is False, report
          assert boundaries['formal_stake'] == 0, report
          assert path.stat().st_size <= 1048576, path.stat().st_size
          files = [item.name for item in root.iterdir() if item.is_file()]
          assert files == ['legacy-market-real-file-audit-execution-report.json'], files
          if report.get('formal_outcome') not in allowed:
              print(json.dumps(report, ensure_ascii=False, indent=2))
              raise SystemExit('execution blocked before scientific result')
          print(json.dumps({
              'formal_outcome': report['formal_outcome'],
              'matched_games': report['comparison']['matched_games'],
              'reference_match_rate': report['comparison']['reference_match_rate'],
              'candidate_match_rate': report['comparison']['candidate_match_rate'],
              'score_pair_match_rate': report['comparison']['score_pair_match_rate'],
              'failed_scientific_gates': report['failed_scientific_gates'],
              'formal_stake': boundaries['formal_stake'],
          }, ensure_ascii=False, indent=2))
          PY

      - name: Upload the single aggregate execution Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-market-real-file-audit-execution-v1
          path: /tmp/nbavl-legacy-market-approved-execution-v1/legacy-market-real-file-audit-execution-report.json
          retention-days: 14
          if-no-files-found: error
