name: Run Eoin cross-source audit v1

on:
  workflow_dispatch:
    inputs:
      dataset_handle:
        description: "Public Kaggle dataset handle"
        required: true
        default: "eoinamoore/historical-nba-data-and-player-box-scores"
      max_download_mb:
        description: "Maximum reference download MB"
        required: true
        default: "600"
  pull_request:
    paths:
      - "scripts/run_eoin_cross_source_audit_v1.py"
      - "scripts/run_eoin_kaggle_census_v1.py"
      - "scripts/run_eoin_csv_census_v1.py"
      - "scripts/run_eoin_internal_qualification_v1.py"
      - "config/historical-source-pilot.json"
      - "docs/eoin-cross-source-audit-v1.md"
      - "docs/source-intake-sop-v1.md"
      - ".github/workflows/run-eoin-cross-source-audit-v1.yml"

permissions:
  contents: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Eoin cross-source modules
        run: |
          python -m py_compile \
            scripts/historical_phase2_core.py \
            scripts/historical_silver_schema.py \
            scripts/run_eoin_csv_census_v1.py \
            scripts/run_eoin_internal_qualification_v1.py \
            scripts/run_eoin_kaggle_census_v1.py \
            scripts/run_eoin_cross_source_audit_v1.py

      - name: Run synthetic cross-source self-test
        run: |
          rm -rf /tmp/nbavl-eoin-cross-source-self-test
          python scripts/run_eoin_cross_source_audit_v1.py \
            --self-test \
            --output-dir /tmp/nbavl-eoin-cross-source-self-test
          python -m json.tool /tmp/nbavl-eoin-cross-source-self-test/eoin_cross_source_audit_report.json >/dev/null

      - name: Validate synthetic guardrails
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path("/tmp/nbavl-eoin-cross-source-self-test")
          report = json.loads((root / "eoin_cross_source_audit_report.json").read_text())
          assert report["deterministic_matching_only"] is True, report
          assert report["fuzzy_matching"] is False, report
          assert report["formal_source_replacement_approved"] is False, report
          assert report["existing_silver_replacement"] is False, report
          assert report["existing_gold_replacement"] is False, report
          assert report["formal_stake"] == 0, report
          assert report["boundaries"]["raw_rows_emitted"] == 0, report
          assert report["boundaries"]["raw_files_emitted"] is False, report
          PY

  live-audit:
    if: github.event_name == 'workflow_dispatch'
    needs: self-test
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      DATASET_HANDLE: ${{ inputs.dataset_handle }}
      MAX_DOWNLOAD_MB: ${{ inputs.max_download_mb }}
      KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Kaggle download and Parquet metadata dependencies
        run: python -m pip install --disable-pip-version-check kagglehub pyarrow

      - name: Download sources and run aggregate-only cross-source audit
        run: |
          rm -rf /tmp/nbavl-eoin-cross-source-audit
          python scripts/run_eoin_cross_source_audit_v1.py \
            --dataset-handle "$DATASET_HANDLE" \
            --max-download-mb "$MAX_DOWNLOAD_MB" \
            --output-dir /tmp/nbavl-eoin-cross-source-audit

      - name: Validate live cross-source guardrails
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path("/tmp/nbavl-eoin-cross-source-audit")
          status_path = root / "eoin-cross-source-run-status.json"
          if not status_path.exists():
              raise SystemExit("missing run status")
          status = json.loads(status_path.read_text())
          if "error" in status:
              print(json.dumps(status, indent=2, sort_keys=True))
              raise SystemExit("Eoin cross-source audit failed")

          report = json.loads((root / "eoin_cross_source_audit_report.json").read_text())
          assert status["cross_source_audit_complete"] is True, status
          assert status["temporary_raw_files_deleted"] is True, status
          assert status["raw_files_uploaded_as_artifact"] is False, status
          assert status["raw_rows_uploaded_as_artifact"] is False, status
          assert status["formal_stake"] == 0, status
          assert report["deterministic_matching_only"] is True, report
          assert report["fuzzy_matching"] is False, report
          assert report["formal_source_replacement_approved"] is False, report
          assert report["existing_silver_replacement"] is False, report
          assert report["existing_gold_replacement"] is False, report
          assert report["formal_stake"] == 0, report
          assert report["boundaries"]["raw_rows_emitted"] == 0, report
          assert report["boundaries"]["raw_files_emitted"] is False, report
          assert report["comparison"]["reference_games"] >= 1000, report

          print(json.dumps({
              "formal_outcome": report["formal_outcome"],
              "all_core_gates_passed": report["all_core_gates_passed"],
              "reference_games": report["comparison"]["reference_games"],
              "matched_games": report["comparison"]["matched_games"],
              "game_identity_match_rate": report["comparison"]["game_identity_match_rate"],
              "final_score_match_rate": report["comparison"]["final_score_match_rate"],
              "team_boxscore_coverage_rate": report["comparison"]["team_boxscore_coverage_rate"],
              "player_boxscore_candidate_coverage_rate": report["comparison"]["player_boxscore_candidate_coverage_rate"],
              "pbp_game_coverage_rate": report["comparison"]["pbp_game_coverage_rate"],
          }, indent=2, sort_keys=True))
          PY

      - name: Upload aggregate-only cross-source artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eoin-cross-source-audit-v1
          path: |
            /tmp/nbavl-eoin-cross-source-audit/eoin-cross-source-run-status.json
            /tmp/nbavl-eoin-cross-source-audit/eoin_cross_source_audit_report.json
          retention-days: 14
          if-no-files-found: warn
