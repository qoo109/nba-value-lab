name: Run forward feature source probe v1

on:
  pull_request:
    paths:
      - "scripts/probe_forward_feature_sources_2024_25_2025_26_v1.py"
      - ".github/workflows/run-forward-feature-source-probe-v1.yml"
      - "config/historical-source-pilot.json"
      - "scripts/historical_silver_runner.py"
      - "scripts/historical_silver_nbastats.py"
      - "scripts/historical_silver_pbpstats.py"
      - "scripts/historical_silver_schema.py"
      - "scripts/historical_phase2_core.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile source probe and existing Silver adapters
        run: |
          python -m py_compile \
            scripts/probe_forward_feature_sources_2024_25_2025_26_v1.py \
            scripts/historical_silver_runner.py \
            scripts/historical_silver_nbastats.py \
            scripts/historical_silver_pbpstats.py \
            scripts/historical_silver_schema.py \
            scripts/historical_phase2_core.py
      - name: Build 2024-25 Silver and probe 2025-26 sources
        run: |
          rm -rf /tmp/nbavl-forward-source-probe
          python scripts/probe_forward_feature_sources_2024_25_2025_26_v1.py \
            --output-dir /tmp/nbavl-forward-source-probe \
            --max-download-mb 600
      - name: Validate aggregate locks
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('/tmp/nbavl-forward-source-probe')
          report = json.loads((root / 'forward-feature-source-probe-report-v1.json').read_text())
          assert report['formal_state'] == 'FORWARD_FEATURE_SOURCES_FOUND_2024_25_SILVER_VALID_2025_26_ADAPTER_READY', report
          assert report['season_2024_25']['silver_ready'] is True
          assert report['season_2024_25']['silver_report']['outputs']['tables']['games'] >= 1200
          assert report['season_2024_25']['silver_report']['quality']['team_inference_pass'] is True
          assert report['season_2025_26']['adapter_readiness']['official_cdn_adapter_schema_ready'] is True
          assert report['season_2025_26']['adapter_readiness']['official_stats_v3_core_schema_ready'] is True
          assert report['season_2025_26']['adapter_readiness']['ready_for_full_2025_26_adapter_implementation'] is True
          assert report['execution']['provider_api_requests'] == 0
          assert report['execution']['raw_archives_committed'] is False
          assert report['execution']['raw_rows_emitted'] == 0
          assert report['execution']['model_retraining_executed'] is False
          assert report['execution']['model_scoring_executed'] is False
          assert report['execution']['market_join_executed'] is False
          assert report['qualification']['market_backtest_allowed'] is False
          assert report['qualification']['formal_stake'] == 0
          print(json.dumps({
              'formal_state': report['formal_state'],
              '2024_25_games': report['season_2024_25']['silver_report']['outputs']['tables']['games'],
              '2024_25_team_game_features': report['season_2024_25']['silver_report']['outputs']['tables']['team_game_features'],
              '2025_26_source_game_union': report['season_2025_26']['cross_source_game_id_coverage']['union'],
              '2025_26_all_three_overlap': report['season_2025_26']['cross_source_game_id_coverage']['all_three_intersection'],
              'formal_stake': 0,
          }, indent=2))
          PY
      - name: Remove raw temporary source material before upload
        if: always()
        run: |
          find /tmp/nbavl-forward-source-probe -type f \
            ! -name 'forward-feature-source-probe-report-v1.json' \
            ! -name 'historical-silver.sqlite.gz' \
            ! -name 'silver-build-report.json' \
            ! -name 'silver-sample.json' \
            -delete
      - name: Upload aggregate report and derived 2024-25 Silver
        uses: actions/upload-artifact@v4
        with:
          name: forward-feature-source-probe-2024-25-2025-26-v1
          path: |
            /tmp/nbavl-forward-source-probe/forward-feature-source-probe-report-v1.json
            /tmp/nbavl-forward-source-probe/silver-2024-25/historical-silver.sqlite.gz
            /tmp/nbavl-forward-source-probe/silver-2024-25/silver-build-report.json
            /tmp/nbavl-forward-source-probe/silver-2024-25/silver-sample.json
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
