name: Sync PROJECT_STATUS after Gold 5826 freeze policy v1

on:
  pull_request:
    branches:
      - main
    paths:
      - "scripts/sync_project_status_after_gold_5826_freeze_policy_v1.py"
      - ".github/workflows/sync-project-status-after-gold-5826-freeze-policy-v1.yml"

permissions:
  contents: write

concurrency:
  group: sync-project-status-after-gold-5826-freeze-policy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync-project-status:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: sync-project-status-after-gold-5826-freeze-policy-v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile guarded synchronizer
        run: python -m py_compile scripts/sync_project_status_after_gold_5826_freeze_policy_v1.py

      - name: Synchronize PROJECT_STATUS
        run: python scripts/sync_project_status_after_gold_5826_freeze_policy_v1.py

      - name: Enforce status-only generated diff
        run: |
          changed="$(git diff --name-only)"
          test "$changed" = "PROJECT_STATUS.md"
          grep -F "complete corpus freeze policy: VALIDATED / DESIGN ONLY" PROJECT_STATUS.md
          grep -F "complete corpus freeze policy recording PR: 135" PROJECT_STATUS.md
          grep -F "complete corpus freeze policy validation run: 29978555275" PROJECT_STATUS.md
          grep -F "semantic freeze manifest created: false" PROJECT_STATUS.md
          grep -F "corpus freeze executed: false" PROJECT_STATUS.md
          grep -F "HISTORICAL_GOLD_5826_COMPLETE_CORPUS_FREEZE_MANIFEST_IMPLEMENTATION_READY_FOR_DESIGN" PROJECT_STATUS.md
          grep -F "timestamped bookmaker odds: POLICY ONLY / REAL OBSERVED_AT DATA NOT ACQUIRED" PROJECT_STATUS.md
          grep -F "injury panel activation: 41 independent games / 31 T-60 selected / below 100-game gate" PROJECT_STATUS.md
          grep -F "formal stake: 0" PROJECT_STATUS.md

      - name: Commit synchronized PROJECT_STATUS to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PROJECT_STATUS.md
          git commit -m "Sync PROJECT_STATUS after Gold 5826 freeze policy [skip ci]"
          git push origin HEAD:sync-project-status-after-gold-5826-freeze-policy-v1
