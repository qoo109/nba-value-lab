name: Sync PROJECT_STATUS after official CDN recovery v1

on:
  pull_request:
    branches:
      - main
    paths:
      - "scripts/sync_project_status_after_official_cdn_recovery_v1.py"
      - ".github/workflows/sync-project-status-after-official-cdn-recovery-v1.yml"

permissions:
  contents: write

concurrency:
  group: sync-project-status-after-official-cdn-recovery-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync-project-status:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: sync-project-status-after-official-cdn-recovery

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile guarded synchronizer
        run: python -m py_compile scripts/sync_project_status_after_official_cdn_recovery_v1.py

      - name: Synchronize PROJECT_STATUS
        run: python scripts/sync_project_status_after_official_cdn_recovery_v1.py

      - name: Enforce generated status-only diff
        run: |
          changed="$(git diff --name-only)"
          test "$changed" = "PROJECT_STATUS.md"
          grep -F "reference coverage: 5,826 / 5,826" PROJECT_STATUS.md
          grep -F "source gap exception remaining count: 0" PROJECT_STATUS.md
          grep -F "raw Historical Gold matchups: 5,826" PROJECT_STATUS.md
          grep -F "raw missing Gold for Silver: 0" PROJECT_STATUS.md
          grep -F "Gold dataset complete for governed five-season scope: true" PROJECT_STATUS.md
          grep -F "HISTORICAL_GOLD_5826_COMPLETE_CORPUS_FREEZE_POLICY_READY_FOR_DESIGN" PROJECT_STATUS.md
          grep -F "workflow run: 29976204693" PROJECT_STATUS.md
          grep -F "formal Stake: 0" PROJECT_STATUS.md

      - name: Commit synchronized PROJECT_STATUS to PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PROJECT_STATUS.md
          git commit -m "Sync PROJECT_STATUS after official CDN recovery [skip ci]"
          git push origin HEAD:sync-project-status-after-official-cdn-recovery
