name: Sync PROJECT_STATUS after consumed source gap validation v1

on:
  push:
    branches:
      - sync-project-status-after-source-gap-validation
    paths:
      - "scripts/sync_project_status_after_source_gap_real_reference_validation_v1.py"
      - ".github/workflows/sync-project-status-after-source-gap-real-reference-validation-v1.yml"
  pull_request:
    branches:
      - main
    paths:
      - "scripts/sync_project_status_after_source_gap_real_reference_validation_v1.py"
      - ".github/workflows/sync-project-status-after-source-gap-real-reference-validation-v1.yml"

permissions:
  contents: write

jobs:
  sync-project-status:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out status-sync branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: sync-project-status-after-source-gap-validation

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile guarded status synchronizer
        run: python -m py_compile scripts/sync_project_status_after_source_gap_real_reference_validation_v1.py

      - name: Synchronize PROJECT_STATUS without removing historical evidence
        run: python scripts/sync_project_status_after_source_gap_real_reference_validation_v1.py

      - name: Enforce status-only generated diff
        run: |
          changed="$(git diff --name-only)"
          test "$changed" = "PROJECT_STATUS.md"
          grep -F "HISTORICAL_SILVER_2023_24_SOURCE_GAP_EXCEPTION_INTEGRATION_REAL_REFERENCE_VALIDATION_PASS_CONSUMED" PROJECT_STATUS.md
          grep -F "HISTORICAL_GOLD_5824_ELIGIBLE_CORPUS_FREEZE_AND_EXCEPTION_EXCLUSION_POLICY_READY_FOR_DESIGN" PROJECT_STATUS.md
          grep -F "real-reference validation request execution count: 1 / 1" PROJECT_STATUS.md
          grep -F "request consumed: true" PROJECT_STATUS.md
          grep -F "eligible Historical Gold corpus for future policy design: 5,824" PROJECT_STATUS.md
          grep -F "documented exceptions excluded from Gold eligibility: 2" PROJECT_STATUS.md
          grep -F "Gold dataset complete: false" PROJECT_STATUS.md
          grep -F "formal stake: 0" PROJECT_STATUS.md
          ! grep -F "real-reference validation request: VALID / AWAITING EXPLICIT USER APPROVAL" PROJECT_STATUS.md

      - name: Commit synchronized project status to the branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PROJECT_STATUS.md
          git commit -m "Sync PROJECT_STATUS after consumed source gap validation [skip ci]"
          git push origin HEAD:sync-project-status-after-source-gap-validation

# Markdown hard line breaks intentionally retain two trailing spaces on status-date lines.
# This branch-only workflow performs a guarded status synchronization and does not execute research data paths.
