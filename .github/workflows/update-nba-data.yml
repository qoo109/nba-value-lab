name: Update NBA free data

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "scripts/update_nba_data.py"
      - ".github/workflows/update-nba-data.yml"
  schedule:
    # Asia/Taipei: 08:05, 12:05, 17:05, 21:05
    - cron: "5 0,4,9,13 * * *"

permissions:
  contents: write

concurrency:
  group: nba-free-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collect NBA schedule and source health
        run: python scripts/update_nba_data.py

      - name: Validate generated JSON
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          required = [
              Path("data/current/games.json"),
              Path("data/current/source-status.json"),
              Path("data/current/update-meta.json"),
          ]
          for path in required:
              with path.open(encoding="utf-8") as handle:
                  payload = json.load(handle)
              has_meta = path.name == "update-meta.json" or "meta" in payload
              if not isinstance(payload, dict) or not has_meta:
                  raise SystemExit(f"Invalid generated file: {path}")
              print(f"validated {path}")
          PY

      - name: Commit changed snapshots
        run: |
          if git diff --quiet -- data/current; then
            echo "No snapshot changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/current
          git commit -m "data: refresh NBA schedule and source health"
          git push
