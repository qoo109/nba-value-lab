name: Validate current research status sync v1

on:
  pull_request:
    paths:
      - PROJECT_STATUS.md
      - README.md
      - data/research/prior-only-player-rotation-state-feature-layer-v1.json
      - data/research/prior-only-player-rotation-source-2025-26-result-v1.json
      - .github/workflows/validate-current-research-status-sync-v1.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate current and historical status separation
        run: |
          mkdir -p validation-output
          python - <<'PY'
          import json
          from pathlib import Path

          status = Path("PROJECT_STATUS.md").read_text(encoding="utf-8")
          readme = Path("README.md").read_text(encoding="utf-8")
          current, marker, evidence = status.partition("## Completed Evidence")
          mainline = "BUILD_PRIOR_ONLY_PLAYER_ROTATION_STATE_FEATURES_2025_26_V1_WITHOUT_MODEL_RETRAINING"

          checks = {
              "evidence_partition_present": bool(marker and evidence),
              "rotation_mainline_current_locations": current.count(mainline) == 2
                  and f"current unique research mainline: {mainline}" in current
                  and f"## Next Unique Mainline\n\n```text\n{mainline}" in current,
              "rotation_source_qualified": "prior-only rotation source: VALID / 1,230 OF 1,230 GAMES" in current,
              "rotation_build_not_executed": "real rotation feature build: NOT YET EXECUTED" in current,
              "gold_freeze_preserved_as_completed": "semantic freeze manifest created: true" in current
                  and "corpus freeze executed: true / SEMANTIC MANIFEST ONLY" in current,
              "provider_shell_preserved_as_completed": "hoopsapi synthetic adapter shell: COMPLETED / SYNTHETIC ONLY" in current,
              "g1_long_term_block_preserved": "VALIDATE_G1_2_0_END_TO_END_WITH_REAL_GOVERNED_2026_27_T60_INPUT" in current
                  and "current real-input status: BLOCKED / REAL GOVERNED INPUT NOT AVAILABLE" in current,
              "formal_stake_zero": "formal Stake: 0" in current and "正式 Stake：**0**" in status,
              "readme_current_mainline": mainline in readme,
              "readme_market_result_preserved": "NO_EVIDENCE_FROZEN_MODEL_BEATS_PRIVATE_MARKET_ARCHIVE" in readme,
              "no_model_retraining_authorization": "does not authorize residual promotion, model retraining" in status,
          }

          failed = sorted(name for name, passed in checks.items() if not passed)
          report = {
              "schema_version": 1,
              "formal_state": "CURRENT_RESEARCH_STATUS_SYNC_VALID" if not failed else "CURRENT_RESEARCH_STATUS_SYNC_INVALID",
              "checks": checks,
              "checks_total": len(checks),
              "checks_passed": len(checks) - len(failed),
              "checks_failed": len(failed),
              "failed_checks": failed,
              "current_mainline": mainline,
              "model_retraining_authorized": False,
              "market_backtest_authorized": False,
              "formal_stake": 0,
          }
          Path("validation-output/current-research-status-sync-v1.json").write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(report, ensure_ascii=False, indent=2))
          if failed:
              raise SystemExit(1)
          PY

      - name: Upload current status QA
        uses: actions/upload-artifact@v4
        with:
          name: current-research-status-sync-v1
          path: validation-output/current-research-status-sync-v1.json
          if-no-files-found: error
          retention-days: 14
