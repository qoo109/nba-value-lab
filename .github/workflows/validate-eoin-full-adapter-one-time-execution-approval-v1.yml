name: Validate Eoin one-time execution approval v1

on:
  push:
    branches:
      - main
    paths:
      - "data/eoin-full-adapter-one-time-execution-request-v1.json"
      - "data/eoin-full-adapter-one-time-execution-approval-v1.json"
      - "data/eoin-full-adapter-runner-implementation-v1.json"
      - "data/eoin-full-adapter-execution-policy-v1.json"
      - "scripts/run_eoin_full_adapter_one_time_execution_v1.py"
      - "scripts/run_eoin_role_limited_adapter_v1.py"
      - ".github/workflows/validate-eoin-full-adapter-one-time-execution-approval-v1.yml"
      - ".github/workflows/run-approved-eoin-full-adapter-once-v1.yml"
      - "docs/eoin-full-adapter-one-time-execution-approval-v1.md"
  pull_request:
    paths:
      - "data/eoin-full-adapter-one-time-execution-request-v1.json"
      - "data/eoin-full-adapter-one-time-execution-approval-v1.json"
      - "data/eoin-full-adapter-runner-implementation-v1.json"
      - "data/eoin-full-adapter-execution-policy-v1.json"
      - "scripts/run_eoin_full_adapter_one_time_execution_v1.py"
      - "scripts/run_eoin_role_limited_adapter_v1.py"
      - ".github/workflows/validate-eoin-full-adapter-one-time-execution-approval-v1.yml"
      - ".github/workflows/run-approved-eoin-full-adapter-once-v1.yml"
      - "docs/eoin-full-adapter-one-time-execution-approval-v1.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  approval-and-executor-self-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install self-test dependencies
        run: python -m pip install --disable-pip-version-check pyarrow kagglehub

      - name: Compile approval modules
        run: |
          python -m py_compile \
            scripts/run_eoin_full_adapter_one_time_execution_v1.py \
            scripts/run_eoin_role_limited_adapter_v1.py \
            scripts/run_eoin_kaggle_census_v1.py

      - name: Validate explicit approval record
        run: |
          rm -rf /tmp/nbavl-eoin-approved-once-v1
          mkdir -p /tmp/nbavl-eoin-approved-once-v1
          python scripts/run_eoin_full_adapter_one_time_execution_v1.py \
            --validate-only \
            --confirmation-request-id EOIN-FULL-ADAPTER-2026-07-19-001 \
            --workflow-event workflow_dispatch \
            --workflow-ref refs/heads/main \
            --output /tmp/nbavl-eoin-approved-once-v1/approval-validation-report.json

      - name: Run synthetic executor self-test
        run: |
          python scripts/run_eoin_full_adapter_one_time_execution_v1.py \
            --self-test \
            --output /tmp/nbavl-eoin-approved-once-v1/executor-self-test-report.json

      - name: Enforce no-network CI boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('/tmp/nbavl-eoin-approved-once-v1')
          approval = json.loads((root / 'approval-validation-report.json').read_text())
          self_test = json.loads((root / 'executor-self-test-report.json').read_text())

          assert approval['formal_state'] == 'ONE_TIME_EXECUTION_APPROVAL_VALID_READY_FOR_MANUAL_DISPATCH', approval
          assert approval['checks_failed'] == 0, approval
          assert approval['ready_for_one_time_aggregate_execution'] is True, approval
          assert approval['ready_for_repeat_execution'] is False, approval
          assert approval['formal_stake'] == 0, approval

          assert self_test['formal_state'] == 'ONE_TIME_EXECUTION_EXECUTOR_SELF_TEST_PASS', self_test
          assert self_test['fixture_mode'] is True, self_test
          assert self_test['all_research_gates_passed'] is True, self_test
          assert self_test['boundaries']['temporary_raw_eoin_rows_read'] is False, self_test
          assert self_test['boundaries']['raw_rows_emitted'] == 0, self_test
          assert self_test['boundaries']['raw_files_emitted'] is False, self_test
          assert self_test['boundaries']['historical_silver_replacement'] is False, self_test
          assert self_test['boundaries']['historical_gold_replacement'] is False, self_test
          assert self_test['boundaries']['market_backtest'] is False, self_test
          assert self_test['boundaries']['formal_stake'] == 0, self_test
          PY

      - name: Upload aggregate-only approval artifact
        uses: actions/upload-artifact@v4
        with:
          name: eoin-one-time-execution-approval-v1
          path: |
            /tmp/nbavl-eoin-approved-once-v1/approval-validation-report.json
            /tmp/nbavl-eoin-approved-once-v1/executor-self-test-report.json
          retention-days: 14
          if-no-files-found: error
