name: Validate Eoin secondary QA integration policy v1

on:
  pull_request:
    paths:
      - "data/eoin-secondary-qa-integration-policy-v1.json"
      - "data/eoin-cross-source-audit-v1.json"
      - "data/eoin-post-execution-role-review-policy-v1.json"
      - "data/eoin-post-execution-role-review-evaluation-v1.json"
      - "scripts/validate_eoin_secondary_qa_integration_policy_v1.py"
      - "docs/eoin-secondary-qa-integration-policy-v1.md"
      - ".github/workflows/validate-eoin-secondary-qa-integration-policy-v1.yml"
  push:
    branches:
      - main
    paths:
      - "data/eoin-secondary-qa-integration-policy-v1.json"
      - "data/eoin-cross-source-audit-v1.json"
      - "data/eoin-post-execution-role-review-policy-v1.json"
      - "data/eoin-post-execution-role-review-evaluation-v1.json"
      - "scripts/validate_eoin_secondary_qa_integration_policy_v1.py"
      - "docs/eoin-secondary-qa-integration-policy-v1.md"
      - ".github/workflows/validate-eoin-secondary-qa-integration-policy-v1.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  policy-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile validator
        run: |
          python -m py_compile scripts/validate_eoin_secondary_qa_integration_policy_v1.py

      - name: Validate policy and evidence contract
        run: |
          mkdir -p artifacts/eoin-secondary-qa-integration-policy-v1
          python scripts/validate_eoin_secondary_qa_integration_policy_v1.py \
            --policy data/eoin-secondary-qa-integration-policy-v1.json \
            --cross-report data/eoin-cross-source-audit-v1.json \
            --role-policy data/eoin-post-execution-role-review-policy-v1.json \
            --evaluation-manifest data/eoin-post-execution-role-review-evaluation-v1.json \
            --output artifacts/eoin-secondary-qa-integration-policy-v1/eoin-secondary-qa-integration-policy-v1-report.json \
            --self-test

      - name: Enforce alert-only boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path(
              "artifacts/eoin-secondary-qa-integration-policy-v1/"
              "eoin-secondary-qa-integration-policy-v1-report.json"
          )
          report = json.loads(path.read_text(encoding="utf-8"))
          assert report["formal_state"] == "EOIN_SECONDARY_QA_INTEGRATION_POLICY_READY_FOR_IMPLEMENTATION", report
          assert report["checks_failed"] == 0, report
          assert report["current_formal_role"] == "ROLE_LIMITED_SECONDARY_QA_SOURCE_VALIDATED", report

          quality = report["quality"]
          assert quality["network_calls_made"] is False, report
          assert quality["external_artifacts_downloaded"] is False, report
          assert quality["new_bundle_execution_performed"] is False, report
          assert quality["raw_eoin_rows_read"] is False, report
          assert quality["raw_rows_emitted"] == 0, report
          assert quality["raw_files_emitted"] is False, report
          assert quality["derived_tables_emitted"] is False, report
          assert quality["integration_active"] is False, report
          assert quality["formal_stake"] == 0, report

          decision = report["decision"]
          assert decision["ready_for_contract_monitor_implementation"] is True, report
          assert decision["current_formal_role_unchanged"] is True, report
          assert decision["alert_only"] is True, report
          for key, value in decision.items():
              if key in {
                  "ready_for_contract_monitor_implementation",
                  "current_formal_role_unchanged",
                  "alert_only",
              }:
                  assert value is True, (key, report)
              elif key == "formal_stake":
                  assert value == 0, report
              else:
                  assert value is False, (key, report)

          files = [item for item in path.parent.iterdir() if item.is_file()]
          assert files == [path], files
          assert path.stat().st_size <= 1024 * 1024, path.stat().st_size
          PY

      - name: Upload aggregate-only policy artifact
        uses: actions/upload-artifact@v4
        with:
          name: eoin-secondary-qa-integration-policy-v1
          path: artifacts/eoin-secondary-qa-integration-policy-v1/eoin-secondary-qa-integration-policy-v1-report.json
          if-no-files-found: error
          retention-days: 14
