name: Validate expanded participation census v1

on:
  pull_request:
    paths:
      - "data/expanded-participation-census-v1.json"
      - "data/player-participation-label-policy-v1.json"
      - "data/multi-report-injury-backfill-wave1-times.json"
      - "data/multi-report-injury-backfill-wave2-times.json"
      - "data/multi-report-injury-backfill-wave3-times.json"
      - "scripts/audit_expanded_participation_census_v1.py"
      - "scripts/validate_expected_minutes_audit_source_rebuild.py"
      - "scripts/import_official_nba_participation_labels.py"
      - "scripts/run_official_nba_participation_import.py"
      - "scripts/audit_player_participation_labels.py"
      - "scripts/build_expected_minutes_accuracy_dataset_v2.py"
      - ".github/workflows/validate-expanded-participation-census-v1.yml"
      - "docs/expanded-participation-census-v1.md"
      - "PROJECT_STATUS.md"
  workflow_dispatch:
    inputs:
      gold_source_run_id:
        description: "Workflow run containing historical-gold-multiseason"
        required: true
        default: "29551715399"
      combined_feature_run_id:
        description: "Verified PR #51 run containing the combined 293-game selected panel"
        required: true
        default: "29629934161"

permissions:
  contents: read
  actions: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile census modules
        run: |
          python -m py_compile scripts/audit_expanded_participation_census_v1.py
          python -m py_compile scripts/validate_expected_minutes_audit_source_rebuild.py
          python -m py_compile scripts/import_official_nba_participation_labels.py
          python -m py_compile scripts/run_official_nba_participation_import.py
          python -m py_compile scripts/audit_player_participation_labels.py
          python -m py_compile scripts/build_expected_minutes_accuracy_dataset_v2.py
      - name: Run deterministic census self-tests
        run: |
          rm -rf /tmp/nbavl-expanded-census-self-test
          python scripts/validate_expected_minutes_audit_source_rebuild.py --self-test
          PYTHONPATH=scripts python scripts/import_official_nba_participation_labels.py \
            --self-test \
            --output-dir /tmp/nbavl-expanded-census-self-test/import
          PYTHONPATH=scripts python scripts/audit_player_participation_labels.py \
            --self-test \
            --output-dir /tmp/nbavl-expanded-census-self-test/participation
          PYTHONPATH=scripts python scripts/build_expected_minutes_accuracy_dataset_v2.py \
            --self-test \
            --output-dir /tmp/nbavl-expanded-census-self-test/dataset
          PYTHONPATH=scripts python scripts/audit_expanded_participation_census_v1.py \
            --self-test \
            --output-dir /tmp/nbavl-expanded-census-self-test/census
          python -m json.tool \
            /tmp/nbavl-expanded-census-self-test/census/report/expanded-participation-census-v1.json \
            >/dev/null

  live-census:
    needs: self-test
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      GH_TOKEN: ${{ github.token }}
      GOLD_SOURCE_RUN_ID: ${{ github.event.inputs.gold_source_run_id || '29551715399' }}
      COMBINED_FEATURE_RUN_ID: ${{ github.event.inputs.combined_feature_run_id || '29629934161' }}
      ROOT: /tmp/nbavl-expanded-participation-census-v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check pandas httpx pymupdf

      - name: Download audited Gold and frozen 293-game panel
        run: |
          rm -rf "$ROOT"
          mkdir -p "$ROOT/gold" "$ROOT/combined-source"
          gh run download "$GOLD_SOURCE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name historical-gold-multiseason \
            --dir "$ROOT/gold"
          GOLD_FILE="$(find "$ROOT/gold" -name 'historical-gold-multiseason.sqlite.gz' -print -quit)"
          test -n "$GOLD_FILE"
          echo "GOLD_FILE=$GOLD_FILE" >> "$GITHUB_ENV"
          gh run download "$COMBINED_FEATURE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name injury-backfill-wave3-features \
            --dir "$ROOT/combined-source"
          python - <<'PY'
          import csv, json, os
          from pathlib import Path
          root = Path(os.environ["ROOT"]) / "combined-source/combined"
          report = json.loads((root / "combined-selected-injury-waves-report.json").read_text())
          rows = list(csv.DictReader((root / "combined-selected-matchup-injury-burden.csv").open()))
          assert report["decision"]["ready_for_combined_selected_panel_research"] is True, report
          assert report["coverage"]["combined_independent_games"] == 293, report
          assert report["coverage"]["duplicate_games_across_waves"] == 0, report
          assert report["coverage"]["selected_source_wave_counts"] == {
              "wave1": 91, "wave2": 85, "wave3": 117
          }, report
          assert len(rows) == 293
          assert len({row["historical_game_id"] for row in rows}) == 293
          PY

      - name: Rebuild frozen Wave 1, Wave 2, and Wave 3 sources
        run: |
          for WAVE in wave1 wave2 wave3; do
            mkdir -p "$ROOT/$WAVE"
            set +e
            PYTHONPATH=scripts python scripts/build_multi_report_injury_panel.py \
              --report-times "data/multi-report-injury-backfill-${WAVE}-times.json" \
              --output-dir "$ROOT/$WAVE/player"
            PLAYER_EXIT=$?
            set -e
            python scripts/validate_expected_minutes_audit_source_rebuild.py \
              --wave "$WAVE" \
              --report "$ROOT/$WAVE/player/multi-report-injury-panel-report.json" \
              --source-index "$ROOT/$WAVE/player/multi-report-source-index.csv" \
              --importer-exit "$PLAYER_EXIT"
            PYTHONPATH=scripts python scripts/build_multi_report_team_submission_panel.py \
              --report-times "data/multi-report-injury-backfill-${WAVE}-times.json" \
              --output-dir "$ROOT/$WAVE/team"
            python scripts/audit_ready_injury_report_overlap.py \
              --player-source-index "$ROOT/$WAVE/player/multi-report-source-index.csv" \
              --team-source-index "$ROOT/$WAVE/team/multi-report-team-submission-source-index.csv" \
              --output-dir "$ROOT/$WAVE/ready"
            python scripts/filter_injury_panels_to_acquisition_overlap.py \
              --player-panel "$ROOT/$WAVE/player/multi-report-injury-panel-normalized.csv" \
              --player-source-index "$ROOT/$WAVE/ready/ready-player-source-index.csv" \
              --team-panel "$ROOT/$WAVE/team/multi-report-team-submission-panel.csv" \
              --team-source-index "$ROOT/$WAVE/team/multi-report-team-submission-source-index.csv" \
              --output-dir "$ROOT/$WAVE/overlap"
          done

      - name: Match all ready player snapshots to Historical Gold
        run: |
          for WAVE in wave1 wave2 wave3; do
            python scripts/validate_injury_snapshot_schedule_match.py \
              --snapshot-csv "$ROOT/$WAVE/overlap/overlap-player-injury-panel.csv" \
              --gold "$GOLD_FILE" \
              --output-dir "$ROOT/$WAVE/schedule"
          done

      - name: Import and combine prior-only identity reference logs
        run: |
          PYTHONPATH=scripts python scripts/import_open_player_boxscores.py \
            --season 2022-23 \
            --gold "$GOLD_FILE" \
            --output-dir "$ROOT/boxscores-2022"
          PYTHONPATH=scripts python scripts/import_open_player_boxscores.py \
            --season 2023-24 \
            --gold "$GOLD_FILE" \
            --output-dir "$ROOT/boxscores-2023"
          python - <<'PY'
          import csv, os
          from pathlib import Path
          root = Path(os.environ["ROOT"])
          rows = {}
          fields = None
          for path in [
              root / "boxscores-2022/open-player-boxscores.csv",
              root / "boxscores-2023/open-player-boxscores.csv",
          ]:
              with path.open("r", encoding="utf-8-sig", newline="") as handle:
                  reader = csv.DictReader(handle)
                  fields = fields or list(reader.fieldnames or [])
                  for row in reader:
                      rows[(row["SEASON_YEAR"], row["GAME_ID"], row["PLAYER_ID"])] = row
          with (root / "combined-player-boxscores.csv").open("w", encoding="utf-8", newline="") as handle:
              writer = csv.DictWriter(handle, fieldnames=fields)
              writer.writeheader()
              writer.writerows(rows[key] for key in sorted(rows))
          print({"combined_rows": len(rows)})
          PY

      - name: Rebuild deterministic identities and prior-only Expected Minutes
        run: |
          for WAVE in wave1 wave2 wave3; do
            PYTHONPATH=scripts python scripts/match_injury_players_from_boxscores.py \
              --snapshot-csv "$ROOT/$WAVE/overlap/overlap-player-injury-panel.csv" \
              --game-map-csv "$ROOT/$WAVE/schedule/injury-snapshot-game-id-map.csv" \
              --boxscore-csv "$ROOT/combined-player-boxscores.csv" \
              --output-dir "$ROOT/$WAVE/identity"
            PYTHONPATH=scripts python scripts/build_point_in_time_player_values.py \
              --player-logs "$ROOT/combined-player-boxscores.csv" \
              --snapshot-csv "$ROOT/$WAVE/overlap/overlap-player-injury-panel.csv" \
              --player-id-map "$ROOT/$WAVE/identity/injury-player-id-map.csv" \
              --output-dir "$ROOT/$WAVE/values"
          done

      - name: Import official final-game participation labels for 293 games
        run: |
          PYTHONPATH=scripts python scripts/run_official_nba_participation_import.py \
            --selected-games "$ROOT/combined-source/combined/combined-selected-matchup-injury-burden.csv" \
            --output-dir "$ROOT/official-labels" \
            --max-workers 6

      - name: Validate official labels on the frozen three-wave snapshots
        run: |
          python scripts/audit_player_participation_labels.py \
            --combined-selected "$ROOT/combined-source/combined/combined-selected-matchup-injury-burden.csv" \
            --wave wave1 "$ROOT/wave1/overlap/overlap-player-injury-panel.csv" "$ROOT/wave1/identity/injury-player-id-map.csv" \
            --wave wave2 "$ROOT/wave2/overlap/overlap-player-injury-panel.csv" "$ROOT/wave2/identity/injury-player-id-map.csv" \
            --wave wave3 "$ROOT/wave3/overlap/overlap-player-injury-panel.csv" "$ROOT/wave3/identity/injury-player-id-map.csv" \
            --labels "$ROOT/official-labels/official-player-participation-labels.csv" \
            --source-index "$ROOT/official-labels/official-player-participation-source-index.csv" \
            --import-report "$ROOT/official-labels/official-player-participation-import-report.json" \
            --policy data/expanded-participation-census-v1.json \
            --output-dir "$ROOT/participation-audit"

      - name: Build temporary census rows without running an accuracy audit
        run: |
          PYTHONPATH=scripts python scripts/build_expected_minutes_accuracy_dataset_v2.py \
            --combined-selected "$ROOT/combined-source/combined/combined-selected-matchup-injury-burden.csv" \
            --wave wave1 "$ROOT/wave1/overlap/overlap-player-injury-panel.csv" "$ROOT/wave1/identity/injury-player-id-map.csv" "$ROOT/wave1/values/point-in-time-player-values.csv" \
            --wave wave2 "$ROOT/wave2/overlap/overlap-player-injury-panel.csv" "$ROOT/wave2/identity/injury-player-id-map.csv" "$ROOT/wave2/values/point-in-time-player-values.csv" \
            --wave wave3 "$ROOT/wave3/overlap/overlap-player-injury-panel.csv" "$ROOT/wave3/identity/injury-player-id-map.csv" "$ROOT/wave3/values/point-in-time-player-values.csv" \
            --prior-player-logs "$ROOT/combined-player-boxscores.csv" \
            --participation-labels "$ROOT/official-labels/official-player-participation-labels.csv" \
            --participation-source-index "$ROOT/official-labels/official-player-participation-source-index.csv" \
            --participation-import-report "$ROOT/official-labels/official-player-participation-import-report.json" \
            --participation-audit-report "$ROOT/participation-audit/player-participation-label-audit.json" \
            --output-dir "$ROOT/census-dataset"

      - name: Freeze aggregate census and delete player-level temporary files
        id: census
        run: |
          set +e
          PYTHONPATH=scripts python scripts/audit_expanded_participation_census_v1.py \
            --rows "$ROOT/census-dataset/expected-minutes-accuracy-v2-rows.csv" \
            --dataset-report "$ROOT/census-dataset/expected-minutes-accuracy-v2-dataset-report.json" \
            --participation-audit-report "$ROOT/participation-audit/player-participation-label-audit.json" \
            --participation-import-report "$ROOT/official-labels/official-player-participation-import-report.json" \
            --combined-report "$ROOT/combined-source/combined/combined-selected-injury-waves-report.json" \
            --identity-report "$ROOT/wave1/identity/injury-player-boxscore-identity-report.json" \
            --identity-report "$ROOT/wave2/identity/injury-player-boxscore-identity-report.json" \
            --identity-report "$ROOT/wave3/identity/injury-player-boxscore-identity-report.json" \
            --policy data/expanded-participation-census-v1.json \
            --sensitive-root "$ROOT" \
            --output-dir "$ROOT/census"
          CENSUS_EXIT=$?
          set -e
          test "$CENSUS_EXIT" -eq 0 -o "$CENSUS_EXIT" -eq 2
          test -s "$ROOT/census/expanded-participation-census-v1.json"
          echo "census_exit=$CENSUS_EXIT" >> "$GITHUB_OUTPUT"

      - name: Verify aggregate-only privacy boundary
        if: always()
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          root = Path(os.environ["ROOT"])
          policy = json.loads(Path("data/expanded-participation-census-v1.json").read_text())
          forbidden = set(policy["forbidden_player_level_filenames"])
          found = sorted(
              str(path.relative_to(root))
              for path in root.rglob("*")
              if path.is_file() and path.name in forbidden
          )
          assert not found, found
          assert not list(root.rglob("*.pdf"))
          assert not [path for path in root.rglob("*") if path.is_file() and path.name.endswith(".json.raw")]
          PY

      - name: Upload aggregate census artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expanded-participation-census-v1
          path: |
            /tmp/nbavl-expanded-participation-census-v1/combined-source/combined/combined-selected-injury-waves-report.json
            /tmp/nbavl-expanded-participation-census-v1/wave1/player/multi-report-injury-panel-report.json
            /tmp/nbavl-expanded-participation-census-v1/wave2/player/multi-report-injury-panel-report.json
            /tmp/nbavl-expanded-participation-census-v1/wave3/player/multi-report-injury-panel-report.json
            /tmp/nbavl-expanded-participation-census-v1/wave1/ready/ready-overlap-audit.json
            /tmp/nbavl-expanded-participation-census-v1/wave2/ready/ready-overlap-audit.json
            /tmp/nbavl-expanded-participation-census-v1/wave3/ready/ready-overlap-audit.json
            /tmp/nbavl-expanded-participation-census-v1/wave1/schedule/injury-snapshot-schedule-match-report.json
            /tmp/nbavl-expanded-participation-census-v1/wave2/schedule/injury-snapshot-schedule-match-report.json
            /tmp/nbavl-expanded-participation-census-v1/wave3/schedule/injury-snapshot-schedule-match-report.json
            /tmp/nbavl-expanded-participation-census-v1/wave1/identity/injury-player-boxscore-identity-report.json
            /tmp/nbavl-expanded-participation-census-v1/wave2/identity/injury-player-boxscore-identity-report.json
            /tmp/nbavl-expanded-participation-census-v1/wave3/identity/injury-player-boxscore-identity-report.json
            /tmp/nbavl-expanded-participation-census-v1/wave1/values/point-in-time-player-value-report.json
            /tmp/nbavl-expanded-participation-census-v1/wave2/values/point-in-time-player-value-report.json
            /tmp/nbavl-expanded-participation-census-v1/wave3/values/point-in-time-player-value-report.json
            /tmp/nbavl-expanded-participation-census-v1/official-labels/official-player-participation-source-index.csv
            /tmp/nbavl-expanded-participation-census-v1/official-labels/official-player-participation-import-report.json
            /tmp/nbavl-expanded-participation-census-v1/participation-audit/player-participation-label-audit.json
            /tmp/nbavl-expanded-participation-census-v1/participation-audit/player-participation-label-summary.csv
            /tmp/nbavl-expanded-participation-census-v1/census-dataset/expected-minutes-accuracy-v2-dataset-report.json
            /tmp/nbavl-expanded-participation-census-v1/census/expanded-participation-census-v1.json
          retention-days: 14
          if-no-files-found: error

      - name: Enforce census decision and permanent non-activation
        if: always()
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          root = Path(os.environ["ROOT"])
          census = json.loads((root / "census/expanded-participation-census-v1.json").read_text())
          assert census["decision_state"] in {
              "CENSUS_READY_AUDIT_V3_NOT_ELIGIBLE",
              "CENSUS_READY_AUDIT_V3_ELIGIBLE",
          }, census
          assert census["quality"]["structural_blockers"] == [], census
          assert census["quality"]["forbidden_player_level_files_retained"] == 0, census
          assert census["quality"]["accuracy_metrics_calculated"] is False, census
          assert census["decision"]["ready_for_expected_minutes_accuracy_audit_v3_execution"] is False
          assert census["decision"]["ready_for_injury_feature_walk_forward_holdout"] is False
          assert census["decision"]["ready_for_model_training"] is False
          assert census["decision"]["ready_for_probability_adjustment"] is False
          assert census["decision"]["ready_for_betting_edge_claim"] is False
          assert census["decision"]["formal_stake"] == 0
          print(json.dumps({
              "decision_state": census["decision_state"],
              "coverage": census["coverage"],
              "sample_blockers": census["quality"]["sample_blockers"],
              "decision": census["decision"],
          }, indent=2))
          PY
