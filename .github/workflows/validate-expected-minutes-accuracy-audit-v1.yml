name: Validate Expected Minutes accuracy audit v1

on:
  pull_request:
    paths:
      - "data/expected-minutes-accuracy-audit-v1.json"
      - "data/multi-report-injury-backfill-wave1-times.json"
      - "data/multi-report-injury-backfill-wave2-times.json"
      - "scripts/build_expected_minutes_accuracy_dataset.py"
      - "scripts/audit_expected_minutes_accuracy.py"
      - ".github/workflows/validate-expected-minutes-accuracy-audit-v1.yml"
      - "docs/expected-minutes-accuracy-audit-v1.md"
      - "PROJECT_STATUS.md"
  workflow_dispatch:
    inputs:
      gold_source_run_id:
        description: "Workflow run containing historical-gold-multiseason"
        required: true
        default: "29551715399"
      combined_feature_run_id:
        description: "Verified workflow run containing combined 176-game selected panel"
        required: true
        default: "29597203452"

permissions:
  contents: read
  actions: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Expected Minutes audit modules
        run: |
          python -m py_compile scripts/build_expected_minutes_accuracy_dataset.py
          python -m py_compile scripts/audit_expected_minutes_accuracy.py
      - name: Run deterministic Expected Minutes audit self-tests
        run: |
          rm -rf /tmp/nbavl-expected-minutes-self-test
          python scripts/build_expected_minutes_accuracy_dataset.py \
            --self-test \
            --output-dir /tmp/nbavl-expected-minutes-self-test/dataset
          python scripts/audit_expected_minutes_accuracy.py \
            --self-test \
            --output-dir /tmp/nbavl-expected-minutes-self-test/audit
          python -m json.tool /tmp/nbavl-expected-minutes-self-test/audit/expected-minutes-accuracy-audit.json >/dev/null

  live-audit:
    needs: self-test
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GH_TOKEN: ${{ github.token }}
      GOLD_SOURCE_RUN_ID: ${{ github.event.inputs.gold_source_run_id || '29551715399' }}
      COMBINED_FEATURE_RUN_ID: ${{ github.event.inputs.combined_feature_run_id || '29597203452' }}
      ROOT: /tmp/nbavl-expected-minutes-audit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check pandas httpx pymupdf
      - name: Download audited Historical Gold
        run: |
          rm -rf "$ROOT"
          mkdir -p "$ROOT/gold"
          gh run download "$GOLD_SOURCE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name historical-gold-multiseason \
            --dir "$ROOT/gold"
          GOLD_FILE="$(find "$ROOT/gold" -name 'historical-gold-multiseason.sqlite.gz' -print -quit)"
          test -n "$GOLD_FILE"
          echo "GOLD_FILE=$GOLD_FILE" >> "$GITHUB_ENV"
      - name: Download verified combined 176-game selected panel
        run: |
          mkdir -p "$ROOT/combined-source"
          gh run download "$COMBINED_FEATURE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name injury-backfill-wave2-features \
            --dir "$ROOT/combined-source"
          test -s "$ROOT/combined-source/combined/combined-selected-matchup-injury-burden.csv"
          test -s "$ROOT/combined-source/combined/combined-selected-injury-waves-report.json"
          python - <<'PY'
          import csv
          import json
          import os
          from pathlib import Path
          root = Path(os.environ['ROOT']) / 'combined-source/combined'
          report = json.loads((root / 'combined-selected-injury-waves-report.json').read_text())
          rows = list(csv.DictReader((root / 'combined-selected-matchup-injury-burden.csv').open()))
          assert report['decision']['ready_for_expected_minutes_accuracy_audit'] is True, report
          assert report['coverage']['combined_independent_games'] == 176, report
          assert len(rows) == 176
          assert len({row['historical_game_id'] for row in rows}) == 176
          assert {row['source_wave'] for row in rows} == {'wave1', 'wave2'}
          print({'combined_selected_games': len(rows)})
          PY
      - name: Rebuild Wave 1 official player and team panels
        id: wave1_sources
        continue-on-error: true
        run: |
          PYTHONPATH=scripts python scripts/build_multi_report_injury_panel.py \
            --report-times data/multi-report-injury-backfill-wave1-times.json \
            --output-dir "$ROOT/wave1/player"
          PYTHONPATH=scripts python scripts/build_multi_report_team_submission_panel.py \
            --report-times data/multi-report-injury-backfill-wave1-times.json \
            --output-dir "$ROOT/wave1/team"
      - name: Restrict Wave 1 to single-report-ready overlap
        id: wave1_overlap
        continue-on-error: true
        run: |
          python scripts/audit_ready_injury_report_overlap.py \
            --player-source-index "$ROOT/wave1/player/multi-report-source-index.csv" \
            --team-source-index "$ROOT/wave1/team/multi-report-team-submission-source-index.csv" \
            --output-dir "$ROOT/wave1/ready"
          python scripts/filter_injury_panels_to_acquisition_overlap.py \
            --player-panel "$ROOT/wave1/player/multi-report-injury-panel-normalized.csv" \
            --player-source-index "$ROOT/wave1/ready/ready-player-source-index.csv" \
            --team-panel "$ROOT/wave1/team/multi-report-team-submission-panel.csv" \
            --team-source-index "$ROOT/wave1/team/multi-report-team-submission-source-index.csv" \
            --output-dir "$ROOT/wave1/overlap"
      - name: Rebuild Wave 2 official player and team panels
        id: wave2_sources
        continue-on-error: true
        run: |
          PYTHONPATH=scripts python scripts/build_multi_report_injury_panel.py \
            --report-times data/multi-report-injury-backfill-wave2-times.json \
            --output-dir "$ROOT/wave2/player"
          PYTHONPATH=scripts python scripts/build_multi_report_team_submission_panel.py \
            --report-times data/multi-report-injury-backfill-wave2-times.json \
            --output-dir "$ROOT/wave2/team"
      - name: Restrict Wave 2 to single-report-ready overlap
        id: wave2_overlap
        continue-on-error: true
        run: |
          python scripts/audit_ready_injury_report_overlap.py \
            --player-source-index "$ROOT/wave2/player/multi-report-source-index.csv" \
            --team-source-index "$ROOT/wave2/team/multi-report-team-submission-source-index.csv" \
            --output-dir "$ROOT/wave2/ready"
          python scripts/filter_injury_panels_to_acquisition_overlap.py \
            --player-panel "$ROOT/wave2/player/multi-report-injury-panel-normalized.csv" \
            --player-source-index "$ROOT/wave2/ready/ready-player-source-index.csv" \
            --team-panel "$ROOT/wave2/team/multi-report-team-submission-panel.csv" \
            --team-source-index "$ROOT/wave2/team/multi-report-team-submission-source-index.csv" \
            --output-dir "$ROOT/wave2/overlap"
      - name: Match Wave 1 and Wave 2 player snapshots to Historical Gold
        id: schedule_match
        continue-on-error: true
        run: |
          python scripts/validate_injury_snapshot_schedule_match.py \
            --snapshot-csv "$ROOT/wave1/overlap/overlap-player-injury-panel.csv" \
            --gold "$GOLD_FILE" \
            --output-dir "$ROOT/wave1/schedule"
          python scripts/validate_injury_snapshot_schedule_match.py \
            --snapshot-csv "$ROOT/wave2/overlap/overlap-player-injury-panel.csv" \
            --gold "$GOLD_FILE" \
            --output-dir "$ROOT/wave2/schedule"
      - name: Import Gold-validated player boxscores
        id: boxscores
        continue-on-error: true
        run: |
          PYTHONPATH=scripts python scripts/import_open_player_boxscores.py \
            --season 2022-23 \
            --gold "$GOLD_FILE" \
            --output-dir "$ROOT/boxscores-2022"
          PYTHONPATH=scripts python scripts/import_open_player_boxscores.py \
            --season 2023-24 \
            --gold "$GOLD_FILE" \
            --output-dir "$ROOT/boxscores-2023"
      - name: Combine temporary player boxscore archive
        id: combine_boxscores
        continue-on-error: true
        run: |
          python - <<'PY'
          import csv
          import os
          from pathlib import Path
          root = Path(os.environ['ROOT'])
          sources = [root / 'boxscores-2022/open-player-boxscores.csv', root / 'boxscores-2023/open-player-boxscores.csv']
          rows = {}
          fields = None
          for path in sources:
              with path.open('r', encoding='utf-8-sig', newline='') as handle:
                  reader = csv.DictReader(handle)
                  fields = fields or list(reader.fieldnames or [])
                  for row in reader:
                      rows[(row['SEASON_YEAR'], row['GAME_ID'], row['PLAYER_ID'])] = row
          output = root / 'combined-player-boxscores.csv'
          with output.open('w', encoding='utf-8', newline='') as handle:
              writer = csv.DictWriter(handle, fieldnames=fields)
              writer.writeheader()
              writer.writerows(rows[key] for key in sorted(rows))
          print({'combined_rows': len(rows)})
          PY
      - name: Build Wave 1 deterministic identity and prior-only values
        id: wave1_values
        continue-on-error: true
        run: |
          PYTHONPATH=scripts python scripts/match_injury_players_from_boxscores.py \
            --snapshot-csv "$ROOT/wave1/overlap/overlap-player-injury-panel.csv" \
            --game-map-csv "$ROOT/wave1/schedule/injury-snapshot-game-id-map.csv" \
            --boxscore-csv "$ROOT/combined-player-boxscores.csv" \
            --output-dir "$ROOT/wave1/identity"
          PYTHONPATH=scripts python scripts/build_point_in_time_player_values.py \
            --player-logs "$ROOT/combined-player-boxscores.csv" \
            --snapshot-csv "$ROOT/wave1/overlap/overlap-player-injury-panel.csv" \
            --player-id-map "$ROOT/wave1/identity/injury-player-id-map.csv" \
            --output-dir "$ROOT/wave1/values"
      - name: Build Wave 2 deterministic identity and prior-only values
        id: wave2_values
        continue-on-error: true
        run: |
          PYTHONPATH=scripts python scripts/match_injury_players_from_boxscores.py \
            --snapshot-csv "$ROOT/wave2/overlap/overlap-player-injury-panel.csv" \
            --game-map-csv "$ROOT/wave2/schedule/injury-snapshot-game-id-map.csv" \
            --boxscore-csv "$ROOT/combined-player-boxscores.csv" \
            --output-dir "$ROOT/wave2/identity"
          PYTHONPATH=scripts python scripts/build_point_in_time_player_values.py \
            --player-logs "$ROOT/combined-player-boxscores.csv" \
            --snapshot-csv "$ROOT/wave2/overlap/overlap-player-injury-panel.csv" \
            --player-id-map "$ROOT/wave2/identity/injury-player-id-map.csv" \
            --output-dir "$ROOT/wave2/values"
      - name: Build temporary deidentified accuracy rows
        id: accuracy_dataset
        continue-on-error: true
        run: |
          python scripts/build_expected_minutes_accuracy_dataset.py \
            --combined-selected "$ROOT/combined-source/combined/combined-selected-matchup-injury-burden.csv" \
            --wave wave1 "$ROOT/wave1/overlap/overlap-player-injury-panel.csv" "$ROOT/wave1/identity/injury-player-id-map.csv" "$ROOT/wave1/values/point-in-time-player-values.csv" \
            --wave wave2 "$ROOT/wave2/overlap/overlap-player-injury-panel.csv" "$ROOT/wave2/identity/injury-player-id-map.csv" "$ROOT/wave2/values/point-in-time-player-values.csv" \
            --player-logs "$ROOT/combined-player-boxscores.csv" \
            --output-dir "$ROOT/accuracy-dataset"
      - name: Run aggregate Expected Minutes accuracy audit
        id: accuracy_audit
        continue-on-error: true
        run: |
          python scripts/audit_expected_minutes_accuracy.py \
            --accuracy-rows "$ROOT/accuracy-dataset/expected-minutes-accuracy-rows.csv" \
            --dataset-report "$ROOT/accuracy-dataset/expected-minutes-accuracy-dataset-report.json" \
            --policy data/expected-minutes-accuracy-audit-v1.json \
            --output-dir "$ROOT/accuracy-audit"
      - name: Remove all player-level data before Artifact upload
        if: always()
        run: |
          rm -f "$ROOT/combined-player-boxscores.csv"
          rm -f "$ROOT/accuracy-dataset/expected-minutes-accuracy-rows.csv"
          rm -f "$ROOT/wave1/overlap/overlap-player-injury-panel.csv"
          rm -f "$ROOT/wave2/overlap/overlap-player-injury-panel.csv"
          rm -f "$ROOT/wave1/player/multi-report-injury-panel-normalized.csv"
          rm -f "$ROOT/wave2/player/multi-report-injury-panel-normalized.csv"
          rm -f "$ROOT/wave1/identity/injury-player-id-map.csv"
          rm -f "$ROOT/wave2/identity/injury-player-id-map.csv"
          rm -f "$ROOT/wave1/values/point-in-time-player-values.csv"
          rm -f "$ROOT/wave2/values/point-in-time-player-values.csv"
          rm -f "$ROOT/boxscores-2022/open-player-boxscores.csv"
          rm -f "$ROOT/boxscores-2023/open-player-boxscores.csv"
          find "$ROOT" -name 'injury-lineup-snapshots-normalized.csv' -delete 2>/dev/null || true
          find "$ROOT" -name '*.pdf' -delete 2>/dev/null || true
      - name: Verify privacy boundary
        if: always()
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          root = Path(os.environ['ROOT'])
          forbidden = {
              'expected-minutes-accuracy-rows.csv',
              'overlap-player-injury-panel.csv',
              'multi-report-injury-panel-normalized.csv',
              'injury-lineup-snapshots-normalized.csv',
              'injury-player-id-map.csv',
              'point-in-time-player-values.csv',
              'combined-player-boxscores.csv',
              'open-player-boxscores.csv',
          }
          found = sorted(str(path) for path in root.rglob('*') if path.is_file() and path.name in forbidden)
          assert not found, found
          print({'forbidden_player_files': found})
          PY
      - name: Upload aggregate Expected Minutes audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: expected-minutes-accuracy-audit-v1
          path: |
            /tmp/nbavl-expected-minutes-audit/combined-source/combined/combined-selected-injury-waves-report.json
            /tmp/nbavl-expected-minutes-audit/wave1/ready/ready-overlap-audit.json
            /tmp/nbavl-expected-minutes-audit/wave2/ready/ready-overlap-audit.json
            /tmp/nbavl-expected-minutes-audit/wave1/schedule/injury-snapshot-schedule-match-report.json
            /tmp/nbavl-expected-minutes-audit/wave2/schedule/injury-snapshot-schedule-match-report.json
            /tmp/nbavl-expected-minutes-audit/wave1/identity/injury-player-boxscore-identity-report.json
            /tmp/nbavl-expected-minutes-audit/wave2/identity/injury-player-boxscore-identity-report.json
            /tmp/nbavl-expected-minutes-audit/wave1/values/point-in-time-player-value-report.json
            /tmp/nbavl-expected-minutes-audit/wave2/values/point-in-time-player-value-report.json
            /tmp/nbavl-expected-minutes-audit/accuracy-dataset/expected-minutes-accuracy-dataset-report.json
            /tmp/nbavl-expected-minutes-audit/accuracy-audit/expected-minutes-accuracy-audit.json
            /tmp/nbavl-expected-minutes-audit/accuracy-audit/expected-minutes-accuracy-subgroups.csv
            /tmp/nbavl-expected-minutes-audit/accuracy-audit/expected-minutes-team-aggregate-summary.csv
          retention-days: 14
          if-no-files-found: error
      - name: Enforce structural audit and non-activation boundaries
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          root = Path(os.environ['ROOT'])
          dataset = json.loads((root / 'accuracy-dataset/expected-minutes-accuracy-dataset-report.json').read_text())
          audit = json.loads((root / 'accuracy-audit/expected-minutes-accuracy-audit.json').read_text())
          assert dataset['decision']['ready_for_expected_minutes_accuracy_audit'] is True, dataset
          assert audit['quality']['all_structural_gates_passed'] is True, audit
          assert audit['decision']['ready_for_injury_feature_walk_forward_holdout'] is False
          assert audit['decision']['ready_for_model_training'] is False
          assert audit['decision']['ready_for_probability_adjustment'] is False
          assert audit['decision']['ready_for_betting_edge_claim'] is False
          print(json.dumps({
              'coverage': audit['coverage'],
              'primary_accuracy': audit['primary_accuracy'],
              'accuracy_gate_results': audit['quality']['accuracy_gate_results'],
              'decision': audit['decision'],
          }, indent=2))
          PY
