name: Validate forward feature source probe record v1

on:
  pull_request:
    paths:
      - "data/research/forward-feature-source-probe-2024-25-2025-26-v1.json"
      - "docs/forward-feature-source-probe-2024-25-2025-26-v1.md"
      - "docs/handoffs/nba_value_lab_handoff_2026-07-24_forward_feature_source_probe.md"
      - "scripts/validate_forward_feature_source_probe_record_v1.py"
      - ".github/workflows/validate-forward-feature-source-probe-record-v1.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile record validator
        run: python -m py_compile scripts/validate_forward_feature_source_probe_record_v1.py
      - name: Validate real execution record
        run: python scripts/validate_forward_feature_source_probe_record_v1.py
      - name: Upload aggregate-only validation
        uses: actions/upload-artifact@v4
        with:
          name: forward-feature-source-probe-record-validation-v1
          path: artifacts/forward-feature-source-probe-record-validation-v1.json
          if-no-files-found: error
          retention-days: 14
