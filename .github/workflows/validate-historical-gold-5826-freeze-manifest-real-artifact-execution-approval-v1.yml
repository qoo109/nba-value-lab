name: Validate Historical Gold 5826 real Artifact execution approval v1

on:
  pull_request:
    paths:
      - "data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-approval-v1.json"
      - "data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-approval-current-status-v1.json"
      - "data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-current-status-v2.json"
      - "data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-result-v1.json"
      - "scripts/run_historical_gold_5826_freeze_manifest_real_artifact_execution_once_v1.py"
      - ".github/workflows/run-approved-historical-gold-5826-freeze-manifest-real-artifact-execution-once-v1.yml"
      - ".github/workflows/validate-historical-gold-5826-freeze-manifest-real-artifact-execution-approval-v1.yml"
      - "docs/historical-gold-5826-freeze-manifest-real-artifact-execution-approval-v1.md"
  push:
    branches:
      - main
    paths:
      - "data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-approval-v1.json"
      - "data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-approval-current-status-v1.json"
      - "data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-current-status-v2.json"
      - "data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-result-v1.json"
      - "scripts/run_historical_gold_5826_freeze_manifest_real_artifact_execution_once_v1.py"
      - ".github/workflows/run-approved-historical-gold-5826-freeze-manifest-real-artifact-execution-once-v1.yml"

permissions:
  contents: read

jobs:
  validate-approval-lifecycle:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile approved path
        run: |
          python -m py_compile \
            scripts/build_historical_gold_5826_complete_corpus_freeze_manifest_v1.py \
            scripts/run_historical_gold_5826_freeze_manifest_real_artifact_execution_once_v1.py

      - name: Validate immutable explicit approval
        run: |
          python scripts/run_historical_gold_5826_freeze_manifest_real_artifact_execution_once_v1.py \
            --approval data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-approval-v1.json \
            --confirmation-request-id HISTORICAL-GOLD-5826-FREEZE-MANIFEST-REAL-ARTIFACT-EXECUTION-2026-07-23-001 \
            --workflow-event workflow_dispatch \
            --workflow-ref refs/heads/main \
            --workflow-run-id 0 \
            --run-attempt 1 \
            --github-sha validation-only \
            --execution-count-before 0 \
            --validate-only

      - name: Detect execution lifecycle
        id: lifecycle
        run: |
          if test -e data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-current-status-v2.json; then
            echo "state=consumed" >> "$GITHUB_OUTPUT"
          else
            echo "state=approved" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate approved pre-execution status
        if: steps.lifecycle.outputs.state == 'approved'
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          status = json.loads(Path('data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-approval-current-status-v1.json').read_text())
          assert status['formal_state'] == 'HISTORICAL_GOLD_5826_FREEZE_MANIFEST_REAL_ARTIFACT_EXECUTION_APPROVED_READY_FOR_ONE_TIME_MANUAL_DISPATCH'
          control = status['execution_control']
          assert control['execution_count'] == 0
          assert control['maximum_execution_count'] == 1
          assert control['request_consumed'] is False
          assert control['execution_enabled'] is True
          assert control['execution_workflow_created'] is True
          assert status['ready_for_one_time_manual_dispatch'] is True
          assert status['formal_stake'] == 0
          assert Path('.github/workflows/run-approved-historical-gold-5826-freeze-manifest-real-artifact-execution-once-v1.yml').exists()
          PY

      - name: Validate consumed post-execution status
        if: steps.lifecycle.outputs.state == 'consumed'
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          status = json.loads(Path('data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-current-status-v2.json').read_text())
          result = json.loads(Path('data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-result-v1.json').read_text())
          expected = 'HISTORICAL_GOLD_5826_FREEZE_MANIFEST_REAL_ARTIFACT_EXECUTION_PASS_CONSUMED'
          assert status['formal_state'] == expected
          assert result['formal_state'] == expected
          control = status['execution_control']
          assert control['execution_count'] == 1
          assert control['maximum_execution_count'] == 1
          assert control['request_consumed'] is True
          assert control['repeat_execution_allowed'] is False
          assert control['workflow_rerun_allowed'] is False
          assert control['execution_enabled'] is False
          assert control['executor_workflow_retired'] is True
          assert not Path('.github/workflows/run-approved-historical-gold-5826-freeze-manifest-real-artifact-execution-once-v1.yml').exists()
          assert status['formal_stake'] == 0
          PY

      - name: Confirm no validation-time real Artifact access
        run: |
          test ! -e /tmp/nbavl-gold-5826-input
          test ! -e /tmp/nbavl-gold-5826-output
          test ! -e /tmp/nbavl-gold-5826-temp
