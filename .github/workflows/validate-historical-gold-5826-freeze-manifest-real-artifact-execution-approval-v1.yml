name: Validate Historical Gold 5826 real Artifact execution approval v1

on:
  pull_request:
    paths:
      - "data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-approval-v1.json"
      - "data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-request-current-status-v1.json"
      - "scripts/run_historical_gold_5826_freeze_manifest_real_artifact_execution_once_v1.py"
      - ".github/workflows/run-approved-historical-gold-5826-freeze-manifest-real-artifact-execution-once-v1.yml"
      - ".github/workflows/validate-historical-gold-5826-freeze-manifest-real-artifact-execution-approval-v1.yml"
      - "docs/historical-gold-5826-freeze-manifest-real-artifact-execution-approval-v1.md"
  push:
    branches:
      - main
    paths:
      - "data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-approval-v1.json"
      - "data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-request-current-status-v1.json"
      - "scripts/run_historical_gold_5826_freeze_manifest_real_artifact_execution_once_v1.py"
      - ".github/workflows/run-approved-historical-gold-5826-freeze-manifest-real-artifact-execution-once-v1.yml"

permissions:
  contents: read

jobs:
  validate-approval-and-executor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile approved path
        run: |
          python -m py_compile \
            scripts/build_historical_gold_5826_complete_corpus_freeze_manifest_v1.py \
            scripts/run_historical_gold_5826_freeze_manifest_real_artifact_execution_once_v1.py

      - name: Validate explicit approval and immutable bindings
        run: |
          python scripts/run_historical_gold_5826_freeze_manifest_real_artifact_execution_once_v1.py \
            --approval data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-approval-v1.json \
            --confirmation-request-id HISTORICAL-GOLD-5826-FREEZE-MANIFEST-REAL-ARTIFACT-EXECUTION-2026-07-23-001 \
            --workflow-event workflow_dispatch \
            --workflow-ref refs/heads/main \
            --workflow-run-id 0 \
            --run-attempt 1 \
            --github-sha validation-only \
            --execution-count-before 0 \
            --validate-only

      - name: Validate approval status contract
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          approval = json.loads(Path('data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-approval-v1.json').read_text())
          status = json.loads(Path('data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-request-current-status-v1.json').read_text())
          assert approval['approval_state'] == 'EXPLICIT_USER_APPROVAL_GRANTED', approval
          assert approval['approved_by'] == 'qoo109', approval
          assert approval['execution_authorization']['maximum_execution_count'] == 1, approval
          assert approval['execution_authorization']['approved_to_dispatch_exactly_once'] is True, approval
          assert approval['execution_authorization']['workflow_rerun_allowed'] is False, approval
          assert approval['formal_stake'] == 0, approval
          assert status['formal_state'] == 'HISTORICAL_GOLD_5826_FREEZE_MANIFEST_REAL_ARTIFACT_EXECUTION_APPROVED_READY_FOR_ONE_TIME_MANUAL_DISPATCH', status
          control = status['execution_control']
          assert control['execution_count'] == 0, status
          assert control['maximum_execution_count'] == 1, status
          assert control['request_consumed'] is False, status
          assert control['execution_enabled'] is True, status
          assert control['execution_workflow_created'] is True, status
          assert status['ready_for_real_artifact_execution'] is True, status
          assert status['formal_stake'] == 0, status
          PY

      - name: Enforce manual-only GitHub Artifact transport
        run: |
          python - <<'PY'
          from pathlib import Path
          workflow = Path('.github/workflows/run-approved-historical-gold-5826-freeze-manifest-real-artifact-execution-once-v1.yml').read_text(encoding='utf-8')
          assert 'workflow_dispatch:' in workflow
          assert 'pull_request:' not in workflow
          assert 'push:' not in workflow
          assert "github.ref == 'refs/heads/main'" in workflow
          assert 'github.run_attempt == 1' in workflow
          assert 'actions/download-artifact@v4' in workflow
          assert 'run-id: 29976204693' in workflow
          assert 'historical-silver-gold-two-game-official-cdn-recovery-v2' in workflow
          assert 'curl ' not in workflow
          assert 'wget ' not in workflow
          assert 'pip install' not in workflow
          allowed = {
              'actions/checkout@v4',
              'actions/setup-python@v5',
              'actions/download-artifact@v4',
              'actions/upload-artifact@v4',
          }
          used = {
              line.split('uses:', 1)[1].strip()
              for line in workflow.splitlines()
              if 'uses:' in line
          }
          assert used <= allowed, used
          PY

      - name: Confirm real Artifact was not accessed during validation
        run: |
          test ! -e /tmp/nbavl-gold-5826-input
          test ! -e /tmp/nbavl-gold-5826-output
          test ! -e /tmp/nbavl-gold-5826-temp
