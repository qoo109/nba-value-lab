name: Validate Historical Gold 5826 freeze manifest real Artifact execution request v1

on:
  pull_request:
    paths:
      - "data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-request-v1.json"
      - "data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-request-current-status-v1.json"
      - "docs/historical-gold-5826-freeze-manifest-real-artifact-execution-request-v1.md"
      - "scripts/validate_historical_gold_5826_freeze_manifest_real_artifact_execution_request_v1.py"
      - ".github/workflows/validate-historical-gold-5826-freeze-manifest-real-artifact-execution-request-v1.yml"
  push:
    branches:
      - main
    paths:
      - "data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-request-v1.json"
      - "data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-request-current-status-v1.json"
      - "scripts/validate_historical_gold_5826_freeze_manifest_real_artifact_execution_request_v1.py"
      - ".github/workflows/validate-historical-gold-5826-freeze-manifest-real-artifact-execution-request-v1.yml"

permissions:
  contents: read

jobs:
  validate-request:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile request validator
        run: python -m py_compile scripts/validate_historical_gold_5826_freeze_manifest_real_artifact_execution_request_v1.py

      - name: Validate request, upstream bindings, expiry, and mutations
        run: |
          mkdir -p validation-output
          python scripts/validate_historical_gold_5826_freeze_manifest_real_artifact_execution_request_v1.py \
            --request data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-request-v1.json \
            --request-status data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-request-current-status-v1.json \
            --design-status data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-request-design-current-status-v1.json \
            --implementation-status data/research/historical-gold-5826-complete-corpus-freeze-manifest-implementation-current-status-v1.json \
            --synthetic-result data/research/historical-gold-5826-complete-corpus-freeze-manifest-synthetic-implementation-result-v1.json \
            --policy data/research/historical-gold-5826-complete-corpus-freeze-policy-v1.json \
            --recovery-status data/research/historical-silver-2023-24-two-game-official-cdn-pbp-recovery-current-status-v1.json \
            --implementation scripts/build_historical_gold_5826_complete_corpus_freeze_manifest_v1.py \
            --request-design data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-request-design-v1.json \
            --output validation-output/historical-gold-5826-freeze-manifest-real-artifact-execution-request-validation-v1.json

      - name: Enforce request-only result
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path(
              "validation-output/historical-gold-5826-freeze-manifest-real-artifact-execution-request-validation-v1.json"
          ).read_text())
          assert report["formal_state"] == "HISTORICAL_GOLD_5826_FREEZE_MANIFEST_REAL_ARTIFACT_EXECUTION_REQUEST_VALID_AWAITING_EXPLICIT_USER_APPROVAL", report
          assert report["request_id"] == "HISTORICAL-GOLD-5826-FREEZE-MANIFEST-REAL-ARTIFACT-EXECUTION-2026-07-23-001", report
          assert report["artifact_id"] == 8551587005, report
          assert report["artifact_expires_at"] == "2026-08-06T03:14:00Z", report
          assert report["synthetic_tests_passed"] == 20, report
          assert report["mutation_tests_passed"] >= 20, report
          assert report["request_valid"] is True, report
          assert report["ready_for_explicit_user_approval"] is True, report
          assert report["approval_granted"] is False, report
          assert report["execution_enabled"] is False, report
          assert report["execution_workflow_created"] is False, report
          assert report["real_artifact_downloaded"] is False, report
          assert report["real_artifact_read"] is False, report
          assert report["semantic_manifest_created"] is False, report
          assert report["corpus_frozen"] is False, report
          assert report["execution_count"] == 0, report
          assert report["maximum_execution_count"] == 1, report
          assert report["request_consumed"] is False, report
          assert report["repeat_execution_allowed"] is False, report
          assert report["automatic_dispatch_allowed"] is False, report
          assert report["aggregate_only"] is True, report
          assert report["raw_rows_read"] is False, report
          assert report["raw_rows_emitted"] == 0, report
          assert report["ready_for_real_artifact_execution"] is False, report
          assert report["ready_for_execution_workflow_implementation"] is False, report
          assert report["ready_for_corpus_freeze_claim"] is False, report
          assert report["ready_for_market_backtest"] is False, report
          assert report["ready_for_model_retraining"] is False, report
          assert report["formal_stake"] == 0, report
          for key in (
              "request_file_sha256",
              "request_status_file_sha256",
              "request_design_file_sha256",
              "implementation_file_sha256",
              "synthetic_result_file_sha256",
              "policy_file_sha256",
              "recovery_status_file_sha256",
          ):
              assert report[key].startswith("sha256:"), (key, report)
          PY

      - name: Confirm scientific implementation and upstream evidence unchanged
        if: github.event_name == 'pull_request'
        run: |
          git diff --exit-code origin/${{ github.base_ref }}...HEAD -- \
            PROJECT_STATUS.md \
            data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-request-design-v1.json \
            data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-request-design-current-status-v1.json \
            data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-request-design-result-v1.json \
            data/research/historical-gold-5826-complete-corpus-freeze-manifest-implementation-current-status-v1.json \
            data/research/historical-gold-5826-complete-corpus-freeze-manifest-synthetic-implementation-result-v1.json \
            data/research/historical-gold-5826-complete-corpus-freeze-policy-v1.json \
            data/research/historical-silver-2023-24-two-game-official-cdn-pbp-recovery-current-status-v1.json \
            scripts/build_historical_gold_5826_complete_corpus_freeze_manifest_v1.py \
            scripts/test_build_historical_gold_5826_complete_corpus_freeze_manifest_v1.py \
            scripts/build_historical_gold_multiseason.py \
            scripts/historical_gold_schema.py

      - name: Confirm no approval, execution workflow, download, or manifest exists
        run: |
          test ! -e data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-approval-v1.json
          test ! -e .github/workflows/run-approved-historical-gold-5826-freeze-manifest-real-artifact-execution-once-v1.yml
          test ! -e data/research/historical-gold-5826-complete-corpus-freeze-manifest-v1.json
          python - <<'PY'
          from pathlib import Path
          workflow = Path(
              ".github/workflows/validate-historical-gold-5826-freeze-manifest-real-artifact-execution-request-v1.yml"
          ).read_text(encoding="utf-8")
          forbidden = (
              "actions/" + "download-artifact@",
              "curl" + " ",
              "wget" + " ",
              "pip" + " install",
          )
          for token in forbidden:
              assert token not in workflow, token
          PY

      - name: Upload request validation Artifact
        uses: actions/upload-artifact@v4
        with:
          name: historical-gold-5826-freeze-manifest-real-artifact-execution-request-validation-v1
          path: validation-output/historical-gold-5826-freeze-manifest-real-artifact-execution-request-validation-v1.json
          if-no-files-found: error
          retention-days: 14

# Validation rerun after correcting the self-referential transport scan.
