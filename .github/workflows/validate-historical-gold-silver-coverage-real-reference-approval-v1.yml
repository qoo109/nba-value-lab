name: Validate Historical Gold Silver real-reference approval v1

on:
  pull_request:
    paths:
      - "data/research/historical-gold-silver-coverage-real-reference-execution-request-v1.json"
      - "data/research/historical-gold-silver-coverage-real-reference-approval-v1.json"
      - "data/research/historical-gold-silver-coverage-reconciliation-implementation-v1.json"
      - "data/research/legacy-market-real-file-audit-retry-002-result-v1.json"
      - "scripts/validate_historical_gold_silver_coverage_real_reference_request_v1.py"
      - "scripts/validate_historical_gold_silver_coverage_real_reference_approval_v1.py"
      - "scripts/run_historical_gold_silver_coverage_real_reference_once_v1.py"
      - "scripts/analyze_historical_gold_silver_coverage_v1.py"
      - ".github/workflows/validate-historical-gold-silver-coverage-real-reference-approval-v1.yml"
      - ".github/workflows/run-approved-historical-gold-silver-coverage-real-reference-once-v1.yml"
      - "PROJECT_STATUS.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-gold-silver-real-reference-approval-v1-${{ github.ref }}
  cancel-in-progress: false

jobs:
  approval-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile approval and executor path
        run: |
          python -m py_compile \
            scripts/validate_historical_gold_silver_coverage_real_reference_request_v1.py \
            scripts/validate_historical_gold_silver_coverage_real_reference_approval_v1.py \
            scripts/run_historical_gold_silver_coverage_real_reference_once_v1.py \
            scripts/analyze_historical_gold_silver_coverage_v1.py \
            scripts/historical_silver_runner.py \
            scripts/combine_historical_silver.py \
            scripts/build_historical_gold_multiseason.py

      - name: Validate explicit approval and negative tests
        run: |
          rm -rf /tmp/nbavl-gold-silver-approval
          mkdir -p /tmp/nbavl-gold-silver-approval
          PYTHONPATH=scripts python scripts/validate_historical_gold_silver_coverage_real_reference_approval_v1.py \
            --request data/research/historical-gold-silver-coverage-real-reference-execution-request-v1.json \
            --approval data/research/historical-gold-silver-coverage-real-reference-approval-v1.json \
            --implementation data/research/historical-gold-silver-coverage-reconciliation-implementation-v1.json \
            --result data/research/legacy-market-real-file-audit-retry-002-result-v1.json \
            --self-test \
            --output /tmp/nbavl-gold-silver-approval/approval-validation-report.json

      - name: Run executor synthetic-only self-test
        run: |
          PYTHONPATH=scripts python scripts/run_historical_gold_silver_coverage_real_reference_once_v1.py \
            --request data/research/historical-gold-silver-coverage-real-reference-execution-request-v1.json \
            --approval data/research/historical-gold-silver-coverage-real-reference-approval-v1.json \
            --implementation data/research/historical-gold-silver-coverage-reconciliation-implementation-v1.json \
            --result data/research/legacy-market-real-file-audit-retry-002-result-v1.json \
            --self-test \
            --output /tmp/nbavl-gold-silver-approval/executor-self-test.json

      - name: Enforce approval-only and aggregate-only boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('/tmp/nbavl-gold-silver-approval')
          approval = json.loads((root / 'approval-validation-report.json').read_text())
          executor = json.loads((root / 'executor-self-test.json').read_text())
          assert approval['formal_state'] == 'HISTORICAL_GOLD_SILVER_COVERAGE_RECONCILIATION_APPROVAL_VALID_READY_FOR_MANUAL_DISPATCH', approval
          assert approval['checks_failed'] == 0, approval
          assert all(approval['self_tests'].values()), approval
          assert approval['ready_for_one_time_aggregate_execution'] is True, approval
          assert approval['ready_for_repeat_execution'] is False, approval
          assert approval['network_calls_made'] is False, approval
          assert approval['real_reference_rows_read'] is False, approval
          assert approval['real_reconciliation_executed'] is False, approval
          assert approval['raw_rows_emitted'] == 0, approval
          assert approval['raw_files_emitted'] is False, approval
          assert approval['formal_stake'] == 0, approval
          assert executor['formal_state'] == 'HISTORICAL_GOLD_SILVER_COVERAGE_RECONCILIATION_EXECUTOR_SELF_TEST_PASS', executor
          assert executor['request_id'] == 'HISTORICAL-GOLD-SILVER-COVERAGE-RECONCILIATION-2026-07-21-001', executor
          assert executor['network_calls_made'] is False, executor
          assert executor['real_reference_rows_read'] is False, executor
          assert executor['real_reconciliation_executed'] is False, executor
          assert executor['boundaries']['candidate_csv_downloaded_or_read'] is False, executor
          assert executor['boundaries']['raw_rows_emitted'] == 0, executor
          assert executor['boundaries']['raw_files_emitted'] is False, executor
          assert executor['boundaries']['gold_builder_changed_during_execution'] is False, executor
          assert executor['boundaries']['formal_stake'] == 0, executor
          PY

      - name: Upload aggregate-only approval evidence
        uses: actions/upload-artifact@v4
        with:
          name: historical-gold-silver-real-reference-approval-v1
          path: |
            /tmp/nbavl-gold-silver-approval/approval-validation-report.json
            /tmp/nbavl-gold-silver-approval/executor-self-test.json
          retention-days: 14
          if-no-files-found: error
