name: Validate historical secondary source qualification v1

on:
  pull_request:
    paths:
      - "data/historical-secondary-source-qualification-v1.json"
      - "docs/historical-secondary-source-qualification-v1.md"
      - "scripts/validate_historical_secondary_source_qualification_v1.py"
      - ".github/workflows/validate-historical-secondary-source-qualification-v1.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  policy-only:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile validator
        run: python -m py_compile scripts/validate_historical_secondary_source_qualification_v1.py

      - name: Run deterministic self-test
        run: python scripts/validate_historical_secondary_source_qualification_v1.py --self-test

      - name: Validate frozen policy
        run: |
          mkdir -p out
          python scripts/validate_historical_secondary_source_qualification_v1.py \
            --policy data/historical-secondary-source-qualification-v1.json \
            --output-report out/historical-secondary-source-qualification-v1-report.json

      - name: Enforce policy-only boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("out/historical-secondary-source-qualification-v1-report.json").read_text())
          assert report["formal_state"] == "PREDECLARED_METADATA_ONLY"
          assert report["candidate_count"] == 2
          assert report["downloads"] == 0
          assert report["external_data_calls"] == 0
          assert report["raw_rows_in_artifact"] == 0
          assert report["model_metrics"] is False
          assert report["market_metrics"] is False
          assert report["existing_silver_replacement"] is False
          assert report["existing_gold_replacement"] is False
          assert report["formal_stake"] == 0
          PY

      - name: Upload aggregate policy artifact
        uses: actions/upload-artifact@v4
        with:
          name: historical-secondary-source-qualification-v1-policy
          path: out/historical-secondary-source-qualification-v1-report.json
          retention-days: 14
          if-no-files-found: error
