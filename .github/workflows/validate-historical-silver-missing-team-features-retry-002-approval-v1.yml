name: Validate Historical Silver missing team features retry 002 approval v1

on:
  pull_request:
    paths:
      - "data/research/historical-silver-2023-24-missing-team-features-root-cause-retry-request-002-v1.json"
      - "data/research/historical-silver-2023-24-missing-team-features-root-cause-retry-002-approval-v1.json"
      - "data/research/historical-silver-2023-24-missing-team-features-root-cause-current-status-v4.json"
      - "scripts/validate_historical_silver_missing_team_features_retry_002_approval_v1.py"
      - "scripts/run_historical_silver_missing_team_features_root_cause_retry_002_v1.py"
      - "PROJECT_STATUS.md"
      - ".github/workflows/validate-historical-silver-missing-team-features-retry-002-approval-v1.yml"
  push:
    branches:
      - main
    paths:
      - "data/research/historical-silver-2023-24-missing-team-features-root-cause-retry-request-002-v1.json"
      - "data/research/historical-silver-2023-24-missing-team-features-root-cause-retry-002-approval-v1.json"
      - "data/research/historical-silver-2023-24-missing-team-features-root-cause-current-status-v4.json"
      - "scripts/validate_historical_silver_missing_team_features_retry_002_approval_v1.py"
      - "scripts/run_historical_silver_missing_team_features_root_cause_retry_002_v1.py"
      - "PROJECT_STATUS.md"
      - ".github/workflows/validate-historical-silver-missing-team-features-retry-002-approval-v1.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-approval:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile retry 002 approval path
        run: |
          python -m py_compile \
            scripts/validate_historical_silver_missing_team_features_retry_002_approval_v1.py \
            scripts/run_historical_silver_missing_team_features_root_cause_retry_002_v1.py \
            scripts/run_historical_silver_missing_team_features_root_cause_once_v1.py \
            scripts/analyze_historical_silver_missing_team_features_root_cause_v1.py

      - name: Validate retry 002 approval and executor self-test
        run: |
          rm -rf /tmp/nbavl-silver-root-cause-retry-002-approval
          mkdir -p /tmp/nbavl-silver-root-cause-retry-002-approval
          python scripts/validate_historical_silver_missing_team_features_retry_002_approval_v1.py \
            --request data/research/historical-silver-2023-24-missing-team-features-root-cause-retry-request-002-v1.json \
            --approval data/research/historical-silver-2023-24-missing-team-features-root-cause-retry-002-approval-v1.json \
            --implementation data/research/historical-silver-2023-24-missing-team-features-root-cause-implementation-v1.json \
            --result data/research/historical-gold-silver-coverage-real-reference-result-v1.json \
            --current-status data/research/historical-silver-2023-24-missing-team-features-root-cause-current-status-v4.json \
            --output /tmp/nbavl-silver-root-cause-retry-002-approval/approval-validation-report.json \
            --self-test
          PYTHONPATH=scripts python scripts/run_historical_silver_missing_team_features_root_cause_retry_002_v1.py \
            --request data/research/historical-silver-2023-24-missing-team-features-root-cause-retry-request-002-v1.json \
            --approval data/research/historical-silver-2023-24-missing-team-features-root-cause-retry-002-approval-v1.json \
            --implementation data/research/historical-silver-2023-24-missing-team-features-root-cause-implementation-v1.json \
            --result data/research/historical-gold-silver-coverage-real-reference-result-v1.json \
            --current-status data/research/historical-silver-2023-24-missing-team-features-root-cause-current-status-v4.json \
            --confirmation-request-id HISTORICAL-SILVER-2023-24-MISSING-BOTH-TEAM-FEATURES-ROOT-CAUSE-2026-07-22-002 \
            --workflow-event workflow_dispatch \
            --workflow-ref refs/heads/main \
            --self-test \
            --output /tmp/nbavl-silver-root-cause-retry-002-approval/executor-self-test.json

      - name: Enforce approval-ready boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('/tmp/nbavl-silver-root-cause-retry-002-approval')
          approval = json.loads((root / 'approval-validation-report.json').read_text(encoding='utf-8'))
          executor = json.loads((root / 'executor-self-test.json').read_text(encoding='utf-8'))
          assert approval['formal_state'] == 'HISTORICAL_SILVER_2023_24_MISSING_TEAM_FEATURES_ROOT_CAUSE_RETRY_002_APPROVAL_VALID_READY_FOR_MANUAL_DISPATCH', approval
          assert approval['checks_failed'] == 0, approval
          assert approval['ready_for_one_time_aggregate_execution'] is True, approval
          assert approval['ready_for_repeat_execution'] is False, approval
          assert approval['network_calls_made'] is False, approval
          assert approval['real_reference_rows_read'] is False, approval
          assert approval['real_root_cause_audit_executed'] is False, approval
          assert approval['raw_rows_emitted'] == 0, approval
          assert approval['raw_files_emitted'] is False, approval
          assert approval['formal_stake'] == 0, approval
          assert executor['formal_state'] == 'HISTORICAL_SILVER_2023_24_MISSING_TEAM_FEATURES_ROOT_CAUSE_RETRY_002_EXECUTOR_SELF_TEST_PASS', executor
          assert executor['request_id'] == 'HISTORICAL-SILVER-2023-24-MISSING-BOTH-TEAM-FEATURES-ROOT-CAUSE-2026-07-22-002', executor
          assert executor['boundaries']['formal_stake'] == 0, executor
          PY

      - name: Upload approval validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: historical-silver-missing-team-features-retry-002-approval-v1
          path: |
            /tmp/nbavl-silver-root-cause-retry-002-approval/approval-validation-report.json
            /tmp/nbavl-silver-root-cause-retry-002-approval/executor-self-test.json
          retention-days: 14
          if-no-files-found: error
