name: Validate Historical Silver source gap exception integration real-reference validation approval v1

on:
  pull_request:
    paths:
      - "data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-approval-v1.json"
      - "data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-approval-current-status-v1.json"
      - "docs/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-approval-v1.md"
      - "scripts/validate_historical_silver_source_gap_exception_integration_real_reference_validation_approval_v1.py"
      - ".github/workflows/validate-historical-silver-source-gap-exception-integration-real-reference-validation-approval-v1.yml"
  push:
    branches:
      - main
    paths:
      - "data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-approval-v1.json"
      - "data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-approval-current-status-v1.json"
      - "scripts/validate_historical_silver_source_gap_exception_integration_real_reference_validation_approval_v1.py"
      - ".github/workflows/validate-historical-silver-source-gap-exception-integration-real-reference-validation-approval-v1.yml"

permissions:
  contents: read

jobs:
  validate-approval:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile approval validator
        run: python -m py_compile scripts/validate_historical_silver_source_gap_exception_integration_real_reference_validation_approval_v1.py

      - name: Validate approval and immutable bindings
        run: |
          mkdir -p validation-output
          python scripts/validate_historical_silver_source_gap_exception_integration_real_reference_validation_approval_v1.py \
            --request data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-request-v1.json \
            --request-status data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-request-current-status-v2.json \
            --approval data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-approval-v1.json \
            --implementation scripts/integrate_historical_silver_source_gap_exception_v1.py \
            --output validation-output/real-reference-validation-approval-validation-v1.json

      - name: Enforce immutable approval boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(
              Path("validation-output/real-reference-validation-approval-validation-v1.json").read_text()
          )
          assert report["approval_valid"] is True
          assert report["checks_failed"] == 0
          assert report["mutation_tests_passed"] >= 12
          assert report["approval_granted"] is True
          assert report["execution_count"] == 0
          assert report["maximum_execution_count"] == 1
          assert report["execution_workflow_created"] is False
          assert report["execution_enabled"] is False
          assert report["real_reference_validation_executed"] is False
          assert report["ready_for_one_time_execution_workflow_implementation"] is True
          assert report["ready_for_real_reference_validation_execution"] is False
          assert report["aggregate_only"] is True
          assert report["database_access"] is False
          assert report["network_access"] is False
          assert report["source_archive_access"] is False
          assert report["real_reference_inputs_read"] is False
          assert report["transformer_executed"] is False
          assert report["raw_rows_read"] is False
          assert report["raw_rows_emitted"] == 0
          assert report["formal_stake"] == 0
          PY

      - name: Verify governed execution lifecycle
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          runner = Path('scripts/run_historical_silver_source_gap_exception_integration_real_reference_validation_once_v1.py')
          manual = Path('.github/workflows/run-approved-historical-silver-source-gap-exception-integration-real-reference-validation-once-v1.yml')
          status = Path('data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-execution-implementation-current-status-v1.json')
          if status.exists():
              assert runner.exists() and manual.exists()
              state = json.loads(status.read_text())
              assert state['approval_granted'] is True
              assert state['execution_workflow_created'] is True
              assert state['execution_enabled'] is True
              assert state['execution_count'] == 0
              assert state['request_consumed'] is False
              assert state['real_reference_validation_executed'] is False
              assert state['formal_stake'] == 0
          else:
              assert not runner.exists() and not manual.exists()
          PY

      - name: Confirm request, analyzer, and transformer are unchanged
        if: github.event_name == 'pull_request'
        run: |
          git diff --exit-code origin/${{ github.base_ref }}...HEAD -- \
            data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-request-v1.json \
            scripts/analyze_historical_gold_silver_coverage_v1.py \
            scripts/integrate_historical_silver_source_gap_exception_v1.py

      - name: Upload aggregate approval validation artifact
        uses: actions/upload-artifact@v4
        with:
          name: historical-silver-source-gap-exception-integration-real-reference-validation-approval-v1
          path: validation-output/real-reference-validation-approval-validation-v1.json
          if-no-files-found: error
          retention-days: 14
