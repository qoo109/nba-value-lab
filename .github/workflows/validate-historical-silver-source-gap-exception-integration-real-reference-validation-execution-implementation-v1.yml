name: Validate Historical Silver source gap exception real-reference execution implementation v1

on:
  pull_request:
    paths:
      - "scripts/run_historical_silver_source_gap_exception_integration_real_reference_validation_once_v1.py"
      - "scripts/validate_historical_silver_source_gap_exception_integration_real_reference_validation_execution_implementation_v1.py"
      - ".github/workflows/run-approved-historical-silver-source-gap-exception-integration-real-reference-validation-once-v1.yml"
      - ".github/workflows/validate-historical-silver-source-gap-exception-integration-real-reference-validation-execution-implementation-v1.yml"
      - "data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-execution-implementation-current-status-v1.json"
      - "docs/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-execution-implementation-v1.md"
      - "PROJECT_STATUS.md"
  push:
    branches:
      - main
    paths:
      - "scripts/run_historical_silver_source_gap_exception_integration_real_reference_validation_once_v1.py"
      - "scripts/validate_historical_silver_source_gap_exception_integration_real_reference_validation_execution_implementation_v1.py"
      - ".github/workflows/run-approved-historical-silver-source-gap-exception-integration-real-reference-validation-once-v1.yml"
      - ".github/workflows/validate-historical-silver-source-gap-exception-integration-real-reference-validation-execution-implementation-v1.yml"
      - "data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-execution-implementation-current-status-v1.json"

permissions:
  contents: read

jobs:
  validate-execution-implementation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile execution implementation
        run: |
          python -m py_compile \
            scripts/integrate_historical_silver_source_gap_exception_v1.py \
            scripts/run_historical_silver_source_gap_exception_integration_real_reference_validation_once_v1.py \
            scripts/validate_historical_silver_source_gap_exception_integration_real_reference_validation_execution_implementation_v1.py

      - name: Validate implementation without reading real-reference inputs
        run: |
          mkdir -p validation-output
          PYTHONPATH=scripts python scripts/validate_historical_silver_source_gap_exception_integration_real_reference_validation_execution_implementation_v1.py \
            --runner scripts/run_historical_silver_source_gap_exception_integration_real_reference_validation_once_v1.py \
            --manual-workflow .github/workflows/run-approved-historical-silver-source-gap-exception-integration-real-reference-validation-once-v1.yml \
            --status data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-execution-implementation-current-status-v1.json \
            --self-test-output validation-output/runner-self-test-v1.json \
            --output validation-output/execution-implementation-validation-v1.json

      - name: Enforce implementation-only boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path('validation-output/execution-implementation-validation-v1.json').read_text())
          assert report['implementation_valid'] is True
          assert report['checks_failed'] == 0
          assert report['mutation_tests_passed'] >= 20
          assert report['synthetic_tests_passed'] >= 15
          assert report['approval_granted'] is True
          assert report['execution_workflow_created'] is True
          assert report['execution_enabled'] is True
          assert report['execution_count'] == 0
          assert report['maximum_execution_count'] == 1
          assert report['request_consumed'] is False
          assert report['workflow_dispatch_only'] is True
          assert report['automatic_dispatch_allowed'] is False
          assert report['real_reference_validation_executed'] is False
          assert report['real_reference_inputs_read'] is False
          assert report['database_access'] is False
          assert report['network_access'] is False
          assert report['source_archive_access'] is False
          assert report['raw_rows_read'] is False
          assert report['raw_rows_emitted'] == 0
          assert report['ready_for_manual_dispatch'] is True
          assert report['formal_stake'] == 0
          PY

      - name: Confirm governed inputs and transformer are unchanged
        if: github.event_name == 'pull_request'
        run: |
          git diff --exit-code origin/${{ github.base_ref }}...HEAD -- \
            data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-request-v1.json \
            data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-approval-v1.json \
            data/research/historical-gold-silver-coverage-real-reference-result-v1.json \
            data/research/historical-silver-2023-24-source-gap-exception-manifest-v1.json \
            data/research/historical-silver-2023-24-source-gap-exception-integration-policy-v1.json \
            scripts/analyze_historical_gold_silver_coverage_v1.py \
            scripts/integrate_historical_silver_source_gap_exception_v1.py

      - name: Upload aggregate implementation validation Artifact
        uses: actions/upload-artifact@v4
        with:
          name: historical-silver-source-gap-exception-integration-real-reference-validation-execution-implementation-v1
          path: |
            validation-output/execution-implementation-validation-v1.json
            validation-output/runner-self-test-v1.json
          retention-days: 14
          if-no-files-found: error
