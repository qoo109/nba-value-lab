name: Validate Historical Silver source gap exception integration real-reference validation request v1

on:
  pull_request:
    paths:
      - "data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-request-v1.json"
      - "data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-request-current-status-v2.json"
      - "docs/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-request-v1.md"
      - "scripts/validate_historical_silver_source_gap_exception_integration_real_reference_validation_request_v1.py"
      - ".github/workflows/validate-historical-silver-source-gap-exception-integration-real-reference-validation-request-v1.yml"
      - "PROJECT_STATUS.md"
  push:
    branches:
      - main
    paths:
      - "data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-request-v1.json"
      - "data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-request-current-status-v2.json"
      - "scripts/validate_historical_silver_source_gap_exception_integration_real_reference_validation_request_v1.py"
      - ".github/workflows/validate-historical-silver-source-gap-exception-integration-real-reference-validation-request-v1.yml"

permissions:
  contents: read

jobs:
  validate-request:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile request validator
        run: python -m py_compile scripts/validate_historical_silver_source_gap_exception_integration_real_reference_validation_request_v1.py

      - name: Validate request and compute immutable bindings
        run: |
          mkdir -p validation-output
          python scripts/validate_historical_silver_source_gap_exception_integration_real_reference_validation_request_v1.py \
            --request data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-request-v1.json \
            --implementation scripts/integrate_historical_silver_source_gap_exception_v1.py \
            --design-status data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-request-current-status-v1.json \
            --implementation-status data/research/historical-silver-2023-24-source-gap-exception-integration-implementation-current-status-v2.json \
            --output validation-output/real-reference-validation-request-validation-v1.json

      - name: Enforce request-only boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(
              Path("validation-output/real-reference-validation-request-validation-v1.json").read_text()
          )
          assert report["request_valid"] is True
          assert report["mutation_tests_passed"] >= 12
          assert report["ready_for_explicit_user_approval"] is True
          assert report["approval_granted"] is False
          assert report["execution_enabled"] is False
          assert report["real_reference_validation_executed"] is False
          assert report["execution_count"] == 0
          assert report["maximum_execution_count"] == 1
          assert report["aggregate_only"] is True
          assert report["database_access"] is False
          assert report["network_access"] is False
          assert report["source_archive_access"] is False
          assert report["real_reference_inputs_read"] is False
          assert report["raw_rows_read"] is False
          assert report["raw_rows_emitted"] == 0
          assert report["execution_workflow_created"] is False
          assert report["formal_stake"] == 0
          assert report["request_file_sha256"].startswith("sha256:")
          assert report["implementation_file_sha256"].startswith("sha256:")
          PY

      - name: Verify execution remains absent
        run: |
          test ! -e .github/workflows/run-approved-historical-silver-source-gap-exception-integration-real-reference-validation-once-v1.yml
          test ! -e scripts/run_historical_silver_source_gap_exception_integration_real_reference_validation_once_v1.py

      - name: Confirm existing analyzer and transformer are unchanged
        if: github.event_name == 'pull_request'
        run: |
          git diff --exit-code origin/${{ github.base_ref }}...HEAD -- \
            scripts/analyze_historical_gold_silver_coverage_v1.py \
            scripts/integrate_historical_silver_source_gap_exception_v1.py

      - name: Upload aggregate request validation artifact
        uses: actions/upload-artifact@v4
        with:
          name: historical-silver-source-gap-exception-integration-real-reference-validation-request-v1
          path: validation-output/real-reference-validation-request-validation-v1.json
          if-no-files-found: error
          retention-days: 14
