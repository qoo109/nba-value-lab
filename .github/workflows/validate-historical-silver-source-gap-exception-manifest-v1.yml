name: Validate Historical Silver source gap exception manifest v1

on:
  push:
    branches:
      - main
    paths:
      - "data/research/historical-silver-2023-24-source-gap-exception-manifest-v1.json"
      - "data/research/historical-silver-2023-24-source-gap-exception-current-status-v1.json"
      - "data/research/historical-silver-2023-24-source-archive-reconciliation-result-v1.json"
      - "data/research/historical-silver-2023-24-source-archive-reconciliation-current-status-v2.json"
      - "docs/historical-silver-2023-24-source-gap-exception-manifest-v1.md"
      - "scripts/validate_historical_silver_source_gap_exception_manifest_v1.py"
      - ".github/workflows/validate-historical-silver-source-gap-exception-manifest-v1.yml"
  pull_request:
    paths:
      - "data/research/historical-silver-2023-24-source-gap-exception-manifest-v1.json"
      - "data/research/historical-silver-2023-24-source-gap-exception-current-status-v1.json"
      - "data/research/historical-silver-2023-24-source-archive-reconciliation-result-v1.json"
      - "data/research/historical-silver-2023-24-source-archive-reconciliation-current-status-v2.json"
      - "docs/historical-silver-2023-24-source-gap-exception-manifest-v1.md"
      - "scripts/validate_historical_silver_source_gap_exception_manifest_v1.py"
      - ".github/workflows/validate-historical-silver-source-gap-exception-manifest-v1.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-historical-silver-source-gap-exception-manifest-v1-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile exception manifest validator
        run: |
          python -m py_compile scripts/validate_historical_silver_source_gap_exception_manifest_v1.py

      - name: Validate aggregate-only exception manifest
        run: |
          rm -rf /tmp/nbavl-source-gap-exception
          mkdir -p /tmp/nbavl-source-gap-exception
          python scripts/validate_historical_silver_source_gap_exception_manifest_v1.py \
            --manifest data/research/historical-silver-2023-24-source-gap-exception-manifest-v1.json \
            --result data/research/historical-silver-2023-24-source-archive-reconciliation-result-v1.json \
            --reconciliation-status data/research/historical-silver-2023-24-source-archive-reconciliation-current-status-v2.json \
            --exception-status data/research/historical-silver-2023-24-source-gap-exception-current-status-v1.json \
            --output /tmp/nbavl-source-gap-exception/manifest-validation-report.json \
            --self-test

      - name: Enforce aggregate-only non-activation boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path('/tmp/nbavl-source-gap-exception/manifest-validation-report.json').read_text(encoding='utf-8'))
          assert report['formal_state'] == 'HISTORICAL_SILVER_2023_24_SOURCE_GAP_EXCEPTION_MANIFEST_VALIDATED', report
          assert report['checks_failed'] == 0, report
          assert report['network_calls_made'] is False, report
          assert report['source_archives_read'] is False, report
          assert report['raw_rows_emitted'] == 0, report
          assert report['ready_for_data_execution'] is False, report
          assert report['ready_for_silver_builder_change'] is False, report
          assert report['ready_for_gold_rebuild'] is False, report
          assert report['ready_for_market_backtest'] is False, report
          assert report['formal_stake'] == 0, report
          PY

      - name: Upload exception manifest validation artifact
        uses: actions/upload-artifact@v4
        with:
          name: historical-silver-source-gap-exception-manifest-v1
          path: /tmp/nbavl-source-gap-exception/manifest-validation-report.json
          retention-days: 14
          if-no-files-found: error
