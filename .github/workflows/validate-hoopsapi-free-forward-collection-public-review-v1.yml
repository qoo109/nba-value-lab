name: Validate HoopsAPI free forward review v1

on:
  pull_request:
    paths:
      - PROJECT_STATUS.md
      - data/research/hoopsapi-free-forward-collection-public-review-v1.json
      - data/research/no-cost-timestamped-odds-source-qualification-current-status-v4.json
      - docs/hoopsapi-free-forward-collection-public-review-v1.md
      - docs/handoffs/nba_value_lab_handoff_2026-07-24_hoopsapi_public_forward_review.md
      - scripts/validate_hoopsapi_free_forward_collection_public_review_v1.py
      - .github/workflows/validate-hoopsapi-free-forward-collection-public-review-v1.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile validator
        run: python -m py_compile scripts/validate_hoopsapi_free_forward_collection_public_review_v1.py

      - name: Validate HoopsAPI public review and next design gate
        run: python scripts/validate_hoopsapi_free_forward_collection_public_review_v1.py

      - name: Upload aggregate QA
        uses: actions/upload-artifact@v4
        with:
          name: hoopsapi-free-forward-collection-public-review-validation-v1
          path: build/hoopsapi-free-forward-collection-public-review-validation-v1.json
          retention-days: 14
