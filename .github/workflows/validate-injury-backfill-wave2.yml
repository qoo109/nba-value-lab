name: Validate injury backfill wave 2 acquisition

on:
  pull_request:
    paths:
      - "data/multi-report-injury-backfill-wave1-times.json"
      - "data/multi-report-injury-backfill-wave2-times.json"
      - "scripts/audit_injury_backfill_wave.py"
      - ".github/workflows/validate-injury-backfill-wave2.yml"
      - "docs/injury-backfill-wave2-acquisition.md"
      - "PROJECT_STATUS.md"
  workflow_dispatch:
    inputs:
      registry_file:
        description: "Calendar-fixed injury report acquisition registry"
        required: true
        default: "data/multi-report-injury-backfill-wave2-times.json"

permissions:
  contents: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile reusable acquisition audit
        run: python -m py_compile scripts/audit_injury_backfill_wave.py
      - name: Run deterministic acquisition audit self-test
        run: |
          rm -rf /tmp/nbavl-wave2-self-test
          python scripts/audit_injury_backfill_wave.py \
            --self-test \
            --output-dir /tmp/nbavl-wave2-self-test
          python -m json.tool /tmp/nbavl-wave2-self-test/injury-backfill-wave-audit.json >/dev/null

  live-acquisition:
    needs: self-test
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      REGISTRY_FILE: ${{ github.event.inputs.registry_file || 'data/multi-report-injury-backfill-wave2-times.json' }}
      ROOT: /tmp/nbavl-wave2-acquisition
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install official PDF parser dependencies
        run: python -m pip install --disable-pip-version-check pandas httpx pymupdf
      - name: Validate complementary fixed registry before acquisition
        run: |
          python - <<'PY'
          import json
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          wave1 = json.loads(Path('data/multi-report-injury-backfill-wave1-times.json').read_text())
          wave2 = json.loads(Path('${{ env.REGISTRY_FILE }}').read_text())
          times1 = wave1['report_times']
          times2 = wave2['report_times']
          assert len(times2) == 36, len(times2)
          assert len(times2) == len(set(times2)), 'duplicate Wave 2 timestamps'
          assert set(times1).isdisjoint(times2), sorted(set(times1) & set(times2))
          assert wave2['sampling_policy']['candidate_reports'] == 36
          assert wave2['sampling_policy']['dates'] == 12
          assert wave2['sampling_policy']['overlap_with_wave1_requested_timestamps'] == 0
          assert wave2['acquisition_gate']['minimum_overlapping_successful_reports'] == 18
          et = ZoneInfo('America/New_York')
          local = [datetime.fromisoformat(value).astimezone(et) for value in times2]
          assert {item.strftime('%A') for item in local} == {'Monday'}
          assert {item.strftime('%H:%M') for item in local} == {'08:30', '13:30', '17:30'}
          dates = sorted({item.date() for item in local})
          assert len(dates) == 12
          assert all((later - earlier).days == 14 for earlier, later in zip(dates, dates[1:]))
          print({'candidate_reports': len(times2), 'dates': len(dates), 'wave1_overlap': 0})
          PY
      - name: Build official player acquisition panel
        id: player_acquisition
        continue-on-error: true
        run: |
          rm -rf "$ROOT"
          mkdir -p "$ROOT"
          PYTHONPATH=scripts python scripts/build_multi_report_injury_panel.py \
            --report-times "$REGISTRY_FILE" \
            --output-dir "$ROOT/player"
      - name: Build official team submission acquisition panel
        id: team_acquisition
        continue-on-error: true
        run: |
          PYTHONPATH=scripts python scripts/build_multi_report_team_submission_panel.py \
            --report-times "$REGISTRY_FILE" \
            --output-dir "$ROOT/team"
      - name: Remove player-level acquisition rows before audit
        if: always()
        run: |
          rm -f "$ROOT/player/multi-report-injury-panel-normalized.csv"
          find "$ROOT/player" -name 'injury-lineup-snapshots-normalized.csv' -delete 2>/dev/null || true
          find "$ROOT/player" -name '*.pdf' -delete 2>/dev/null || true
      - name: Run aggregate acquisition audit
        id: acquisition_audit
        if: always()
        continue-on-error: true
        run: |
          test -s "$ROOT/player/multi-report-injury-panel-report.json"
          test -s "$ROOT/player/multi-report-source-index.csv"
          test -s "$ROOT/team/multi-report-team-submission-report.json"
          test -s "$ROOT/team/multi-report-team-submission-source-index.csv"
          test -s "$ROOT/team/multi-report-team-submission-panel.csv"
          python scripts/audit_injury_backfill_wave.py \
            --registry "$REGISTRY_FILE" \
            --player-report "$ROOT/player/multi-report-injury-panel-report.json" \
            --player-source-index "$ROOT/player/multi-report-source-index.csv" \
            --team-report "$ROOT/team/multi-report-team-submission-report.json" \
            --team-source-index "$ROOT/team/multi-report-team-submission-source-index.csv" \
            --team-panel "$ROOT/team/multi-report-team-submission-panel.csv" \
            --sensitive-root "$ROOT" \
            --output-dir "$ROOT/audit"
      - name: Verify no player-level files remain
        if: always()
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          root = Path(os.environ['ROOT'])
          forbidden = {
              'multi-report-injury-panel-normalized.csv',
              'injury-lineup-snapshots-normalized.csv',
              'injury-player-id-map.csv',
              'point-in-time-player-values.csv',
              'combined-player-boxscores.csv',
              'open-player-boxscores.csv',
          }
          found = sorted(str(path) for path in root.rglob('*') if path.is_file() and path.name in forbidden)
          assert not found, found
          print({'forbidden_player_files': found})
          PY
      - name: Upload aggregate Wave 2 acquisition artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: injury-backfill-wave2-acquisition
          path: |
            /tmp/nbavl-wave2-acquisition/player/multi-report-injury-panel-report.json
            /tmp/nbavl-wave2-acquisition/player/multi-report-source-index.csv
            /tmp/nbavl-wave2-acquisition/team/multi-report-team-submission-report.json
            /tmp/nbavl-wave2-acquisition/team/multi-report-team-submission-source-index.csv
            /tmp/nbavl-wave2-acquisition/team/multi-report-team-submission-panel.csv
            /tmp/nbavl-wave2-acquisition/audit/injury-backfill-wave-audit.json
            /tmp/nbavl-wave2-acquisition/audit/injury-backfill-wave-report-index.csv
          retention-days: 14
          if-no-files-found: error
      - name: Enforce acquisition gate
        if: always()
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          report = json.loads((Path(os.environ['ROOT']) / 'audit/injury-backfill-wave-audit.json').read_text())
          assert report['decision']['ready_for_wave1_feature_backfill'] is True, report
          assert report['decision']['ready_for_model_training'] is False
          assert report['decision']['ready_for_probability_adjustment'] is False
          assert report['decision']['ready_for_betting_edge_claim'] is False
          print(json.dumps({'coverage': report['coverage'], 'decision': report['decision']}, indent=2))
          PY
