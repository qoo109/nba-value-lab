name: Validate injury backfill wave 3 features

on:
  pull_request:
    paths:
      - "data/multi-report-injury-backfill-wave3-times.json"
      - "data/injury-snapshot-selection-policy-v1.json"
      - "scripts/audit_ready_injury_report_overlap.py"
      - "scripts/filter_injury_panels_to_acquisition_overlap.py"
      - "scripts/filter_team_submission_to_gold_domain.py"
      - "scripts/audit_wave1_injury_feature_backfill.py"
      - "scripts/combine_selected_injury_waves.py"
      - ".github/workflows/validate-injury-backfill-wave3-features.yml"
      - "docs/injury-backfill-wave3-features.md"
      - "PROJECT_STATUS.md"
  workflow_dispatch:
    inputs:
      gold_source_run_id:
        description: "Workflow run containing historical-gold-multiseason"
        required: true
        default: "29551715399"
      wave1_feature_run_id:
        description: "Verified workflow run containing Wave 1 selected panel"
        required: true
        default: "29629052948"
      wave2_feature_run_id:
        description: "Verified workflow run containing Wave 2 selected panel"
        required: true
        default: "29629052937"
      registry_file:
        description: "Calendar-fixed Wave 3 registry"
        required: true
        default: "data/multi-report-injury-backfill-wave3-times.json"

permissions:
  contents: read
  actions: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Wave 3 feature modules
        run: |
          python -m py_compile scripts/audit_ready_injury_report_overlap.py
          python -m py_compile scripts/filter_injury_panels_to_acquisition_overlap.py
          python -m py_compile scripts/filter_team_submission_to_gold_domain.py
          python -m py_compile scripts/audit_wave1_injury_feature_backfill.py
          python -m py_compile scripts/combine_selected_injury_waves.py
      - name: Run deterministic Wave 3 feature self-tests
        run: |
          rm -rf /tmp/nbavl-wave3-feature-self-test
          python scripts/audit_ready_injury_report_overlap.py --self-test --output-dir /tmp/nbavl-wave3-feature-self-test/ready
          python scripts/filter_injury_panels_to_acquisition_overlap.py --self-test --output-dir /tmp/nbavl-wave3-feature-self-test/overlap
          python scripts/filter_team_submission_to_gold_domain.py --self-test --output-dir /tmp/nbavl-wave3-feature-self-test/team-domain
          python scripts/audit_wave1_injury_feature_backfill.py --self-test --output-dir /tmp/nbavl-wave3-feature-self-test/audit
          python scripts/combine_selected_injury_waves.py --self-test --output-dir /tmp/nbavl-wave3-feature-self-test/combine

  live-feature-backfill:
    needs: self-test
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      GH_TOKEN: ${{ github.token }}
      GOLD_SOURCE_RUN_ID: ${{ github.event.inputs.gold_source_run_id || '29551715399' }}
      WAVE1_FEATURE_RUN_ID: ${{ github.event.inputs.wave1_feature_run_id || '29629052948' }}
      WAVE2_FEATURE_RUN_ID: ${{ github.event.inputs.wave2_feature_run_id || '29629052937' }}
      REGISTRY_FILE: ${{ github.event.inputs.registry_file || 'data/multi-report-injury-backfill-wave3-times.json' }}
      ROOT: /tmp/nbavl-wave3-features
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check pandas httpx pymupdf

      - name: Download audited five-season Gold
        run: |
          rm -rf "$ROOT"; mkdir -p "$ROOT/gold"
          gh run download "$GOLD_SOURCE_RUN_ID" --repo "$GITHUB_REPOSITORY" --name historical-gold-multiseason --dir "$ROOT/gold"
          GOLD_FILE="$(find "$ROOT/gold" -name 'historical-gold-multiseason.sqlite.gz' -print -quit)"
          test -n "$GOLD_FILE"; echo "GOLD_FILE=$GOLD_FILE" >> "$GITHUB_ENV"

      - name: Download verified Wave 1 selected artifact
        run: |
          mkdir -p "$ROOT/wave1"
          gh run download "$WAVE1_FEATURE_RUN_ID" --repo "$GITHUB_REPOSITORY" --name injury-backfill-wave1-features --dir "$ROOT/wave1"
          test -s "$ROOT/wave1/selected/selected-matchup-injury-burden.csv"
          test -s "$ROOT/wave1/final-audit/wave1-injury-feature-backfill-audit.json"
          python - <<'PY'
          import json, os
          from pathlib import Path
          r=Path(os.environ['ROOT'])/'wave1'; a=json.loads((r/'final-audit/wave1-injury-feature-backfill-audit.json').read_text())
          assert a['decision']['ready_for_wave1_selected_panel_research'] is True and a['coverage']['selected_independent_games']==91, a
          PY

      - name: Download verified Wave 2 selected artifact
        run: |
          mkdir -p "$ROOT/wave2"
          gh run download "$WAVE2_FEATURE_RUN_ID" --repo "$GITHUB_REPOSITORY" --name injury-backfill-wave2-features --dir "$ROOT/wave2"
          test -s "$ROOT/wave2/selected/selected-matchup-injury-burden.csv"
          test -s "$ROOT/wave2/wave2-audit/wave1-injury-feature-backfill-audit.json"
          python - <<'PY'
          import json, os
          from pathlib import Path
          r=Path(os.environ['ROOT'])/'wave2'; a=json.loads((r/'wave2-audit/wave1-injury-feature-backfill-audit.json').read_text())
          assert a['decision']['ready_for_wave1_selected_panel_research'] is True and a['coverage']['selected_independent_games']==85, a
          PY

      - name: Rebuild official Wave 3 player panel
        continue-on-error: true
        run: PYTHONPATH=scripts python scripts/build_multi_report_injury_panel.py --report-times "$REGISTRY_FILE" --output-dir "$ROOT/player"
      - name: Rebuild official Wave 3 team submission panel
        continue-on-error: true
        run: PYTHONPATH=scripts python scripts/build_multi_report_team_submission_panel.py --report-times "$REGISTRY_FILE" --output-dir "$ROOT/team"
      - name: Audit single-report-ready overlap
        continue-on-error: true
        run: python scripts/audit_ready_injury_report_overlap.py --player-source-index "$ROOT/player/multi-report-source-index.csv" --team-source-index "$ROOT/team/multi-report-team-submission-source-index.csv" --output-dir "$ROOT/ready-overlap"
      - name: Restrict Wave 3 panels to ready overlap
        continue-on-error: true
        run: |
          python scripts/filter_injury_panels_to_acquisition_overlap.py \
            --player-panel "$ROOT/player/multi-report-injury-panel-normalized.csv" \
            --player-source-index "$ROOT/ready-overlap/ready-player-source-index.csv" \
            --team-panel "$ROOT/team/multi-report-team-submission-panel.csv" \
            --team-source-index "$ROOT/team/multi-report-team-submission-source-index.csv" \
            --output-dir "$ROOT/overlap"

      - name: Match Wave 3 panels to Historical Gold
        continue-on-error: true
        run: |
          python scripts/validate_injury_snapshot_schedule_match.py --snapshot-csv "$ROOT/overlap/overlap-player-injury-panel.csv" --gold "$GOLD_FILE" --output-dir "$ROOT/player-schedule"
          python scripts/validate_injury_snapshot_schedule_match.py --snapshot-csv "$ROOT/overlap/overlap-team-submission-panel.csv" --gold "$GOLD_FILE" --output-dir "$ROOT/team-schedule"

      - name: Restrict team ledger to Gold-matched feature domain
        continue-on-error: true
        run: |
          python scripts/filter_team_submission_to_gold_domain.py \
            --team-panel "$ROOT/overlap/overlap-team-submission-panel.csv" \
            --team-game-map "$ROOT/team-schedule/injury-snapshot-game-id-map.csv" \
            --player-game-map "$ROOT/player-schedule/injury-snapshot-game-id-map.csv" \
            --output-dir "$ROOT/team-domain"

      - name: Import two Gold-validated boxscore seasons
        continue-on-error: true
        run: |
          PYTHONPATH=scripts python scripts/import_open_player_boxscores.py --season 2022-23 --gold "$GOLD_FILE" --output-dir "$ROOT/boxscores-2022"
          PYTHONPATH=scripts python scripts/import_open_player_boxscores.py --season 2023-24 --gold "$GOLD_FILE" --output-dir "$ROOT/boxscores-2023"
      - name: Combine temporary player boxscores
        continue-on-error: true
        run: |
          python - <<'PY'
          import csv, os
          from pathlib import Path
          r=Path(os.environ['ROOT']); rows={}; fields=None
          for p in [r/'boxscores-2022/open-player-boxscores.csv',r/'boxscores-2023/open-player-boxscores.csv']:
              with p.open('r',encoding='utf-8-sig',newline='') as f:
                  rd=csv.DictReader(f); fields=fields or list(rd.fieldnames or [])
                  for x in rd: rows[(x['SEASON_YEAR'],x['GAME_ID'],x['PLAYER_ID'])]=x
          with (r/'combined-player-boxscores.csv').open('w',encoding='utf-8',newline='') as f:
              w=csv.DictWriter(f,fieldnames=fields); w.writeheader(); w.writerows(rows[k] for k in sorted(rows))
          PY
      - name: Match deterministic Wave 3 identities
        continue-on-error: true
        run: PYTHONPATH=scripts python scripts/match_injury_players_from_boxscores.py --snapshot-csv "$ROOT/overlap/overlap-player-injury-panel.csv" --game-map-csv "$ROOT/player-schedule/injury-snapshot-game-id-map.csv" --boxscore-csv "$ROOT/combined-player-boxscores.csv" --output-dir "$ROOT/identity"
      - name: Build Wave 3 prior-only values
        continue-on-error: true
        run: PYTHONPATH=scripts python scripts/build_point_in_time_player_values.py --player-logs "$ROOT/combined-player-boxscores.csv" --snapshot-csv "$ROOT/overlap/overlap-player-injury-panel.csv" --player-id-map "$ROOT/identity/injury-player-id-map.csv" --output-dir "$ROOT/player-values"
      - name: Build Wave 3 long injury features
        continue-on-error: true
        run: python scripts/build_multi_report_injury_features.py --snapshot-csv "$ROOT/overlap/overlap-player-injury-panel.csv" --player-values "$ROOT/player-values/point-in-time-player-values.csv" --player-id-map "$ROOT/identity/injury-player-id-map.csv" --game-map "$ROOT/player-schedule/injury-snapshot-game-id-map.csv" --output-dir "$ROOT/long-features"
      - name: Reconcile Wave 3 team submission completeness
        continue-on-error: true
        run: python scripts/reconcile_injury_team_submission_status.py --team-long "$ROOT/long-features/multi-report-team-injury-burden-long.csv" --team-submissions "$ROOT/team-domain/gold-domain-team-submission-panel.csv" --team-game-map "$ROOT/team-domain/gold-domain-team-game-id-map.csv" --output-dir "$ROOT/reconciled"
      - name: Apply frozen T-60 policy to Wave 3
        continue-on-error: true
        run: python scripts/select_multi_report_injury_snapshots.py --long-matchups "$ROOT/reconciled/reconciled-matchup-injury-burden-long.csv" --policy data/injury-snapshot-selection-policy-v1.json --output-dir "$ROOT/selected"

      - name: Remove temporary player-level data
        if: always()
        run: |
          rm -f "$ROOT/combined-player-boxscores.csv" "$ROOT/overlap/overlap-player-injury-panel.csv" "$ROOT/player/multi-report-injury-panel-normalized.csv" "$ROOT/identity/injury-player-id-map.csv" "$ROOT/player-values/point-in-time-player-values.csv" "$ROOT/boxscores-2022/open-player-boxscores.csv" "$ROOT/boxscores-2023/open-player-boxscores.csv"
          find "$ROOT/player" -name 'injury-lineup-snapshots-normalized.csv' -delete 2>/dev/null || true
          find "$ROOT" -name '*.pdf' -delete 2>/dev/null || true

      - name: Run aggregate Wave 3 feature audit
        if: always()
        continue-on-error: true
        run: |
          python scripts/audit_wave1_injury_feature_backfill.py \
            --overlap-report "$ROOT/overlap/overlap-filter-report.json" \
            --player-schedule-report "$ROOT/player-schedule/injury-snapshot-schedule-match-report.json" \
            --team-schedule-report "$ROOT/team-domain/team-submission-gold-domain-report.json" \
            --identity-report "$ROOT/identity/injury-player-boxscore-identity-report.json" \
            --player-value-report "$ROOT/player-values/point-in-time-player-value-report.json" \
            --feature-report "$ROOT/long-features/multi-report-injury-feature-report.json" \
            --reconciliation-report "$ROOT/reconciled/injury-team-submission-reconciliation-report.json" \
            --selection-report "$ROOT/selected/snapshot-selection-report.json" \
            --selected-csv "$ROOT/selected/selected-matchup-injury-burden.csv" \
            --sensitive-root "$ROOT" --output-dir "$ROOT/wave3-audit"

      - name: Combine Wave 1, Wave 2, and Wave 3 selected panels
        if: always()
        continue-on-error: true
        run: |
          python scripts/combine_selected_injury_waves.py \
            --wave wave1 "$ROOT/wave1/selected/selected-matchup-injury-burden.csv" "$ROOT/wave1/final-audit/wave1-injury-feature-backfill-audit.json" \
            --wave wave2 "$ROOT/wave2/selected/selected-matchup-injury-burden.csv" "$ROOT/wave2/wave2-audit/wave1-injury-feature-backfill-audit.json" \
            --wave wave3 "$ROOT/selected/selected-matchup-injury-burden.csv" "$ROOT/wave3-audit/wave1-injury-feature-backfill-audit.json" \
            --output-dir "$ROOT/combined"

      - name: Upload aggregate Wave 3 and combined artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: injury-backfill-wave3-features
          path: |
            /tmp/nbavl-wave3-features/ready-overlap/ready-overlap-audit.json
            /tmp/nbavl-wave3-features/overlap/overlap-filter-report.json
            /tmp/nbavl-wave3-features/overlap/overlap-team-submission-panel.csv
            /tmp/nbavl-wave3-features/player-schedule/injury-snapshot-schedule-match-report.json
            /tmp/nbavl-wave3-features/player-schedule/injury-snapshot-game-id-map.csv
            /tmp/nbavl-wave3-features/team-schedule/injury-snapshot-schedule-match-report.json
            /tmp/nbavl-wave3-features/team-domain/team-submission-gold-domain-report.json
            /tmp/nbavl-wave3-features/team-domain/gold-domain-team-submission-panel.csv
            /tmp/nbavl-wave3-features/team-domain/gold-domain-team-game-id-map.csv
            /tmp/nbavl-wave3-features/identity/injury-player-boxscore-identity-report.json
            /tmp/nbavl-wave3-features/player-values/point-in-time-player-value-report.json
            /tmp/nbavl-wave3-features/long-features/multi-report-injury-feature-report.json
            /tmp/nbavl-wave3-features/reconciled/injury-team-submission-reconciliation-report.json
            /tmp/nbavl-wave3-features/reconciled/reconciled-team-injury-burden-long.csv
            /tmp/nbavl-wave3-features/reconciled/reconciled-matchup-injury-burden-long.csv
            /tmp/nbavl-wave3-features/selected/snapshot-selection-report.json
            /tmp/nbavl-wave3-features/selected/snapshot-selection-audit.csv
            /tmp/nbavl-wave3-features/selected/selected-matchup-injury-burden.csv
            /tmp/nbavl-wave3-features/wave3-audit/wave1-injury-feature-backfill-audit.json
            /tmp/nbavl-wave3-features/combined/combined-selected-matchup-injury-burden.csv
            /tmp/nbavl-wave3-features/combined/combined-selected-wave-audit.csv
            /tmp/nbavl-wave3-features/combined/combined-selected-injury-waves-report.json
          retention-days: 14
          if-no-files-found: error

      - name: Enforce Wave 3 and combined structural gates
        if: always()
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          r=Path(os.environ['ROOT'])
          domain=json.loads((r/'team-domain/team-submission-gold-domain-report.json').read_text())
          wave3=json.loads((r/'wave3-audit/wave1-injury-feature-backfill-audit.json').read_text())
          combined=json.loads((r/'combined/combined-selected-injury-waves-report.json').read_text())
          assert domain['decision']['ready_for_gold_domain_reconciliation'] is True, domain
          assert domain['quality']['unmatched_player_game_ids']==[], domain
          assert domain['quality']['excluded_player_backed_games']==[], domain
          assert wave3['decision']['ready_for_wave1_selected_panel_research'] is True, wave3
          assert wave3['decision']['ready_for_injury_feature_walk_forward_holdout'] is False
          assert combined['decision']['ready_for_combined_selected_panel_research'] is True, combined
          assert combined['decision']['ready_for_injury_feature_walk_forward_holdout'] is False
          assert combined['decision']['ready_for_model_training'] is False
          assert combined['decision']['ready_for_probability_adjustment'] is False
          assert combined['decision']['ready_for_betting_edge_claim'] is False
          assert combined['quality']['game_identity_conflicts']==0 and combined['quality']['selection_policy_conflicts']==0 and combined['quality']['duplicate_output_games']==0
          print(json.dumps({'team_domain':domain,'wave3':wave3,'combined':combined},indent=2))
          PY
