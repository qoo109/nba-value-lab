name: Validate injury snapshot schedule match v1

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Workflow run containing historical-gold-multiseason"
        required: true
        default: "29551715399"
      report_time:
        description: "Official injury report publication time"
        required: true
        default: "2023-12-18T08:30:00-05:00"
  pull_request:
    paths:
      - "scripts/validate_injury_snapshot_schedule_match.py"
      - "scripts/import_official_nba_injury_report.py"
      - ".github/workflows/validate-injury-snapshot-schedule-match-v1.yml"
      - "docs/injury-snapshot-schedule-match-v1.md"

permissions:
  contents: read
  actions: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install matching dependencies
        run: python -m pip install --disable-pip-version-check pandas
      - name: Compile schedule matcher
        run: python -m py_compile scripts/validate_injury_snapshot_schedule_match.py
      - name: Run exact-key synthetic self-test
        run: |
          rm -rf /tmp/nbavl-injury-match-self-test
          python scripts/validate_injury_snapshot_schedule_match.py \
            --self-test \
            --output-dir /tmp/nbavl-injury-match-self-test
          python -m json.tool /tmp/nbavl-injury-match-self-test/injury-snapshot-schedule-match-report.json >/dev/null
          test -f /tmp/nbavl-injury-match-self-test/injury-snapshot-game-id-map.csv

  live-pilot:
    if: github.event_name == 'workflow_dispatch'
    needs: self-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install importer and matching dependencies
        run: python -m pip install --disable-pip-version-check pandas httpx pymupdf
      - name: Download multi-season Gold artifact
        run: |
          rm -rf /tmp/nbavl-injury-match-source
          mkdir -p /tmp/nbavl-injury-match-source
          gh run download "${{ inputs.source_run_id }}" \
            --repo "$GITHUB_REPOSITORY" \
            --name historical-gold-multiseason \
            --dir /tmp/nbavl-injury-match-source
          find /tmp/nbavl-injury-match-source -name 'historical-gold-multiseason.sqlite.gz' -print -quit | grep .
      - name: Import official snapshot temporarily
        run: |
          rm -rf /tmp/nbavl-injury-match-import
          PYTHONPATH=scripts python scripts/import_official_nba_injury_report.py \
            --report-time "${{ inputs.report_time }}" \
            --retain-normalized \
            --output-dir /tmp/nbavl-injury-match-import
      - name: Match official schedule keys to historical game IDs
        run: |
          rm -rf /tmp/nbavl-injury-match-output
          GOLD_FILE="$(find /tmp/nbavl-injury-match-source -name 'historical-gold-multiseason.sqlite.gz' -print -quit)"
          python scripts/validate_injury_snapshot_schedule_match.py \
            --snapshot-csv /tmp/nbavl-injury-match-import/validation/injury-lineup-snapshots-normalized.csv \
            --gold "$GOLD_FILE" \
            --output-dir /tmp/nbavl-injury-match-output
      - name: Validate exact join and delete player rows
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          match_root = Path('/tmp/nbavl-injury-match-output')
          import_root = Path('/tmp/nbavl-injury-match-import')
          report = json.loads((match_root / 'injury-snapshot-schedule-match-report.json').read_text())
          assert report['decision']['ready_for_historical_game_id_join'] is True, report
          assert report['quality']['game_match_rate'] == 1.0, report
          assert report['quality']['unmatched_games'] == 0, report
          assert report['quality']['duplicate_gold_schedule_keys'] == 0, report
          assert report['quality']['snapshot_side_errors'] == 0, report
          player_rows = import_root / 'validation/injury-lineup-snapshots-normalized.csv'
          player_rows.unlink()
          assert not player_rows.exists()
          print(json.dumps({
            'coverage': report['coverage'],
            'quality': report['quality'],
            'decision': report['decision'],
          }, indent=2))
          PY
      - name: Upload aggregate QA and game mapping only
        uses: actions/upload-artifact@v4
        with:
          name: injury-snapshot-schedule-match-v1
          path: |
            /tmp/nbavl-injury-match-import/official-injury-report-import-report.json
            /tmp/nbavl-injury-match-import/validation/injury-lineup-validation-report.json
            /tmp/nbavl-injury-match-output/injury-snapshot-schedule-match-report.json
            /tmp/nbavl-injury-match-output/injury-snapshot-game-id-map.csv
          retention-days: 14
          if-no-files-found: error
