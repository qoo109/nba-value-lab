name: Validate injury team submission status v1

on:
  pull_request:
    paths:
      - "scripts/build_multi_report_team_submission_panel.py"
      - "scripts/reconcile_injury_team_submission_status.py"
      - ".github/workflows/validate-injury-team-submission-status-v1.yml"
      - "docs/injury-team-submission-status-v1.md"
      - "PROJECT_STATUS.md"
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Workflow run containing historical-gold-multiseason"
        required: true
        default: "29551715399"
      report_times_file:
        description: "Repository JSON containing official report timestamps"
        required: true
        default: "data/multi-report-injury-pilot-times.json"

permissions:
  contents: read
  actions: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install parser dependencies
        run: python -m pip install --disable-pip-version-check pandas httpx pymupdf
      - name: Compile team submission modules
        run: |
          python -m py_compile scripts/build_multi_report_team_submission_panel.py
          python -m py_compile scripts/reconcile_injury_team_submission_status.py
      - name: Run deterministic self-tests
        run: |
          rm -rf /tmp/nbavl-team-submission-self-test
          PYTHONPATH=scripts python scripts/build_multi_report_team_submission_panel.py \
            --self-test \
            --output-dir /tmp/nbavl-team-submission-self-test/parser
          python scripts/reconcile_injury_team_submission_status.py \
            --self-test \
            --output-dir /tmp/nbavl-team-submission-self-test/reconcile
          python -m json.tool /tmp/nbavl-team-submission-self-test/reconcile/injury-team-submission-reconciliation-report.json >/dev/null

  live-pilot:
    needs: self-test
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      GH_TOKEN: ${{ github.token }}
      SOURCE_RUN_ID: ${{ github.event.inputs.source_run_id || '29551715399' }}
      REPORT_TIMES_FILE: ${{ github.event.inputs.report_times_file || 'data/multi-report-injury-pilot-times.json' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check pandas httpx pymupdf
      - name: Download audited five-season Gold
        run: |
          rm -rf /tmp/nbavl-team-submission-live
          mkdir -p /tmp/nbavl-team-submission-live/gold
          gh run download "$SOURCE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name historical-gold-multiseason \
            --dir /tmp/nbavl-team-submission-live/gold
          GOLD_FILE="$(find /tmp/nbavl-team-submission-live/gold -name 'historical-gold-multiseason.sqlite.gz' -print -quit)"
          test -n "$GOLD_FILE"
          echo "GOLD_FILE=$GOLD_FILE" >> "$GITHUB_ENV"
      - name: Build official multi-report player panel
        run: |
          PYTHONPATH=scripts python scripts/build_multi_report_injury_panel.py \
            --report-times "$REPORT_TIMES_FILE" \
            --output-dir /tmp/nbavl-team-submission-live/injury
          test -s /tmp/nbavl-team-submission-live/injury/multi-report-injury-panel-normalized.csv
      - name: Build official team submission panel
        run: |
          PYTHONPATH=scripts python scripts/build_multi_report_team_submission_panel.py \
            --report-times "$REPORT_TIMES_FILE" \
            --output-dir /tmp/nbavl-team-submission-live/team-submissions
          test -s /tmp/nbavl-team-submission-live/team-submissions/multi-report-team-submission-panel.csv
      - name: Match player and team panels to Gold
        run: |
          python scripts/validate_injury_snapshot_schedule_match.py \
            --snapshot-csv /tmp/nbavl-team-submission-live/injury/multi-report-injury-panel-normalized.csv \
            --gold "$GOLD_FILE" \
            --output-dir /tmp/nbavl-team-submission-live/player-schedule-match
          python scripts/validate_injury_snapshot_schedule_match.py \
            --snapshot-csv /tmp/nbavl-team-submission-live/team-submissions/multi-report-team-submission-panel.csv \
            --gold "$GOLD_FILE" \
            --output-dir /tmp/nbavl-team-submission-live/team-schedule-match
      - name: Import two Gold-validated boxscore seasons
        run: |
          PYTHONPATH=scripts python scripts/import_open_player_boxscores.py \
            --season 2022-23 \
            --gold "$GOLD_FILE" \
            --output-dir /tmp/nbavl-team-submission-live/boxscores-2022
          PYTHONPATH=scripts python scripts/import_open_player_boxscores.py \
            --season 2023-24 \
            --gold "$GOLD_FILE" \
            --output-dir /tmp/nbavl-team-submission-live/boxscores-2023
      - name: Combine temporary player boxscores
        run: |
          python - <<'PY'
          import csv
          from pathlib import Path
          root = Path('/tmp/nbavl-team-submission-live')
          sources = [
              root / 'boxscores-2022/open-player-boxscores.csv',
              root / 'boxscores-2023/open-player-boxscores.csv',
          ]
          rows = {}
          fields = None
          for path in sources:
              with path.open('r', encoding='utf-8-sig', newline='') as handle:
                  reader = csv.DictReader(handle)
                  fields = fields or list(reader.fieldnames or [])
                  for row in reader:
                      rows[(row['SEASON_YEAR'], row['GAME_ID'], row['PLAYER_ID'])] = row
          output = root / 'combined-player-boxscores.csv'
          with output.open('w', encoding='utf-8', newline='') as handle:
              writer = csv.DictWriter(handle, fieldnames=fields)
              writer.writeheader()
              writer.writerows(rows[key] for key in sorted(rows))
          print({'combined_rows': len(rows)})
          PY
      - name: Build deterministic identity and prior-only values
        run: |
          PYTHONPATH=scripts python scripts/match_injury_players_from_boxscores.py \
            --snapshot-csv /tmp/nbavl-team-submission-live/injury/multi-report-injury-panel-normalized.csv \
            --game-map-csv /tmp/nbavl-team-submission-live/player-schedule-match/injury-snapshot-game-id-map.csv \
            --boxscore-csv /tmp/nbavl-team-submission-live/combined-player-boxscores.csv \
            --output-dir /tmp/nbavl-team-submission-live/player-identity
          PYTHONPATH=scripts python scripts/build_point_in_time_player_values.py \
            --player-logs /tmp/nbavl-team-submission-live/combined-player-boxscores.csv \
            --snapshot-csv /tmp/nbavl-team-submission-live/injury/multi-report-injury-panel-normalized.csv \
            --player-id-map /tmp/nbavl-team-submission-live/player-identity/injury-player-id-map.csv \
            --output-dir /tmp/nbavl-team-submission-live/player-values
      - name: Build original long feature panel and baseline selection
        run: |
          python scripts/build_multi_report_injury_features.py \
            --snapshot-csv /tmp/nbavl-team-submission-live/injury/multi-report-injury-panel-normalized.csv \
            --player-values /tmp/nbavl-team-submission-live/player-values/point-in-time-player-values.csv \
            --player-id-map /tmp/nbavl-team-submission-live/player-identity/injury-player-id-map.csv \
            --game-map /tmp/nbavl-team-submission-live/player-schedule-match/injury-snapshot-game-id-map.csv \
            --output-dir /tmp/nbavl-team-submission-live/original-long
          python scripts/select_multi_report_injury_snapshots.py \
            --long-matchups /tmp/nbavl-team-submission-live/original-long/multi-report-matchup-injury-burden-long.csv \
            --policy data/injury-snapshot-selection-policy-v1.json \
            --output-dir /tmp/nbavl-team-submission-live/baseline-selection
      - name: Reconcile team submission completeness
        run: |
          python scripts/reconcile_injury_team_submission_status.py \
            --team-long /tmp/nbavl-team-submission-live/original-long/multi-report-team-injury-burden-long.csv \
            --team-submissions /tmp/nbavl-team-submission-live/team-submissions/multi-report-team-submission-panel.csv \
            --team-game-map /tmp/nbavl-team-submission-live/team-schedule-match/injury-snapshot-game-id-map.csv \
            --output-dir /tmp/nbavl-team-submission-live/reconciled
          python scripts/select_multi_report_injury_snapshots.py \
            --long-matchups /tmp/nbavl-team-submission-live/reconciled/reconciled-matchup-injury-burden-long.csv \
            --policy data/injury-snapshot-selection-policy-v1.json \
            --output-dir /tmp/nbavl-team-submission-live/reconciled-selection
      - name: Validate official team submission QA and sample counting
        run: |
          python - <<'PY'
          import csv
          import json
          from pathlib import Path
          root = Path('/tmp/nbavl-team-submission-live')
          team_source = json.loads((root / 'team-submissions/multi-report-team-submission-report.json').read_text())
          team_schedule = json.loads((root / 'team-schedule-match/injury-snapshot-schedule-match-report.json').read_text())
          identity = json.loads((root / 'player-identity/injury-player-boxscore-identity-report.json').read_text())
          values = json.loads((root / 'player-values/point-in-time-player-value-report.json').read_text())
          original = json.loads((root / 'original-long/multi-report-injury-feature-report.json').read_text())
          baseline = json.loads((root / 'baseline-selection/snapshot-selection-report.json').read_text())
          reconciled = json.loads((root / 'reconciled/injury-team-submission-reconciliation-report.json').read_text())
          selected = json.loads((root / 'reconciled-selection/snapshot-selection-report.json').read_text())
          assert team_source['decision']['ready_for_team_submission_reconciliation'] is True, team_source
          assert team_source['coverage']['successful_reports'] == team_source['coverage']['requested_reports'], team_source
          assert team_source['coverage']['submission_status_counts'].get('NOT_YET_SUBMITTED', 0) >= 28, team_source
          assert team_source['quality']['submission_conflicts'] == 0, team_source
          assert team_schedule['decision']['ready_for_historical_game_id_join'] is True, team_schedule
          assert identity['quality']['ambiguous_player_rows'] == 0, identity
          assert values['quality']['strict_prior_date_violations'] == 0, values
          assert reconciled['decision']['ready_for_predeclared_snapshot_selection'] is True, reconciled
          assert reconciled['quality']['not_yet_submitted_imputed_as_zero'] is False, reconciled
          assert reconciled['quality']['unknown_submission_imputed_as_zero'] is False, reconciled
          assert selected['decision']['ready_for_selected_panel_research'] is True, selected
          assert selected['quality']['duplicate_selected_independent_games'] == 0, selected
          assert selected['coverage']['independent_games_selected'] >= baseline['coverage']['independent_games_selected']
          assert selected['coverage']['independent_games_selected'] <= selected['coverage']['independent_games_available']
          selected_rows = list(csv.DictReader((root / 'reconciled-selection/selected-matchup-injury-burden.csv').open()))
          assert len(selected_rows) == len({row['historical_game_id'] for row in selected_rows})
          assert selected['decision']['ready_for_model_training'] is False
          assert selected['decision']['ready_for_probability_adjustment'] is False
          assert selected['decision']['ready_for_betting_edge_claim'] is False
          print(json.dumps({
              'team_submission_source': team_source['coverage'],
              'original_long': original['coverage'],
              'baseline_selection': baseline['coverage'],
              'reconciled': reconciled['coverage'],
              'reconciled_selection': selected['coverage'],
              'sample_size': selected['sample_size'],
          }, indent=2))
          PY
      - name: Remove temporary player-level data
        run: |
          rm -f /tmp/nbavl-team-submission-live/combined-player-boxscores.csv
          rm -f /tmp/nbavl-team-submission-live/boxscores-2022/open-player-boxscores.csv
          rm -f /tmp/nbavl-team-submission-live/boxscores-2023/open-player-boxscores.csv
          rm -f /tmp/nbavl-team-submission-live/injury/multi-report-injury-panel-normalized.csv
          find /tmp/nbavl-team-submission-live/injury/reports -name 'injury-lineup-snapshots-normalized.csv' -delete
          rm -f /tmp/nbavl-team-submission-live/player-identity/injury-player-id-map.csv
          rm -f /tmp/nbavl-team-submission-live/player-values/point-in-time-player-values.csv
      - name: Upload aggregate team submission artifact
        uses: actions/upload-artifact@v4
        with:
          name: injury-team-submission-status-v1
          path: |
            /tmp/nbavl-team-submission-live/team-submissions/multi-report-team-submission-report.json
            /tmp/nbavl-team-submission-live/team-submissions/multi-report-team-submission-source-index.csv
            /tmp/nbavl-team-submission-live/team-submissions/multi-report-team-submission-panel.csv
            /tmp/nbavl-team-submission-live/team-schedule-match/injury-snapshot-schedule-match-report.json
            /tmp/nbavl-team-submission-live/team-schedule-match/injury-snapshot-game-id-map.csv
            /tmp/nbavl-team-submission-live/original-long/multi-report-injury-feature-report.json
            /tmp/nbavl-team-submission-live/baseline-selection/snapshot-selection-report.json
            /tmp/nbavl-team-submission-live/reconciled/injury-team-submission-reconciliation-report.json
            /tmp/nbavl-team-submission-live/reconciled/reconciled-team-injury-burden-long.csv
            /tmp/nbavl-team-submission-live/reconciled/reconciled-matchup-injury-burden-long.csv
            /tmp/nbavl-team-submission-live/reconciled-selection/snapshot-selection-report.json
            /tmp/nbavl-team-submission-live/reconciled-selection/snapshot-selection-audit.csv
            /tmp/nbavl-team-submission-live/reconciled-selection/selected-matchup-injury-burden.csv
          retention-days: 14
          if-no-files-found: error
