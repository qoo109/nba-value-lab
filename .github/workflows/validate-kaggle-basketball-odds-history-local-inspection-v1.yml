name: Validate Kaggle basketball odds local inspection v1

on:
  pull_request:
    paths:
      - "data/research/kaggle-basketball-odds-history-local-inspection-v1.json"
      - "data/research/no-cost-timestamped-odds-source-qualification-current-status-v13.json"
      - "docs/kaggle-basketball-odds-history-local-inspection-v1.md"
      - "docs/handoffs/nba_value_lab_handoff_2026-07-24_kaggle_basketball_odds_local_inspector.md"
      - "scripts/inspect_kaggle_basketball_odds_history_archive_v1.py"
      - "scripts/validate_kaggle_basketball_odds_history_local_inspection_v1.py"
      - ".github/workflows/validate-kaggle-basketball-odds-history-local-inspection-v1.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile inspector and contract validator
        run: |
          python -m py_compile \
            scripts/inspect_kaggle_basketball_odds_history_archive_v1.py \
            scripts/validate_kaggle_basketball_odds_history_local_inspection_v1.py
      - name: Validate local inspector contract
        run: python scripts/validate_kaggle_basketball_odds_history_local_inspection_v1.py
      - name: Upload aggregate-only QA
        uses: actions/upload-artifact@v4
        with:
          name: kaggle-basketball-odds-history-local-inspection-validation-v1
          path: artifacts/kaggle-basketball-odds-history-local-inspection-validation-v1.json
          if-no-files-found: error
          retention-days: 14
