name: Validate legacy market real-file audit retry 002 approval v1

on:
  pull_request:
    paths:
      - "data/research/legacy-market-real-file-audit-retry-request-002-v1.json"
      - "data/research/legacy-market-real-file-audit-retry-002-approval-v1.json"
      - "data/research/legacy-market-real-file-audit-retry-002-result-v1.json"
      - ".github/workflows/validate-legacy-market-real-file-audit-retry-002-approval-v1.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  archival-approval-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate immutable approval 002 and completed lifecycle
        run: |
          rm -rf /tmp/nbavl-approval-002-archive
          mkdir -p /tmp/nbavl-approval-002-archive
          python - <<'PY'
          import json
          from pathlib import Path

          request = json.loads(Path('data/research/legacy-market-real-file-audit-retry-request-002-v1.json').read_text())
          approval = json.loads(Path('data/research/legacy-market-real-file-audit-retry-002-approval-v1.json').read_text())
          result = json.loads(Path('data/research/legacy-market-real-file-audit-retry-002-result-v1.json').read_text())

          request_id = 'LEGACY-MARKET-ARCHIVE-AUDIT-2026-07-21-002'
          assert request['request_id'] == approval['request_id'] == result['request_id'] == request_id
          assert request['one_time_only'] is True, request
          assert request['maximum_execution_count'] == 1, request
          assert request['workflow_dispatch_only'] is True, request
          assert request['raw_rows_emitted'] == 0, request
          assert request['raw_files_uploaded'] is False, request
          assert request['formal_stake'] == 0, request
          assert approval['approval_state'] == 'EXPLICIT_USER_APPROVAL_GRANTED', approval
          auth = approval['execution_authorization']
          assert auth['one_time_only'] is True, approval
          assert auth['maximum_execution_count'] == 1, approval
          assert auth['workflow_dispatch_only'] is True, approval
          assert auth['aggregate_outputs_only'] is True, approval
          for key, value in approval['acknowledgements'].items():
              if key == 'formal_stake':
                  assert value == 0, approval
              else:
                  assert value is False, (key, value)

          assert result['workflow_run_id'] == 29810347326, result
          assert result['real_file_audit_executed'] is True, result
          assert result['all_scientific_gates_passed'] is True, result
          assert result['formal_outcome'] == 'USER_SUPPLIED_LEGACY_MARKET_ARCHIVE_CROSS_SOURCE_AUDIT_RESEARCH_BLOCKED', result
          assert result['boundary_failures'] == ['reference_missing_gold_for_silver'], result
          assert result['reference_counts']['silver_rows_in_scope'] == 5826, result
          assert result['reference_counts']['gold_rows'] == 5824, result
          assert result['reference_counts']['missing_gold_for_silver'] == 2, result
          assert result['request_consumed'] is True, result
          assert result['repeat_execution_allowed'] is False, result
          assert result['boundaries']['raw_rows_emitted'] == 0, result
          assert result['boundaries']['raw_files_emitted'] is False, result
          assert result['boundaries']['formal_stake'] == 0, result

          report = {
              'formal_state': 'LEGACY_MARKET_ARCHIVE_RETRY_002_ARCHIVED_CONSUMED',
              'request_id': request_id,
              'workflow_run_id': result['workflow_run_id'],
              'scientific_gates_passed': True,
              'formal_outcome': result['formal_outcome'],
              'boundary_failures': result['boundary_failures'],
              'ready_for_repeat_execution': False,
              'source_role_changed': False,
              'formal_stake': 0,
          }
          Path('/tmp/nbavl-approval-002-archive/approval-002-archive-validation.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n'
          )
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: legacy-market-approval-002-archive-validation
          path: /tmp/nbavl-approval-002-archive/approval-002-archive-validation.json
          retention-days: 14
          if-no-files-found: error
