name: Validate model registry

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "models/**"
      - "schemas/**"
      - "scripts/validate_model_registry.py"
      - "scripts/validate_v5_ui.py"
      - "scripts/multi_main_policy.py"
      - "scripts/test_multi_main_policy.py"
      - "js/v4-*.js"
      - "js/v5/**"
      - "css/v5-*.css"
      - ".github/workflows/validate-model-registry.yml"
  pull_request:
    paths:
      - "models/**"
      - "schemas/**"
      - "scripts/validate_model_registry.py"
      - "scripts/validate_v5_ui.py"
      - "scripts/multi_main_policy.py"
      - "scripts/test_multi_main_policy.py"
      - "js/v4-*.js"
      - "js/v5/**"
      - "css/v5-*.css"
      - ".github/workflows/validate-model-registry.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate registry and configs
        run: python scripts/validate_model_registry.py

      - name: Test G1.1 multi-main policy
        run: |
          python -m py_compile scripts/multi_main_policy.py scripts/test_multi_main_policy.py
          PYTHONPATH=scripts python scripts/test_multi_main_policy.py

      - name: Validate V5 UI modules and file sizes
        run: |
          python -m py_compile scripts/validate_v5_ui.py
          python scripts/validate_v5_ui.py

      - name: Check JavaScript syntax
        run: |
          node --check js/v4-data.js
          node --check js/v4-core.js
          node --check js/v4-render.js
          node --check js/v4-6-model-coordination.js
          node --check js/v4-7-research-log.js
          node --check js/v4-8-lock-status.js
          node --check js/v4-10-multi-main.js
          node --check js/v4-init.js
          node --check js/v4-live-data.js
          node --check js/v5/core/namespace.js
          node --check js/v5/utils/format.js
          node --check js/v5/components/cards.js
          node --check js/v5/components/drawer.js
          node --check js/v5/pages/dashboard.js
          node --check js/v5/pages/performance-dashboard.js
          node --check js/v5/pages/research-timeline.js
          node --check js/v5/bootstrap.js
