name: Validate private model market gap decomposition 2025-26 result v1

on:
  pull_request:
    paths:
      - "scripts/analyze_private_model_market_gap_decomposition_2025_26_v1.py"
      - "scripts/validate_private_model_market_gap_decomposition_2025_26_result_v1.py"
      - "data/research/private-model-market-gap-decomposition-2025-26-result-v1.json"
      - "docs/private-model-market-gap-decomposition-2025-26-result-v1.md"
      - "docs/handoffs/nba_value_lab_handoff_2026-07-24_model_market_gap_decomposition.md"
      - ".github/workflows/validate-private-model-market-gap-decomposition-2025-26-result-v1.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install diagnostic runtime
        run: |
          python -m pip install --disable-pip-version-check \
            numpy \
            pandas \
            scipy \
            scikit-learn==1.9.0
      - name: Compile aggregate-only tooling
        run: |
          python -m py_compile \
            scripts/analyze_private_model_market_gap_decomposition_2025_26_v1.py \
            scripts/validate_private_model_market_gap_decomposition_2025_26_result_v1.py
      - name: Run analyzer synthetic self-test
        run: |
          rm -rf /tmp/nbavl-gap-self-test
          python scripts/analyze_private_model_market_gap_decomposition_2025_26_v1.py \
            --self-test \
            --output-dir /tmp/nbavl-gap-self-test
          test -f /tmp/nbavl-gap-self-test/self-test.json
      - name: Validate committed aggregate result and locks
        run: |
          rm -rf /tmp/nbavl-gap-validation
          mkdir -p /tmp/nbavl-gap-validation
          python scripts/validate_private_model_market_gap_decomposition_2025_26_result_v1.py \
            --result data/research/private-model-market-gap-decomposition-2025-26-result-v1.json \
            --output /tmp/nbavl-gap-validation/validation.json
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('/tmp/nbavl-gap-validation/validation.json').read_text())
          assert payload['formal_state'] == 'PRIVATE_MODEL_MARKET_GAP_DECOMPOSITION_2025_26_RESULT_VALID'
          assert payload['all_contract_tests_passed'] is True
          assert payload['contract_tests'] >= 100
          assert payload['finding'] == 'NO_INCREMENTAL_INFORMATION_SIGNAL_DEMONSTRATED'
          assert payload['preserved_locks']['strict_t60_qualified'] is False
          assert payload['preserved_locks']['formal_point_in_time_market_backtest_allowed'] is False
          assert payload['preserved_locks']['model_retraining_authorized'] is False
          assert payload['preserved_locks']['betting_edge_claim_allowed'] is False
          assert payload['preserved_locks']['formal_stake'] == 0
          print(json.dumps(payload, indent=2))
          PY
      - name: Upload aggregate-only validation
        uses: actions/upload-artifact@v4
        with:
          name: private-model-market-gap-decomposition-2025-26-result-validation-v1
          path: |
            /tmp/nbavl-gap-validation/validation.json
            /tmp/nbavl-gap-self-test/self-test.json
          if-no-files-found: error
          retention-days: 14
