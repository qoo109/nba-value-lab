name: Validate PROJECT_STATUS after Gold 5826 freeze manifest synthetic result v1

on:
  pull_request:
    paths:
      - "PROJECT_STATUS.md"
      - "data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-request-design-result-v1.json"
      - "data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-request-design-current-status-v1.json"
      - "data/research/historical-gold-5826-complete-corpus-freeze-manifest-synthetic-implementation-result-v1.json"
      - "data/research/historical-gold-5826-complete-corpus-freeze-manifest-implementation-current-status-v1.json"
      - "scripts/validate_project_status_after_gold_5826_freeze_manifest_synthetic_result_v1.py"
      - "scripts/validate_project_status_after_gold_5826_real_artifact_request_design_result_v1.py"
      - ".github/workflows/validate-project-status-after-gold-5826-freeze-manifest-synthetic-result-v1.yml"
  push:
    branches:
      - main
    paths:
      - "PROJECT_STATUS.md"
      - "data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-request-design-result-v1.json"
      - "data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-request-design-current-status-v1.json"
      - "data/research/historical-gold-5826-complete-corpus-freeze-manifest-synthetic-implementation-result-v1.json"
      - "data/research/historical-gold-5826-complete-corpus-freeze-manifest-implementation-current-status-v1.json"
      - "scripts/validate_project_status_after_gold_5826_freeze_manifest_synthetic_result_v1.py"
      - "scripts/validate_project_status_after_gold_5826_real_artifact_request_design_result_v1.py"
      - ".github/workflows/validate-project-status-after-gold-5826-freeze-manifest-synthetic-result-v1.yml"

permissions:
  contents: read

jobs:
  validate-project-status:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine lifecycle state
        id: lifecycle
        run: |
          if test -f data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-request-design-result-v1.json; then
            echo "state=request_design_result" >> "$GITHUB_OUTPUT"
          else
            echo "state=synthetic_result" >> "$GITHUB_OUTPUT"
          fi

      - name: Compile synthetic-result status validator
        if: steps.lifecycle.outputs.state == 'synthetic_result'
        run: python -m py_compile scripts/validate_project_status_after_gold_5826_freeze_manifest_synthetic_result_v1.py

      - name: Validate synthetic-result status
        if: steps.lifecycle.outputs.state == 'synthetic_result'
        run: |
          mkdir -p validation-output
          python scripts/validate_project_status_after_gold_5826_freeze_manifest_synthetic_result_v1.py \
            --status PROJECT_STATUS.md \
            --implementation-status data/research/historical-gold-5826-complete-corpus-freeze-manifest-implementation-current-status-v1.json \
            --synthetic-result data/research/historical-gold-5826-complete-corpus-freeze-manifest-synthetic-implementation-result-v1.json \
            --self-test \
            --output validation-output/project-status-gold-5826-freeze-manifest-synthetic-result-v1.json

      - name: Compile superseding request-design result status validator
        if: steps.lifecycle.outputs.state == 'request_design_result'
        run: python -m py_compile scripts/validate_project_status_after_gold_5826_real_artifact_request_design_result_v1.py

      - name: Validate superseding request-design result status
        if: steps.lifecycle.outputs.state == 'request_design_result'
        run: |
          mkdir -p validation-output
          python scripts/validate_project_status_after_gold_5826_real_artifact_request_design_result_v1.py \
            --status PROJECT_STATUS.md \
            --request-design-status data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-request-design-current-status-v1.json \
            --request-design-result data/research/historical-gold-5826-freeze-manifest-real-artifact-execution-request-design-result-v1.json \
            --self-test \
            --output validation-output/project-status-gold-5826-freeze-manifest-synthetic-result-v1.json

      - name: Enforce lifecycle boundaries
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path(
              "validation-output/project-status-gold-5826-freeze-manifest-synthetic-result-v1.json"
          ).read_text())
          assert report["checks_failed"] == 0, report
          if report["formal_state"] == "PROJECT_STATUS_GOLD_5826_FREEZE_MANIFEST_SYNTHETIC_RESULT_SYNC_VALID":
              assert report["synthetic_tests_passed"] == 20, report
              assert report["request_design_created"] is False, report
              assert report["ready_for_real_artifact_execution_request_design"] is True, report
          else:
              assert report["formal_state"] == "PROJECT_STATUS_GOLD_5826_REAL_ARTIFACT_REQUEST_DESIGN_RESULT_SYNC_VALID", report
              assert report["request_design_validated"] is True, report
              assert report["request_draft_created"] is False, report
              assert report["ready_for_request_draft"] is True, report
          assert report["gold_matchups"] == 5826, report
          assert report["real_artifact_execution_approved"] is False if "real_artifact_execution_approved" in report else True
          assert report["corpus_freeze_executed"] is False if "corpus_freeze_executed" in report else True
          assert report["ready_for_real_artifact_execution"] is False, report
          assert report["ready_for_market_backtest"] is False, report
          assert report["ready_for_model_retraining"] is False, report
          assert report["formal_stake"] == 0, report
          assert all(report["self_test"].values()), report
          PY

      - name: Confirm scientific implementation unchanged
        if: github.event_name == 'pull_request'
        run: |
          git diff --exit-code origin/${{ github.base_ref }}...HEAD -- \
            scripts/build_historical_gold_5826_complete_corpus_freeze_manifest_v1.py \
            scripts/test_build_historical_gold_5826_complete_corpus_freeze_manifest_v1.py \
            data/research/historical-gold-5826-complete-corpus-freeze-policy-v1.json \
            data/research/historical-gold-5826-complete-corpus-freeze-manifest-implementation-design-v1.json \
            data/research/historical-silver-2023-24-two-game-official-cdn-pbp-recovery-current-status-v1.json \
            scripts/historical_gold_schema.py \
            scripts/build_historical_gold_multiseason.py

      - name: Upload lifecycle validation Artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-status-after-gold-5826-freeze-manifest-synthetic-result-v1
          path: validation-output/project-status-gold-5826-freeze-manifest-synthetic-result-v1.json
          if-no-files-found: error
          retention-days: 14
