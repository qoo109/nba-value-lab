name: Validate PROJECT_STATUS after source gap real-reference validation v1

on:
  pull_request:
    paths:
      - "PROJECT_STATUS.md"
      - "data/research/historical-gold-5826-complete-corpus-freeze-manifest-synthetic-implementation-result-v1.json"
      - "data/research/historical-gold-5826-complete-corpus-freeze-manifest-implementation-current-status-v1.json"
      - "scripts/validate_project_status_after_source_gap_real_reference_validation_v1.py"
      - "scripts/validate_project_status_after_gold_5826_freeze_manifest_synthetic_result_v1.py"
      - ".github/workflows/validate-project-status-after-source-gap-real-reference-validation-v1.yml"
  push:
    branches:
      - main
    paths:
      - "PROJECT_STATUS.md"
      - "data/research/historical-gold-5826-complete-corpus-freeze-manifest-synthetic-implementation-result-v1.json"
      - "data/research/historical-gold-5826-complete-corpus-freeze-manifest-implementation-current-status-v1.json"
      - "scripts/validate_project_status_after_source_gap_real_reference_validation_v1.py"
      - "scripts/validate_project_status_after_gold_5826_freeze_manifest_synthetic_result_v1.py"
      - ".github/workflows/validate-project-status-after-source-gap-real-reference-validation-v1.yml"

permissions:
  contents: read

jobs:
  validate-project-status:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine lifecycle state
        id: lifecycle
        run: |
          if test -f data/research/historical-gold-5826-complete-corpus-freeze-manifest-synthetic-implementation-result-v1.json; then
            echo "state=synthetic_result" >> "$GITHUB_OUTPUT"
          else
            echo "state=source_gap_legacy" >> "$GITHUB_OUTPUT"
          fi

      - name: Compile legacy source-gap validator
        if: steps.lifecycle.outputs.state == 'source_gap_legacy'
        run: python -m py_compile scripts/validate_project_status_after_source_gap_real_reference_validation_v1.py

      - name: Validate legacy source-gap status
        if: steps.lifecycle.outputs.state == 'source_gap_legacy'
        run: |
          mkdir -p validation-output
          python scripts/validate_project_status_after_source_gap_real_reference_validation_v1.py \
            --status PROJECT_STATUS.md \
            --self-test \
            --output validation-output/project-status-source-gap-real-reference-validation-v1.json

      - name: Compile superseding synthetic-result validator
        if: steps.lifecycle.outputs.state == 'synthetic_result'
        run: python -m py_compile scripts/validate_project_status_after_gold_5826_freeze_manifest_synthetic_result_v1.py

      - name: Validate superseding synthetic-result lifecycle
        if: steps.lifecycle.outputs.state == 'synthetic_result'
        run: |
          mkdir -p validation-output
          python scripts/validate_project_status_after_gold_5826_freeze_manifest_synthetic_result_v1.py \
            --status PROJECT_STATUS.md \
            --implementation-status data/research/historical-gold-5826-complete-corpus-freeze-manifest-implementation-current-status-v1.json \
            --synthetic-result data/research/historical-gold-5826-complete-corpus-freeze-manifest-synthetic-implementation-result-v1.json \
            --self-test \
            --output validation-output/project-status-source-gap-real-reference-validation-v1.json

      - name: Enforce source-gap history and current synthetic boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("validation-output/project-status-source-gap-real-reference-validation-v1.json").read_text())
          assert report["checks_failed"] == 0, report
          if report["formal_state"] == "PROJECT_STATUS_GOLD_5826_FREEZE_MANIFEST_SYNTHETIC_RESULT_SYNC_VALID":
              status = Path("PROJECT_STATUS.md").read_text(encoding="utf-8")
              assert "real-reference validation request: EXECUTED / PASS / CONSUMED" in status
              assert "source gap exception historical count: 2" in status
              assert "source gap exception remaining count: 0" in status
              assert report["gold_matchups"] == 5826, report
              assert report["synthetic_tests_passed"] == 20, report
              assert report["request_design_created"] is False, report
              assert report["real_artifact_execution_approved"] is False, report
              assert report["corpus_freeze_executed"] is False, report
              assert report["ready_for_real_artifact_execution_request_design"] is True, report
              assert report["ready_for_real_artifact_execution"] is False, report
              assert report["ready_for_market_backtest"] is False, report
              assert report["formal_stake"] == 0, report
          assert all(report["self_test"].values()), report
          PY

      - name: Confirm historical source-gap records and scientific implementation unchanged
        if: github.event_name == 'pull_request'
        run: |
          git diff --exit-code origin/${{ github.base_ref }}...HEAD -- \
            data/research/historical-gold-silver-coverage-real-reference-result-v1.json \
            data/research/historical-silver-2023-24-source-gap-exception-manifest-v1.json \
            data/research/historical-silver-2023-24-source-gap-exception-integration-policy-v1.json \
            data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-request-v1.json \
            data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-approval-v1.json \
            data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-result-v1.json \
            data/research/historical-silver-2023-24-source-gap-exception-integration-real-reference-validation-current-status-v3.json \
            scripts/analyze_historical_gold_silver_coverage_v1.py \
            scripts/integrate_historical_silver_source_gap_exception_v1.py \
            scripts/run_historical_silver_source_gap_exception_integration_real_reference_validation_once_v1.py \
            scripts/run_historical_silver_source_gap_exception_integration_real_reference_validation_once_v2.py

      - name: Upload lifecycle validation Artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-status-after-source-gap-real-reference-validation-v1
          path: validation-output/project-status-source-gap-real-reference-validation-v1.json
          if-no-files-found: error
          retention-days: 14
