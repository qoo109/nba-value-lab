name: Validate source-agnostic private forward odds collector design v1

on:
  pull_request:
    paths:
      - PROJECT_STATUS.md
      - data/research/source-agnostic-private-forward-odds-collector-design-v1.json
      - data/research/no-cost-timestamped-odds-source-qualification-current-status-v5.json
      - schemas/private-forward-odds-quote-v1.schema.json
      - docs/source-agnostic-private-forward-odds-collector-v1.md
      - docs/handoffs/nba_value_lab_handoff_2026-07-24_source_agnostic_private_forward_collector_design.md
      - scripts/validate_source_agnostic_private_forward_odds_collector_design_v1.py
      - .github/workflows/validate-source-agnostic-private-forward-odds-collector-design-v1.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile validator
        run: python -m py_compile scripts/validate_source_agnostic_private_forward_odds_collector_design_v1.py

      - name: Validate collector design and offline boundary
        run: python scripts/validate_source_agnostic_private_forward_odds_collector_design_v1.py

      - name: Upload aggregate QA
        uses: actions/upload-artifact@v4
        with:
          name: source-agnostic-private-forward-odds-collector-design-validation-v1
          path: build/source-agnostic-private-forward-odds-collector-design-validation-v1.json
          retention-days: 14
