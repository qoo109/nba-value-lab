name: Validate Timestamped Odds pilot manifest v1

on:
  pull_request:
    paths:
      - "data/timestamped-odds-acquisition-v1.json"
      - "scripts/import_official_nba_participation_labels.py"
      - "scripts/qualify_timestamped_odds_v1.py"
      - "scripts/build_timestamped_odds_pilot_manifest_v1.py"
      - "docs/timestamped-odds-pilot-manifest-v1.md"
      - ".github/workflows/validate-timestamped-odds-pilot-manifest-v1.yml"
      - "PROJECT_STATUS.md"
  workflow_dispatch:
    inputs:
      gold_run_id:
        description: "Run containing historical-gold-multiseason"
        required: true
        default: "29551715399"

permissions:
  contents: read
  actions: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ROOT: /tmp/nbavl-odds-pilot-manifest-self-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shared offline dependency
        run: python -m pip install --disable-pip-version-check pandas

      - name: Compile manifest modules
        run: |
          python -m py_compile scripts/import_official_nba_participation_labels.py
          python -m py_compile scripts/qualify_timestamped_odds_v1.py
          python -m py_compile scripts/build_timestamped_odds_pilot_manifest_v1.py

      - name: Run deterministic Gold schedule and no-price self-tests
        env:
          PYTHONPATH: scripts
        run: |
          rm -rf "$ROOT"
          python scripts/build_timestamped_odds_pilot_manifest_v1.py \
            --policy data/timestamped-odds-acquisition-v1.json \
            --output-dir "$ROOT" \
            --self-test
          test -s "$ROOT/timestamped-odds-pilot-manifest-v1-self-test.json"

      - name: Enforce synthetic non-access boundary
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ['ROOT'])
          report = json.loads(
              (root / 'timestamped-odds-pilot-manifest-v1-self-test.json').read_text()
          )
          checks = report['checks']
          boundary = report['execution_boundary']
          assert checks['gold_matches'] == 30, report
          assert checks['schedule_games'] == 30, report
          assert checks['game_slots'] == 180, report
          assert 1 <= checks['unique_request_timestamps'] <= 180, report
          assert checks['exact_planned_quota_credits'] <= 1800, report
          assert checks['opening_labels'] == 0, report
          assert checks['wrong_time_consistency_rejected'] is True, report
          assert checks['gold_identity_enforced'] is True, report
          assert checks['no_player_score_price_or_bookmaker_fields'] is True, report
          assert checks['no_paid_odds_access'] is True, report
          assert boundary == {
              'official_live_requests': 0,
              'odds_provider_requests': 0,
              'odds_api_key_read': False,
              'real_odds_quotes_downloaded': 0,
              'market_metrics_calculated': False,
              'formal_stake': 0,
          }, boundary
          PY

  live-manifest:
    needs: self-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      GOLD_RUN_ID: ${{ github.event.inputs.gold_run_id || '29551715399' }}
      ROOT: /tmp/nbavl-odds-pilot-manifest-v1
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shared offline dependency
        run: python -m pip install --disable-pip-version-check pandas

      - name: Download frozen Historical Gold
        run: |
          rm -rf "$ROOT"
          mkdir -p "$ROOT/gold" "$ROOT/result"
          gh run download "$GOLD_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name historical-gold-multiseason \
            --dir "$ROOT/gold"
          GOLD_FILE="$(find "$ROOT/gold" -name 'historical-gold-multiseason.sqlite.gz' -print -quit)"
          test -n "$GOLD_FILE"
          echo "GOLD_FILE=$GOLD_FILE" >> "$GITHUB_ENV"

      - name: Build official exact schedule and frozen no-price manifests
        env:
          PYTHONPATH: scripts
        run: |
          python scripts/build_timestamped_odds_pilot_manifest_v1.py \
            --policy data/timestamped-odds-acquisition-v1.json \
            --gold "$GOLD_FILE" \
            --output-dir "$ROOT/result"

      - name: Enforce exact manifest and no-spend boundary
        run: |
          python - <<'PY'
          import csv
          import json
          import os
          from pathlib import Path

          root = Path(os.environ['ROOT']) / 'result'
          report = json.loads((root / 'timestamped-odds-pilot-manifest-v1.json').read_text())
          print(json.dumps(report, indent=2))
          assert report['formal_state'] == 'PILOT_MANIFEST_READY_ACCESS_NOT_PROVIDED', report

          coverage = report['coverage']
          assert coverage['matched_sample_games'] == 30, report
          assert coverage['duplicate_gold_rows'] == 0, report
          assert coverage['missing_gold_games'] == [], report
          assert coverage['gold_identity_mismatches'] == [], report
          assert len(coverage['gold_input_sha256']) == 64, report
          assert coverage['official_schedule_requests'] == 30, report
          assert coverage['official_schedule_games'] == 30, report
          assert coverage['official_source_failures'] == 0, report
          assert sorted(coverage['schedule_games_by_season'].values()) == [10, 10, 10], report
          assert coverage['game_slot_rows'] == 180, report
          assert sorted(coverage['game_slots_by_season'].values()) == [60, 60, 60], report
          assert 1 <= coverage['unique_request_timestamps'] <= 180, report
          assert coverage['deduplicated_request_savings'] == 180 - coverage['unique_request_timestamps'], report
          assert coverage['exact_planned_quota_credits'] == coverage['unique_request_timestamps'] * 10, report
          assert coverage['exact_planned_quota_credits'] <= 1800, report
          assert coverage['duplicate_request_plan_timestamps'] == 0, report

          quality = report['quality']
          assert quality['official_failures'] == [], report
          assert quality['official_source_hashes'] == 30, report
          assert quality['raw_official_json_files_retained'] == 0, report
          assert quality['duplicate_schedule_games'] == 0, report
          assert quality['duplicate_game_tipoff_pairs'] == 0, report
          assert quality['duplicate_game_slot_keys'] == 0, report
          assert quality['missing_schedule_games'] == 0, report
          assert quality['manifest_identity_mismatches'] == 0, report
          assert quality['opening_labels'] == 0, report
          assert quality['prices_in_manifests'] is False, report
          assert quality['bookmaker_fields_in_manifests'] is False, report
          assert quality['player_fields_retained'] == 0, report
          assert quality['score_fields_retained'] == 0, report
          assert quality['odds_api_key_read'] is False, report
          assert quality['network_calls_to_paid_odds_provider'] == 0, report
          assert quality['paid_odds_endpoint_called'] is False, report
          assert quality['real_odds_quotes_downloaded'] == 0, report
          assert quality['subscription_or_purchase_created'] is False, report
          assert quality['market_metrics_calculated'] is False, report
          assert quality['structural_blockers'] == [], report

          decision = report['decision']
          assert decision['manifest_structurally_ready'] is True, report
          assert decision['access_state'] == 'ACCESS_NOT_PROVIDED', report
          assert decision['ready_for_paid_qualification_execution'] is False, report
          assert decision['paid_execution_requires_explicit_user_approval'] is True, report
          assert decision['paid_execution_requires_private_secret'] is True, report
          assert decision['ready_for_production_backfill'] is False, report
          assert decision['ready_for_market_backtest'] is False, report
          assert decision['ready_for_clv_ev_roi'] is False, report
          assert decision['ready_for_betting_edge_claim'] is False, report
          assert decision['formal_stake'] == 0, report

          files = {
              'timestamped-odds-pilot-exact-schedule-v1.csv': {
                  'historical_game_id', 'official_game_id', 'season', 'game_date',
                  'away_team_abbr', 'home_team_abbr', 'scheduled_tipoff_utc',
                  'source_url', 'source_retrieved_at', 'source_sha256'
              },
              'timestamped-odds-pilot-game-slot-manifest-v1.csv': {
                  'historical_game_id', 'scheduled_tipoff_utc', 'snapshot_label',
                  'requested_at_utc', 'market', 'region'
              },
              'timestamped-odds-pilot-unique-request-plan-v1.csv': {
                  'request_plan_id', 'requested_at_utc', 'target_game_count',
                  'target_slot_count', 'target_game_ids', 'target_snapshot_labels'
              },
          }
          forbidden_columns = {
              'price', 'decimal_price', 'home_price', 'away_price', 'bookmaker',
              'player_id', 'player_name', 'home_score', 'away_score', 'outcome',
              'edge', 'ev', 'roi', 'clv', 'api_key'
          }
          expected_rows = {
              'timestamped-odds-pilot-exact-schedule-v1.csv': 30,
              'timestamped-odds-pilot-game-slot-manifest-v1.csv': 180,
              'timestamped-odds-pilot-unique-request-plan-v1.csv': coverage['unique_request_timestamps'],
          }
          for name, required in files.items():
              path = root / name
              assert path.is_file() and path.stat().st_size > 0, name
              with path.open(newline='', encoding='utf-8') as handle:
                  reader = csv.DictReader(handle)
                  headers = set(reader.fieldnames or [])
                  rows = list(reader)
              assert required <= headers, (name, required - headers)
              assert not (headers & forbidden_columns), (name, headers & forbidden_columns)
              assert len(rows) == expected_rows[name], (name, len(rows), expected_rows[name])

          failures = json.loads(
              (root / 'timestamped-odds-pilot-schedule-failures-v1.json').read_text()
          )
          assert failures == [], failures
          assert 'THE_ODDS_API_KEY' not in os.environ, 'Paid odds secret must not be exposed'
          PY

      - name: Remove downloaded Gold before Artifact upload
        if: always()
        run: rm -rf "$ROOT/gold"

      - name: Verify no raw JSON or quote-level files retained
        if: always()
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          root = Path(os.environ['ROOT']) / 'result'
          allowed_json = {
              'timestamped-odds-pilot-manifest-v1.json',
              'timestamped-odds-pilot-schedule-failures-v1.json',
          }
          unexpected_json = sorted(
              str(path) for path in root.rglob('*.json')
              if path.name not in allowed_json
          )
          assert not unexpected_json, unexpected_json
          forbidden_names = {
              'raw-response.json', 'normalized-quotes.csv', 'quote-rows.csv',
              'players.csv', 'boxscore.json', 'synthetic-gold.sqlite'
          }
          found = sorted(
              str(path) for path in root.rglob('*')
              if path.is_file() and path.name in forbidden_names
          )
          assert not found, found
          PY

      - name: Upload exact no-price pilot manifest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: timestamped-odds-pilot-manifest-v1
          path: |
            /tmp/nbavl-odds-pilot-manifest-v1/result/timestamped-odds-pilot-exact-schedule-v1.csv
            /tmp/nbavl-odds-pilot-manifest-v1/result/timestamped-odds-pilot-game-slot-manifest-v1.csv
            /tmp/nbavl-odds-pilot-manifest-v1/result/timestamped-odds-pilot-unique-request-plan-v1.csv
            /tmp/nbavl-odds-pilot-manifest-v1/result/timestamped-odds-pilot-schedule-failures-v1.json
            /tmp/nbavl-odds-pilot-manifest-v1/result/timestamped-odds-pilot-manifest-v1.json
          retention-days: 14
          if-no-files-found: warn
