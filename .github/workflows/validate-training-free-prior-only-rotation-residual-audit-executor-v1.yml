name: Validate training-free prior-only rotation residual audit executor v1

on:
  pull_request:
    paths:
      - "scripts/analyze_training_free_prior_only_rotation_residual_audit_2025_26_v1.py"
      - "docs/training-free-prior-only-rotation-residual-audit-execution-v1.md"
      - ".github/workflows/validate-training-free-prior-only-rotation-residual-audit-executor-v1.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install diagnostic runtime
        run: python -m pip install --disable-pip-version-check numpy scipy
      - name: Compile executor
        run: python -m py_compile scripts/analyze_training_free_prior_only_rotation_residual_audit_2025_26_v1.py
      - name: Validate frozen implementation contract
        run: |
          python - <<'PY'
          import importlib.util
          from pathlib import Path

          path = Path('scripts/analyze_training_free_prior_only_rotation_residual_audit_2025_26_v1.py')
          source = path.read_text(encoding='utf-8')
          spec = importlib.util.spec_from_file_location('audit', path)
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)

          assert module.BANDS == (5, 15, 30, 60)
          assert len(module.FEATURES) == 12
          assert len(module.STRESS_SIGNS) == 7
          assert module.EXPECTED == {
              'features': '3e8ef30f3a9801fda92fc95a490228b73fa53603093c914207e884a933b2de02',
              'predictions': 'c3764faf6eb3703374b12a5d8668c6ef889cd8f54070a2c6cf135b55559ca725',
              'market_join': 'fbd5b0133cd0ad58f3fe4dada53e79b0fd2ea6021d8179f648f727c76a96735b',
          }
          assert module.game_id('22500001') == '0022500001'
          assert module.game_id('0022500001') == '0022500001'
          assert '.fit(' not in source
          assert 'LogisticRegression' not in source
          assert 'RandomForest' not in source
          assert 'XGB' not in source
          assert 'ev_calculated": False' in source
          assert 'roi_calculated": False' in source
          assert 'strict_t60_qualified": False' in source
          assert 'formal_stake": 0' in source
          print('executor contract checks passed')
          PY
      - name: Run deterministic synthetic self-test
        run: |
          rm -rf /tmp/nbavl-rotation-residual-self-test
          mkdir -p /tmp/nbavl-rotation-residual-self-test
          python scripts/analyze_training_free_prior_only_rotation_residual_audit_2025_26_v1.py \
            --self-test \
            --output /tmp/nbavl-rotation-residual-self-test/self-test.json
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('/tmp/nbavl-rotation-residual-self-test/self-test.json').read_text())
          assert payload['passed'] is True
          assert all(payload['checks'].values())
          print(json.dumps(payload, indent=2))
          PY
      - name: Upload aggregate synthetic validation
        uses: actions/upload-artifact@v4
        with:
          name: training-free-prior-only-rotation-residual-audit-executor-v1
          path: /tmp/nbavl-rotation-residual-self-test/self-test.json
          if-no-files-found: error
          retention-days: 14
