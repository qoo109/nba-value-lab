name: Validate legacy market real-file audit approval v1

on:
  pull_request:
    paths:
      - "data/research/user-supplied-legacy-market-archive-real-file-audit-execution-request-v1.json"
      - "data/research/user-supplied-legacy-market-archive-real-file-audit-approval-v1.json"
      - "data/research/legacy-market-real-file-audit-retry-request-002-v1.json"
      - "data/research/legacy-market-real-file-audit-retry-002-result-v1.json"
      - ".github/workflows/validate-user-supplied-legacy-market-archive-real-file-audit-approval-v1.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  archival-approval-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate immutable approval 001 and consumed lifecycle
        run: |
          rm -rf /tmp/nbavl-approval-001-archive
          mkdir -p /tmp/nbavl-approval-001-archive
          python - <<'PY'
          import json
          from pathlib import Path

          request = json.loads(Path('data/research/user-supplied-legacy-market-archive-real-file-audit-execution-request-v1.json').read_text())
          approval = json.loads(Path('data/research/user-supplied-legacy-market-archive-real-file-audit-approval-v1.json').read_text())
          retry = json.loads(Path('data/research/legacy-market-real-file-audit-retry-request-002-v1.json').read_text())
          final = json.loads(Path('data/research/legacy-market-real-file-audit-retry-002-result-v1.json').read_text())

          assert approval['request_id'] == request['request_id'] == 'LEGACY-MARKET-ARCHIVE-AUDIT-2026-07-21-001'
          assert approval['approval_state'] == 'EXPLICIT_USER_APPROVAL_GRANTED', approval
          auth = approval['execution_authorization']
          assert auth['one_time_only'] is True, approval
          assert auth['maximum_execution_count'] == 1, approval
          assert auth['workflow_dispatch_only'] is True, approval
          assert auth['aggregate_outputs_only'] is True, approval
          assert auth['maximum_public_output_files'] == 1, approval
          assert auth['maximum_public_output_bytes'] == 1048576, approval
          for key, value in approval['acknowledgements'].items():
              if key == 'formal_stake':
                  assert value == 0, approval
              else:
                  assert value is False, (key, value)
          assert approval['next_state_if_approval_validation_passes']['ready_for_repeat_execution'] is False, approval
          assert retry['previous_request_id'] == approval['request_id'], retry
          assert retry['previous_run_id'] == 29804975869, retry
          assert retry['previous_result'] == 'BLOCKED_BEFORE_SCIENTIFIC_RESULT', retry
          assert final['request_consumed'] is True, final
          assert final['repeat_execution_allowed'] is False, final
          assert final['boundaries']['formal_stake'] == 0, final

          report = {
              'formal_state': 'LEGACY_MARKET_ARCHIVE_APPROVAL_001_ARCHIVED_CONSUMED',
              'request_id': approval['request_id'],
              'approval_valid': True,
              'blocked_run_id': retry['previous_run_id'],
              'ready_for_repeat_execution': False,
              'raw_rows_emitted': 0,
              'raw_files_emitted': False,
              'formal_stake': 0,
          }
          Path('/tmp/nbavl-approval-001-archive/approval-001-archive-validation.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n'
          )
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: legacy-market-approval-001-archive-validation
          path: /tmp/nbavl-approval-001-archive/approval-001-archive-validation.json
          retention-days: 14
          if-no-files-found: error
