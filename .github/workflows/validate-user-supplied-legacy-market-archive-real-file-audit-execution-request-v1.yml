name: Validate legacy market real-file audit execution request v1

on:
  pull_request:
    paths:
      - "data/research/user-supplied-legacy-market-archive-real-file-audit-execution-request-v1.json"
      - "data/research/legacy-market-real-file-audit-retry-request-002-v1.json"
      - "data/research/legacy-market-real-file-audit-retry-002-result-v1.json"
      - ".github/workflows/validate-user-supplied-legacy-market-archive-real-file-audit-execution-request-v1.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  archival-request-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate immutable request 001 lifecycle evidence
        run: |
          rm -rf /tmp/nbavl-request-001-archive
          mkdir -p /tmp/nbavl-request-001-archive
          python - <<'PY'
          import json
          from pathlib import Path

          request = json.loads(Path('data/research/user-supplied-legacy-market-archive-real-file-audit-execution-request-v1.json').read_text())
          retry = json.loads(Path('data/research/legacy-market-real-file-audit-retry-request-002-v1.json').read_text())
          final = json.loads(Path('data/research/legacy-market-real-file-audit-retry-002-result-v1.json').read_text())

          assert request['request_id'] == 'LEGACY-MARKET-ARCHIVE-AUDIT-2026-07-21-001', request
          assert request['one_time_execution_scope']['one_time_only'] is True, request
          assert request['one_time_execution_scope']['workflow_dispatch_only'] is True, request
          assert request['one_time_execution_scope']['maximum_execution_count'] == 1, request
          assert request['one_time_execution_scope']['raw_rows_emitted'] == 0, request
          assert request['one_time_execution_scope']['raw_files_uploaded_as_artifact'] is False, request
          assert request['frozen_audit_contract']['fuzzy_matching_allowed'] is False, request
          assert request['frozen_audit_contract']['manual_key_overrides_allowed'] is False, request
          assert request['frozen_audit_contract']['score_used_to_repair_identity'] is False, request
          assert request['current_execution_boundary']['formal_stake'] == 0, request

          assert retry['previous_request_id'] == request['request_id'], retry
          assert retry['previous_run_id'] == 29804975869, retry
          assert retry['previous_result'] == 'BLOCKED_BEFORE_SCIENTIFIC_RESULT', retry
          assert final['request_id'] == 'LEGACY-MARKET-ARCHIVE-AUDIT-2026-07-21-002', final
          assert final['request_consumed'] is True, final
          assert final['repeat_execution_allowed'] is False, final
          assert final['boundaries']['formal_stake'] == 0, final

          report = {
              'formal_state': 'LEGACY_MARKET_ARCHIVE_REQUEST_001_ARCHIVED_CONSUMED',
              'request_id': request['request_id'],
              'blocked_run_id': retry['previous_run_id'],
              'request_reusable': False,
              'raw_rows_emitted': 0,
              'raw_files_emitted': False,
              'formal_stake': 0,
          }
          Path('/tmp/nbavl-request-001-archive/request-001-archive-validation.json').write_text(
              json.dumps(report, indent=2, sort_keys=True) + '\n'
          )
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: legacy-market-request-001-archive-validation
          path: /tmp/nbavl-request-001-archive/request-001-archive-validation.json
          retention-days: 14
          if-no-files-found: error
