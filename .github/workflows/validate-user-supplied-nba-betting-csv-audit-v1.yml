name: Validate user-supplied NBA betting CSV audit v1

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/audit_user_supplied_nba_betting_csv_v1.py"
      - "data/research/user-supplied-nba-betting-csv-audit-v1.json"
      - "data/research/user-supplied-nba-betting-csv-provenance-confirmation-v1.json"
      - "data/research/user-supplied-nba-betting-csv-provenance-current-status-v1.json"
      - "data/research/legacy-market-real-file-audit-retry-002-result-v1.json"
      - "data/research/historical-gold-silver-coverage-reconciliation-implementation-v1.json"
      - "data/historical-odds-source-registry.json"
      - ".github/workflows/validate-user-supplied-nba-betting-csv-audit-v1.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install audit dependencies
        run: python -m pip install --disable-pip-version-check pandas numpy

      - name: Compile and run fixture-only audit self-test
        run: |
          python -m py_compile scripts/audit_user_supplied_nba_betting_csv_v1.py
          rm -f /tmp/user-supplied-nba-betting-csv-audit-self-test.json
          python scripts/audit_user_supplied_nba_betting_csv_v1.py \
            --self-test \
            --output /tmp/user-supplied-nba-betting-csv-audit-self-test.json
          python -m json.tool /tmp/user-supplied-nba-betting-csv-audit-self-test.json >/dev/null

      - name: Validate current aggregate evidence and guardrails
        run: |
          python -m json.tool data/research/user-supplied-nba-betting-csv-audit-v1.json >/dev/null
          python -m json.tool data/research/user-supplied-nba-betting-csv-provenance-confirmation-v1.json >/dev/null
          python -m json.tool data/research/user-supplied-nba-betting-csv-provenance-current-status-v1.json >/dev/null
          python -m json.tool data/research/legacy-market-real-file-audit-retry-002-result-v1.json >/dev/null
          python -m json.tool data/research/historical-gold-silver-coverage-reconciliation-implementation-v1.json >/dev/null
          python -m json.tool data/historical-odds-source-registry.json >/dev/null
          python - <<'PY'
          import json
          from pathlib import Path

          audit = json.loads(Path('data/research/user-supplied-nba-betting-csv-audit-v1.json').read_text())
          confirmation = json.loads(Path('data/research/user-supplied-nba-betting-csv-provenance-confirmation-v1.json').read_text())
          current = json.loads(Path('data/research/user-supplied-nba-betting-csv-provenance-current-status-v1.json').read_text())
          execution = json.loads(Path('data/research/legacy-market-real-file-audit-retry-002-result-v1.json').read_text())
          reconciliation = json.loads(Path('data/research/historical-gold-silver-coverage-reconciliation-implementation-v1.json').read_text())
          registry = json.loads(Path('data/historical-odds-source-registry.json').read_text())

          source_id = 'kaggle_cviaxmiwnptr_nba_betting_data_user_supplied'
          source = next(item for item in registry['sources'] if item['source_id'] == source_id)

          assert audit['schema']['row_count'] == 24440, audit
          assert audit['schema']['column_count'] == 27, audit
          assert audit['quality']['all_structural_gates_pass'] is True, audit
          assert audit['source']['raw_rows_emitted'] == 0, audit
          assert audit['source']['raw_file_committed'] is False, audit
          assert confirmation['source_id'] == source_id, confirmation
          assert confirmation['provenance_status'] == 'user_confirmed', confirmation
          assert confirmation['formal_outcome'] == 'ROLE_LIMITED_LEGACY_MARKET_ARCHIVE_ELIGIBLE', confirmation
          assert confirmation['file_evidence']['sha256'] == audit['source']['input_sha256'], confirmation

          assert execution['request_id'] == 'LEGACY-MARKET-ARCHIVE-AUDIT-2026-07-21-002', execution
          assert execution['workflow_run_id'] == 29810347326, execution
          assert execution['real_file_audit_executed'] is True, execution
          assert execution['all_scientific_gates_passed'] is True, execution
          assert execution['failed_scientific_gates'] == [], execution
          assert execution['formal_outcome'] == 'USER_SUPPLIED_LEGACY_MARKET_ARCHIVE_CROSS_SOURCE_AUDIT_RESEARCH_BLOCKED', execution
          assert execution['boundary_failures'] == ['reference_missing_gold_for_silver'], execution
          assert execution['reference_counts']['silver_rows_in_scope'] == 5826, execution
          assert execution['reference_counts']['gold_rows'] == 5824, execution
          assert execution['reference_counts']['missing_gold_for_silver'] == 2, execution
          assert execution['request_consumed'] is True, execution
          assert execution['repeat_execution_allowed'] is False, execution
          assert execution['boundaries']['raw_rows_emitted'] == 0, execution
          assert execution['boundaries']['raw_files_emitted'] is False, execution
          assert execution['boundaries']['formal_stake'] == 0, execution

          assert current['source_id'] == source_id, current
          assert current['current_formal_outcome'] == 'ROLE_LIMITED_LEGACY_MARKET_ARCHIVE_ELIGIBLE', current
          assert current['real_cross_source_audit_executed'] is True, current
          assert current['source_role_changed_by_execution'] is False, current
          retry = current['retry_real_file_execution']
          assert retry['workflow_run_id'] == 29810347326, retry
          assert retry['all_scientific_gates_passed'] is True, retry
          assert retry['missing_gold_for_silver'] == 2, retry
          assert retry['request_consumed'] is True, retry
          assert retry['repeat_execution_allowed'] is False, retry
          coverage = current['coverage_reconciliation']
          assert coverage['formal_state'] == 'HISTORICAL_GOLD_SILVER_COVERAGE_RECONCILIATION_IMPLEMENTATION_READY_REAL_EXECUTION_DISABLED', coverage
          assert coverage['synthetic_fixture_only'] is True, coverage
          assert coverage['network_calls_made'] is False, coverage
          assert coverage['real_reference_rows_read'] is False, coverage
          assert coverage['real_reconciliation_executed'] is False, coverage
          assert current['next_research_step'] == 'HISTORICAL_GOLD_SILVER_COVERAGE_RECONCILIATION_REAL_REFERENCE_EXECUTION_REQUEST', current
          assert current['point_in_time_market_backtest_ready'] is False, current
          assert current['clv_ready'] is False, current
          assert current['ev_ready'] is False, current
          assert current['roi_ready'] is False, current
          assert current['drawdown_ready'] is False, current
          assert current['model_retraining_authorized'] is False, current
          assert current['betting_edge_claim_allowed'] is False, current
          assert current['formal_stake'] == 0, current

          assert reconciliation['formal_state'] == coverage['formal_state'], reconciliation
          assert reconciliation['observed_gap']['missing_gold_for_silver'] == 2, reconciliation
          assert reconciliation['validation_mode']['real_reconciliation_executed'] is False, reconciliation
          assert reconciliation['output_boundary']['raw_rows_emitted'] == 0, reconciliation
          assert reconciliation['output_boundary']['raw_files_emitted'] is False, reconciliation
          assert reconciliation['downstream_permissions']['ready_for_real_reference_reconciliation'] is False, reconciliation
          assert reconciliation['downstream_permissions']['ready_for_gold_builder_change'] is False, reconciliation
          assert reconciliation['downstream_permissions']['ready_for_cross_source_audit_rerun'] is False, reconciliation
          assert reconciliation['downstream_permissions']['formal_stake'] == 0, reconciliation

          assert registry['registry_version'] == '1.6.0', registry
          assert source['status'] == 'role_limited_legacy_market_archive_eligible', source
          assert source['provenance_status'] == 'user_confirmed', source
          assert source['file_evidence']['sha256'] == audit['source']['input_sha256'], source
          assert source['opening_closing_classified'] is False, source
          registered_execution = source['cross_source_audit_execution']
          assert registered_execution['workflow_run_id'] == 29810347326, registered_execution
          assert registered_execution['real_file_audit_executed'] is True, registered_execution
          assert registered_execution['all_scientific_gates_passed'] is True, registered_execution
          assert registered_execution['formal_outcome'] == execution['formal_outcome'], registered_execution
          assert registered_execution['missing_gold_for_silver'] == 2, registered_execution
          assert registered_execution['request_consumed'] is True, registered_execution
          assert registered_execution['repeat_execution_allowed'] is False, registered_execution
          registered_coverage = source['coverage_reconciliation']
          assert registered_coverage['formal_state'] == coverage['formal_state'], registered_coverage
          assert registered_coverage['real_reference_rows_read'] is False, registered_coverage
          assert registered_coverage['real_reconciliation_executed'] is False, registered_coverage
          assert source['guardrails']['point_in_time_join_allowed'] is False, source
          assert source['guardrails']['roi_allowed'] is False, source
          assert source['guardrails']['clv_allowed'] is False, source
          assert source['guardrails']['model_retraining_allowed'] is False, source
          assert source['guardrails']['formal_stake'] == 0, source
          PY
