name: Verify Feature Expansion v3 live

on:
  pull_request:
    paths:
      - ".github/workflows/verify-feature-expansion-v3-live.yml"
      - "scripts/build_feature_expansion_v3.py"
      - "data/nba-venue-context-v1.json"

permissions:
  contents: read
  actions: read

jobs:
  live-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check numpy pandas scikit-learn
      - name: Download source artifacts
        run: |
          rm -rf /tmp/nbavl-feature-v3-source
          mkdir -p /tmp/nbavl-feature-v3-source/gold /tmp/nbavl-feature-v3-source/model
          gh run download "29551715399" --repo "$GITHUB_REPOSITORY" --name historical-gold-multiseason --dir /tmp/nbavl-feature-v3-source/gold
          gh run download "29551715399" --repo "$GITHUB_REPOSITORY" --name model-walk-forward-v2 --dir /tmp/nbavl-feature-v3-source/model
      - name: Run live context experiment
        run: |
          rm -rf /tmp/nbavl-feature-v3-live
          GOLD_FILE="$(find /tmp/nbavl-feature-v3-source/gold -name 'historical-gold-multiseason.sqlite.gz' -print -quit)"
          python scripts/build_feature_expansion_v3.py \
            --gold "$GOLD_FILE" \
            --predictions /tmp/nbavl-feature-v3-source/model/walk-forward-predictions.csv \
            --venue-config data/nba-venue-context-v1.json \
            --output-dir /tmp/nbavl-feature-v3-live
      - name: Validate live report
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('/tmp/nbavl-feature-v3-live')
          status = json.loads((root / 'feature-expansion-v3-run-status.json').read_text())
          report = json.loads((root / 'feature-expansion-v3-report.json').read_text())
          assert status['feature_expansion_complete'] is True, status
          assert status['matched_games'] == 3688, status
          assert report['method']['untouched_holdout'] == '2023-24'
          assert report['coverage']['context_qa']['prediction_join']['match_rate'] == 1.0
          assert report['guardrails']['uses_future_games'] is False
          assert report['decision']['ready_for_production_model'] is False
          print(json.dumps({
            'status': status,
            'probability_selection': report['probability_experiment']['selected_on_validation'],
            'probability_holdout_baseline': report['probability_experiment']['holdout_baseline'],
            'probability_holdout_corrected': report['probability_experiment']['holdout_corrected'],
            'margin_selection': report['margin_experiment']['selected_on_validation'],
            'margin_holdout_baseline': report['margin_experiment']['holdout_baseline'],
            'margin_holdout_corrected': report['margin_experiment']['holdout_corrected'],
            'decision': report['decision'],
          }, indent=2))
          PY
      - name: Upload aggregate reports only
        uses: actions/upload-artifact@v4
        with:
          name: feature-expansion-v3-live-verification
          path: |
            /tmp/nbavl-feature-v3-live/feature-expansion-v3-run-status.json
            /tmp/nbavl-feature-v3-live/feature-expansion-v3-report.json
            /tmp/nbavl-feature-v3-live/feature-expansion-v3-candidate-summary.csv
            /tmp/nbavl-feature-v3-live/feature-expansion-v3-coefficients.csv
          retention-days: 3
          if-no-files-found: error
