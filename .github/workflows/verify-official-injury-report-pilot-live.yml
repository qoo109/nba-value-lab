name: Verify official injury report PDF pilot live

on:
  pull_request:
    paths:
      - ".github/workflows/verify-official-injury-report-pilot-live.yml"
      - "scripts/import_official_nba_injury_report.py"
      - "scripts/validate_injury_lineup_snapshots.py"

permissions:
  contents: read

jobs:
  live-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install parser dependencies
        run: python -m pip install --disable-pip-version-check pandas httpx pymupdf
      - name: Parse fixed archived official pregame report
        run: |
          rm -rf /tmp/nbavl-official-injury-live
          mkdir -p /tmp/nbavl-official-injury-live
          set +e
          PYTHONPATH=scripts python scripts/import_official_nba_injury_report.py \
            --report-time "2023-12-18T08:30:00-05:00" \
            --output-dir /tmp/nbavl-official-injury-live \
            > /tmp/nbavl-official-injury-live/execution.log 2>&1
          CODE=$?
          cat /tmp/nbavl-official-injury-live/execution.log
          exit "$CODE"
      - name: Validate aggregate result and deletion controls
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('/tmp/nbavl-official-injury-live')
          report = json.loads((root / 'official-injury-report-import-report.json').read_text())
          validation = json.loads((root / 'validation/injury-lineup-validation-report.json').read_text())
          assert report['decision']['ready_for_manual_official_pdf_pilot'] is True, report
          assert report['coverage']['validated_rows'] == 118, report
          assert report['coverage']['not_yet_submitted_team_rows'] == 10, report
          assert report['coverage']['games'] >= 10, report
          assert report['quality']['conversion_errors'] == 0, report
          assert report['quality']['contract_errors'] == 0, report
          assert report['source']['download_client'] == 'httpx', report
          assert report['source']['parser_engine'] == 'PyMuPDF native word coordinates', report
          assert report['guardrails']['third_party_injury_client_runtime_dependency'] is False, report
          assert report['guardrails']['third_party_pdf_parser_runtime_dependency'] is False, report
          assert validation['decision']['ready_for_point_in_time_feature_build'] is True, validation
          assert not (root / 'validation/injury-lineup-snapshots-normalized.csv').exists()
          print(json.dumps(report, indent=2))
          PY
      - name: Upload aggregate QA and execution diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: official-injury-report-live-verification
          path: |
            /tmp/nbavl-official-injury-live/execution.log
            /tmp/nbavl-official-injury-live/official-injury-report-import-report.json
            /tmp/nbavl-official-injury-live/validation/injury-lineup-validation-report.json
          retention-days: 3
          if-no-files-found: warn
