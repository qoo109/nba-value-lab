name: Verify official player game logs source

on:
  pull_request:
    paths:
      - "scripts/fetch_official_player_game_logs.py"
      - ".github/workflows/verify-official-player-game-logs.yml"
      - "docs/player-value-minutes-v1.md"
  workflow_dispatch:
    inputs:
      season:
        description: "NBA season label"
        required: true
        default: "2023-24"
      source_run_id:
        description: "Workflow run containing historical-gold-multiseason"
        required: true
        default: "29551715399"

permissions:
  contents: read
  actions: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install source dependencies
        run: python -m pip install --disable-pip-version-check httpx
      - name: Compile and test importer
        run: |
          python -m py_compile scripts/fetch_official_player_game_logs.py
          rm -rf /tmp/nbavl-player-game-logs-self-test
          python scripts/fetch_official_player_game_logs.py \
            --self-test \
            --output-dir /tmp/nbavl-player-game-logs-self-test

  live-source-pilot:
    needs: self-test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install source dependencies
        run: python -m pip install --disable-pip-version-check httpx
      - name: Download audited Gold schedule
        run: |
          rm -rf /tmp/nbavl-player-game-logs-source
          mkdir -p /tmp/nbavl-player-game-logs-source
          gh run download "${{ github.event.inputs.source_run_id || '29551715399' }}" \
            --repo "$GITHUB_REPOSITORY" \
            --name historical-gold-multiseason \
            --dir /tmp/nbavl-player-game-logs-source
          GOLD_FILE="$(find /tmp/nbavl-player-game-logs-source -name 'historical-gold-multiseason.sqlite.gz' -print -quit)"
          test -n "$GOLD_FILE"
          echo "GOLD_FILE=$GOLD_FILE" >> "$GITHUB_ENV"
      - name: Fetch one official season from LiveData
        run: |
          rm -rf /tmp/nbavl-player-game-logs-live
          mkdir -p /tmp/nbavl-player-game-logs-live
          set +e
          python scripts/fetch_official_player_game_logs.py \
            --season "${{ github.event.inputs.season || '2023-24' }}" \
            --gold "$GOLD_FILE" \
            --concurrency 8 \
            --retries 3 \
            --timeout-seconds 25 \
            --output-dir /tmp/nbavl-player-game-logs-live \
            > /tmp/nbavl-player-game-logs-live/execution.log 2>&1
          CODE=$?
          echo "$CODE" > /tmp/nbavl-player-game-logs-live/exit-code.txt
          cat /tmp/nbavl-player-game-logs-live/execution.log
          exit 0
      - name: Validate aggregate source QA and remove rows
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('/tmp/nbavl-player-game-logs-live')
          report_path = root / 'official-player-game-logs-report.json'
          assert report_path.exists(), (root / 'execution.log').read_text()
          report = json.loads(report_path.read_text())
          source_rows = root / 'official-player-game-logs.csv'
          if source_rows.exists():
              source_rows.unlink()
          assert not source_rows.exists()
          assert report['decision']['ready_for_point_in_time_feature_build'] is True, report
          assert report['coverage']['schedule_games'] >= 1200, report
          assert report['coverage']['successful_games'] >= 1200, report
          assert report['coverage']['game_coverage'] >= 0.995, report
          assert report['coverage']['player_game_rows'] >= 20000, report
          assert report['coverage']['unique_players'] >= 500, report
          assert report['quality']['duplicate_game_player_keys'] == 0, report
          assert report['quality']['invalid_minutes_rows'] == 0, report
          assert report['quality']['games_with_fewer_than_10_played_players'] == 0, report
          print(json.dumps(report, indent=2))
          PY
      - name: Upload aggregate source diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: official-player-game-logs-source-pilot
          path: |
            /tmp/nbavl-player-game-logs-live/execution.log
            /tmp/nbavl-player-game-logs-live/exit-code.txt
            /tmp/nbavl-player-game-logs-live/official-player-game-logs-report.json
          retention-days: 7
          if-no-files-found: warn
