name: Verify official player game logs source

on:
  pull_request:
    paths:
      - "scripts/fetch_official_player_game_logs.py"
      - ".github/workflows/verify-official-player-game-logs.yml"
      - "docs/player-value-minutes-v1.md"
  workflow_dispatch:
    inputs:
      season:
        description: "NBA season label"
        required: true
        default: "2023-24"

permissions:
  contents: read

jobs:
  self-test:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install source dependencies
        run: python -m pip install --disable-pip-version-check 'httpx[http2]'
      - name: Compile and test importer
        run: |
          python -m py_compile scripts/fetch_official_player_game_logs.py
          rm -rf /tmp/nbavl-player-game-logs-self-test
          python scripts/fetch_official_player_game_logs.py \
            --self-test \
            --output-dir /tmp/nbavl-player-game-logs-self-test

  live-source-pilot:
    needs: self-test
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install source dependencies
        run: python -m pip install --disable-pip-version-check 'httpx[http2]'
      - name: Fetch one official season
        run: |
          rm -rf /tmp/nbavl-player-game-logs-live
          python scripts/fetch_official_player_game_logs.py \
            --season "${{ github.event.inputs.season || '2023-24' }}" \
            --output-dir /tmp/nbavl-player-game-logs-live
      - name: Validate aggregate source QA and remove rows
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('/tmp/nbavl-player-game-logs-live')
          report = json.loads((root / 'official-player-game-logs-report.json').read_text())
          assert report['decision']['ready_for_point_in_time_feature_build'] is True, report
          assert report['coverage']['rows'] >= 20000, report
          assert report['coverage']['unique_games'] >= 1200, report
          assert report['coverage']['unique_players'] >= 500, report
          assert report['quality']['duplicate_game_player_keys'] == 0, report
          assert report['quality']['minutes_coverage'] >= 0.99, report
          source_rows = root / 'official-player-game-logs.csv'
          source_rows.unlink()
          assert not source_rows.exists()
          print(json.dumps(report, indent=2))
          PY
      - name: Upload aggregate source report only
        uses: actions/upload-artifact@v4
        with:
          name: official-player-game-logs-source-pilot
          path: /tmp/nbavl-player-game-logs-live/official-player-game-logs-report.json
          retention-days: 7
          if-no-files-found: error
