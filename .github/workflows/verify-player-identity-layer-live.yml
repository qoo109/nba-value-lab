name: Verify player identity layer live

on:
  pull_request:
    paths:
      - ".github/workflows/verify-player-identity-layer-live.yml"
      - "scripts/player_identity_core.py"
      - "scripts/historical_silver_schema.py"
      - "scripts/historical_silver_nbastats.py"
      - "scripts/historical_silver_runner.py"
      - "scripts/match_injury_snapshot_players.py"

permissions:
  contents: read

jobs:
  live-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install official injury parser dependencies
        run: python -m pip install --disable-pip-version-check pandas httpx pymupdf
      - name: Build 2023-24 Silver with player aliases
        run: |
          rm -rf /tmp/nbavl-player-identity-live
          mkdir -p /tmp/nbavl-player-identity-live
          PYTHONPATH=scripts python scripts/historical_silver_runner.py \
            --output-dir /tmp/nbavl-player-identity-live/silver
      - name: Import fixed official report and match identities
        run: |
          PYTHONPATH=scripts python scripts/import_official_nba_injury_report.py \
            --report-time "2023-12-18T08:30:00-05:00" \
            --retain-normalized \
            --output-dir /tmp/nbavl-player-identity-live/injury
          set +e
          PYTHONPATH=scripts python scripts/match_injury_snapshot_players.py \
            --snapshot-csv /tmp/nbavl-player-identity-live/injury/validation/injury-lineup-snapshots-normalized.csv \
            --silver /tmp/nbavl-player-identity-live/silver/historical-silver.sqlite.gz \
            --output-dir /tmp/nbavl-player-identity-live/match \
            > /tmp/nbavl-player-identity-live/match-execution.log 2>&1
          CODE=$?
          cat /tmp/nbavl-player-identity-live/match-execution.log
          exit "$CODE"
      - name: Validate identity coverage and remove name-level rows
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('/tmp/nbavl-player-identity-live')
          silver = json.loads((root / 'silver/silver-build-report.json').read_text())
          identity = json.loads((root / 'match/injury-player-identity-report.json').read_text())
          assert silver['decision']['ready_for_player_identity_matching'] is True, silver
          assert silver['outputs']['tables']['player_aliases'] >= 300, silver
          assert identity['quality']['unmatched_game_rows'] == 0, identity
          assert identity['quality']['ambiguous_player_rows'] == 0, identity
          assert identity['quality']['player_match_rate'] >= 0.95, identity
          assert identity['quality']['high_confidence_match_rate'] >= 0.90, identity
          snapshot = root / 'injury/validation/injury-lineup-snapshots-normalized.csv'
          snapshot.unlink()
          assert not snapshot.exists()
          print(json.dumps({'silver': silver['decision'], 'identity': identity}, indent=2))
          PY
      - name: Upload aggregate QA and execution diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: player-identity-layer-live
          path: |
            /tmp/nbavl-player-identity-live/match-execution.log
            /tmp/nbavl-player-identity-live/silver/silver-build-report.json
            /tmp/nbavl-player-identity-live/injury/official-injury-report-import-report.json
            /tmp/nbavl-player-identity-live/injury/validation/injury-lineup-validation-report.json
            /tmp/nbavl-player-identity-live/match/injury-player-identity-report.json
            /tmp/nbavl-player-identity-live/match/injury-player-id-map.csv
          retention-days: 3
          if-no-files-found: warn
