<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Repository Release Index</title><style>:root{--bg:#07111f;--panel:#10233a;--line:#2d4665;--text:#eef6ff;--muted:#9db1ca;--gold:#ffb000;--cyan:#66d9ff;--green:#59e6a6;--red:#ff7a8a}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}.wrap{max-width:1000px;margin:auto;padding:24px 18px 60px}.top{display:flex;justify-content:space-between;gap:14px}.back{color:var(--muted);text-decoration:none;border:1px solid var(--line);border-radius:10px;padding:9px 12px}.hero,.card,.table{background:var(--panel);border:1px solid rgba(255,255,255,.08);border-radius:18px}.hero{padding:25px;margin-top:20px}.eyebrow{color:var(--gold);font-size:12px;font-weight:800}.hero h1{font-size:30px;margin:8px 0}.hero p,.card p,.note{color:var(--muted);line-height:1.6}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px}.metric{border:1px solid var(--line);border-radius:13px;padding:13px}.metric strong{display:block;font-size:21px}.metric span{font-size:11px;color:var(--muted)}.section{margin-top:25px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{padding:17px}.card h3{margin:0}.schema{color:var(--cyan);font-size:13px;margin-top:8px;word-break:break-all}.table{width:100%;border-collapse:collapse;overflow:hidden}.table th,.table td{text-align:left;padding:11px 13px;border-bottom:1px solid rgba(255,255,255,.07);font-size:13px}.table th{color:var(--muted)}.ok{color:var(--green)}.error{color:var(--red)}.note{margin-top:18px;border:1px dashed var(--line);border-radius:13px;padding:14px}@media(max-width:650px){.metrics,.grid{grid-template-columns:1fr 1fr}}@media(max-width:430px){.metrics,.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="top"><div><strong>Public Release Index</strong><div style="color:var(--muted);font-size:12px">Repository-only contract status</div></div><a class="back" href="readiness.html">返回</a></div><section class="hero"><div class="eyebrow">V0.15 · STATIC RELEASE INDEX</div><h1>公開契約版本與漂移狀態</h1><p>此頁只讀取 Repository 內的 manifest 與 aggregate drift report，不連線外部來源，也不顯示列級資料。</p><div class="metrics"><div class="metric"><strong id="release">—</strong><span>Release</span></div><div class="metric"><strong id="contracts">—</strong><span>契約數</span></div><div class="metric"><strong id="checks">—</strong><span>檢查</span></div><div class="metric"><strong id="drifts">—</strong><span>漂移</span></div></div></section><section class="section"><h2>公開契約</h2><div class="grid" id="contractGrid"></div></section><section class="section"><h2>共享欄位</h2><table class="table"><thead><tr><th>欄位</th><th>Legacy</th><th>Aggregate</th><th>結果</th></tr></thead><tbody id="sharedRows"></tbody></table></section><div class="note" id="loadNote">讀取中。</div></div><script>const $=id=>document.getElementById(id);Promise.all([fetch('data/public/readiness-release-manifest-v1.json').then(r=>r.json()),fetch('data/public/readiness-contract-drift-report-v1.json').then(r=>r.json())]).then(([m,d])=>{$('release').textContent=m.releaseVersion;$('contracts').textContent=m.contracts.length;$('checks').textContent=d.checksPassed+'/'+d.checksTotal;$('drifts').textContent=d.driftCount;contractGrid.innerHTML=d.contracts.map(c=>`<article class="card"><h3>${c.contractId}</h3><div class="schema">${c.actualSchemaVersion}</div><p>${c.compatibility} · schema ${c.schemaMatch?'一致':'不一致'} · fixture ${c.fixtureOnlyMatch?'一致':'不一致'}</p></article>`).join('');sharedRows.innerHTML=d.sharedFieldComparisons.map(r=>`<tr><td>${r.field}</td><td>${String(r.values['legacy-readiness'])}</td><td>${String(r.values['aggregate-readiness'])}</td><td class="${r.allEqual?'ok':'error'}">${r.allEqual?'一致':'漂移'}</td></tr>`).join('');$('loadNote').textContent=d.formalState+' · '+d.driftCount+' drift · asOf '+d.asOf}).catch(e=>{$('loadNote').className='note error';$('loadNote').textContent='載入失敗：'+e.message});</script></body></html>
