<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="NBA Value Lab 公開安全賠率時間對齊摘要">
  <title>NBA Value Lab｜賠率時間對齊摘要</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #07111f;
      color: #e8f0ff;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: radial-gradient(circle at top, #14335a, #07111f 42%); }
    main { width: min(1080px, calc(100% - 32px)); margin: 0 auto; padding: 56px 0 80px; }
    a { color: #91c8ff; }
    .eyebrow { margin: 0 0 10px; color: #80d8c8; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    h1 { margin: 0; font-size: clamp(2rem, 6vw, 4rem); line-height: 1.04; }
    .lead { max-width: 760px; color: #b9c9df; font-size: 1.05rem; line-height: 1.7; }
    .status { display: inline-flex; margin: 20px 0 28px; padding: 8px 12px; border: 1px solid #36516f; border-radius: 999px; color: #b9c9df; background: #0c1b2d; }
    .status[data-state="ready"] { color: #a9f2de; border-color: #307666; }
    .status[data-state="error"] { color: #ffc0c0; border-color: #8b3d49; }
    .odds-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 14px; }
    .odds-card, .odds-panel { border: 1px solid rgba(151, 184, 222, .2); border-radius: 18px; background: rgba(9, 25, 44, .82); box-shadow: 0 18px 44px rgba(0,0,0,.22); }
    .odds-card { padding: 20px; min-height: 150px; }
    .odds-card__label { color: #a9bdd6; font-size: .92rem; }
    .odds-card__value { margin-top: 16px; font-size: 2rem; font-weight: 800; }
    .odds-card__note { margin-top: 10px; color: #849ab6; font-size: .82rem; line-height: 1.45; }
    .odds-panel { margin-top: 18px; padding: 24px; }
    .odds-panel h2 { margin-top: 0; }
    .odds-panel p { margin-bottom: 0; color: #b9c9df; line-height: 1.7; }
    .odds-panel--warning { border-color: rgba(255, 193, 111, .35); }
    .footer-note { margin-top: 28px; color: #8297b1; font-size: .86rem; line-height: 1.6; }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">NBA Value Lab · Public Safe Data</p>
    <h1>賠率時間對齊摘要</h1>
    <p class="lead">這一頁只呈現可公開的官方賽程配對與時間品質統計。完整逐筆賠率保留在私人本地資料層，不會透過 GitHub Pages 公開。</p>
    <div class="status" data-odds-alignment-status>正在載入公開摘要…</div>
    <div data-odds-alignment-root></div>
    <p class="footer-note">資料範圍：2025–26。所有 T-60 數字均為 collector batch candidate，不等於 provider-origin 精確報價時間。本頁不構成投注建議。</p>
  </main>
  <script src="./js/v4-odds-alignment-public.js" defer></script>
</body>
</html>
